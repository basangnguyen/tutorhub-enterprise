<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Lavie Embedded 3D</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background-color: transparent !important;
      }
      #glcanvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: transparent !important;
      }
    </style>

  </head>
  <body>
    <!-- Khu vực dựng hình 3D -->
    <h1 style="color:red; position: absolute; z-index: 100;">JavaFX HTML Loading...</h1>
    <canvas id="glcanvas"></canvas>

    <!-- Script render 3D (Đã bundle) -->
    <script src="bundle.js"></script>
  </body>
</html>
