<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <link rel="stylesheet" href="luckysheet/plugins/css/pluginsCss.css"/>
  <link rel="stylesheet" href="luckysheet/plugins/plugins.css"/>
  <link rel="stylesheet" href="luckysheet/css/luckysheet.css"/>
  <link rel="stylesheet" href="luckysheet/assets/iconfont/iconfont.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { display:flex; flex-direction:column; height:100vh; overflow:hidden;
           font-family:'Segoe UI',sans-serif; }
    #topBar {
      height:44px; background:#7B5EA7; display:flex;
      align-items:center; gap:8px; padding:0 14px;
      flex-shrink:0; z-index:9999;
    }
    #topBar .title { color:white; font-size:14px; font-weight:600; flex:1; }
    .btn { padding:5px 14px; border:none; border-radius:6px;
           cursor:pointer; font-size:12.5px; font-weight:500; }
    .btn-white { background:white; color:#7B5EA7; }
    .btn-green { background:#28a745; color:white; }
    .btn-ghost { background:rgba(255,255,255,0.18); color:white;
                 border:1px solid rgba(255,255,255,0.35); }
    .btn:hover { opacity:0.88; }
    #luckysheet { flex:1; }
  </style>
</head>
<body>

<div id="topBar">
  <span class="title">📋 Nhập Bằng Cấp</span>
  <button class="btn btn-ghost" onclick="importXLSX()">⬆ Mở .xlsx</button>
  <button class="btn btn-green" onclick="exportXLSX()">⬇ Xuất .xlsx</button>
  <button class="btn btn-white" onclick="attachFile()">📎 Đính kèm PDF</button>
  <button class="btn btn-white" onclick="saveToTutorHub()">💾 Lưu vào TutorHub</button>
</div>

<div id="luckysheet"></div>
<input type="file" id="fileInput" accept=".xlsx,.xls"
       style="display:none" onchange="handleImport(event)"/>

<script src="luckyexcel/luckyexcel.umd.js"></script>
<script src="luckysheet/plugins/js/plugin.js"></script>
<script src="luckysheet/luckysheet.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

<script>
try {
  var COL_NAMES  = ['Tên bằng cấp','Trường/Đơn vị','Chuyên ngành','Năm tốt nghiệp','Tệp đính kèm'];
  var COL_WIDTHS = { 0:220, 1:180, 2:130, 3:130, 4:150 };
  var HEADER_STYLE = { bl:1, fs:12, ht:0, vt:0,
                       bg:'#7B5EA7', fc:'#FFFFFF' };

  var headerCells = COL_NAMES.map((h,i) => ({
    r:0, c:i, v:{ ...HEADER_STYLE, v:h, m:h, ct:{fa:'General',t:'g'} }
  }));

  var allCells = [].concat(headerCells);
  var urlParams = new URLSearchParams(window.location.search);
  var editJson = urlParams.get('edit');
  if (editJson) {
    try {
      var rows = JSON.parse(editJson);
      rows.forEach(function(r, ri) {
        if (r.col0) allCells.push({ r: ri+1, c: 0, v: { v: r.col0, m: r.col0 } });
        if (r.col1) allCells.push({ r: ri+1, c: 1, v: { v: r.col1, m: r.col1 } });
        if (r.col2) allCells.push({ r: ri+1, c: 2, v: { v: r.col2, m: r.col2 } });
        if (r.col3) allCells.push({ r: ri+1, c: 3, v: { v: r.col3, m: r.col3 } });
        if (r.col4) allCells.push({ r: ri+1, c: 4, v: { v: r.col4, m: r.col4 } });
      });
    } catch(e) {
      alert("Lỗi parse dữ liệu edit: " + e.message);
    }
  }

  luckysheet.create({
    container: 'luckysheet',
    title: 'Bằng cấp TutorHub',
    lang: 'en',
    showtoolbar: true,
    sheetFormulaBar: true,
    showinfobar: false,
    showstatisticBar: true,
    allowCopy: true,
    allowEdit: true,
    data: [{
      name: 'Bằng cấp', color: '#7B5EA7',
      status: 1, order: 0,
      celldata: allCells,
      config: { columnlen: COL_WIDTHS, rowlen: { 0:38 } }
    }]
  });
} catch(err) {
  alert("Lỗi khởi tạo Excel: " + err.message + "\n\n" + err.stack);
}

  // ══════════════════════════════════════════════════════
  // LƯU — dùng JCEF cefQuery thay vì javaConnector
  // ══════════════════════════════════════════════════════
  function saveToTutorHub() {
    var sheetData = luckysheet.getSheetData();
    if (!sheetData) { alert('Không có dữ liệu!'); return; }

    var rows = [];
    for (var r = 1; r < sheetData.length; r++) {
      var row = sheetData[r];
      if (!row) continue;
      var degName = getVal(row[0]);
      if (!degName) continue;
      rows.push({
        col0: getVal(row[0]),
        col1: getVal(row[1]),
        col2: getVal(row[2]),
        col3: getVal(row[3]),
        col4: getVal(row[4])
      });
    }

    if (rows.length === 0) {
      alert('Vui lòng nhập ít nhất 1 bằng cấp!'); return;
    }

    // ✅ JCEF bridge — cefQuery
    window.cefQuery({
      request  : 'SAVE_DEG:' + JSON.stringify(rows),
      onSuccess: function(res) { console.log('OK:', res); },
      onFailure: function(code, msg) { alert('Lỗi lưu: ' + msg); }
    });
  }

  // ══════════════════════════════════════════════════════
  // XUẤT .XLSX — cefQuery để Java mở JFileChooser lưu file
  // ══════════════════════════════════════════════════════
  function exportXLSX() {
    if (typeof ExcelJS === 'undefined') {
      alert('Thư viện xuất Excel đang tải. Vui lòng thử lại sau vài giây.');
      return;
    }
    var workbook = new ExcelJS.Workbook();
    var sheet = workbook.addWorksheet('BangCap');
    
    // Thêm header
    sheet.addRow(COL_NAMES);
    var headerRow = sheet.getRow(1);
    headerRow.eachCell(function(cell) {
        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF7B5EA7' } };
        cell.font = { color: { argb: 'FFFFFFFF' }, bold: true };
    });

    // Lấy dữ liệu
    var rows = luckysheet.getSheetData();
    for (var r = 1; r < rows.length; r++) {
      var rowData = [];
      var hasData = false;
      for (var c = 0; c < COL_NAMES.length; c++) {
        var cellObj = rows[r][c];
        var val = cellObj ? (cellObj.v || cellObj.m || '') : '';
        rowData.push(val);
        if (val) hasData = true;
      }
      if (hasData) {
        sheet.addRow(rowData);
      }
    }
    
    // Điều chỉnh độ rộng cột
    sheet.columns.forEach(function(column, i) {
        var val = Object.values(COL_WIDTHS)[i];
        column.width = val ? val / 7 : 20; 
    });

    workbook.xlsx.writeBuffer().then(function(buffer) {
        var base64 = '';
        var bytes = new Uint8Array(buffer);
        var len = bytes.byteLength;
        for (var i = 0; i < len; i++) {
            base64 += String.fromCharCode(bytes[i]);
        }
        var b64str = btoa(base64);
        window.cefQuery({
            request: 'EXPORT_XLSX:' + b64str,
            onSuccess: function(r) { console.log('Exported'); },
            onFailure: function(code, msg) { alert('Lỗi xuất: ' + msg); }
        });
    });
  }

  // ══════════════════════════════════════════════════════
  // NHẬP .XLSX
  // ══════════════════════════════════════════════════════
  function importXLSX() { document.getElementById('fileInput').click(); }

  // ══════════════════════════════════════════════════════
  // ĐÍNH KÈM PDF — cefQuery
  // ══════════════════════════════════════════════════════
  function attachFile() {
    var range = luckysheet.getRange();
    if (!range || range.length === 0) {
      alert("Vui lòng chọn 1 ô trong cột 'Tệp đính kèm' để tải file lên!");
      return;
    }
    var r = range[0].row[0];
    var c = range[0].column[0];
    if (c !== 4) {
      alert("Bạn phải chọn 1 ô trong cột 'Tệp đính kèm' (Cột E)!");
      return;
    }
    
    window.cefQuery({
      request: 'OPEN_FILE_CHOOSER:' + r,
      onSuccess: function(fileName) {
        luckysheet.setCellValue(r, 4, fileName);
      },
      onFailure: function(code, msg) {
        if (code !== 0) alert('Lỗi đính kèm: ' + msg);
      }
    });
  }

  function handleImport(e) {
    var file = e.target.files[0];
    if (!file) return;
    LuckyExcel.transformExcelToLucky(file, function(exportJson) {
      if (!exportJson.sheets || exportJson.sheets.length === 0) {
        alert('Không đọc được file!'); return;
      }
      luckysheet.destroy();
      luckysheet.create({
        container:'luckysheet', data:exportJson.sheets,
        title:exportJson.info.name,
        showtoolbar:true, sheetFormulaBar:true, showinfobar:false
      });
    });
  }
  function getStr(cell) {
    if (!cell) return '';
    return String(cell.m || cell.v || '').trim();
  }
</script>
</body>
</html>
