<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <link rel="stylesheet" href="luckysheet/plugins/css/pluginsCss.css"/>
  <link rel="stylesheet" href="luckysheet/plugins/plugins.css"/>
  <link rel="stylesheet" href="luckysheet/css/luckysheet.css"/>
  <link rel="stylesheet" href="luckysheet/assets/iconfont/iconfont.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { display:flex; flex-direction:column; height:100vh; overflow:hidden;
           font-family:'Segoe UI',sans-serif; }
    #topBar {
      height:44px; background:#4CAF50; display:flex;
      align-items:center; gap:8px; padding:0 14px;
      flex-shrink:0; z-index:9999;
    }
    #topBar .title { color:white; font-size:14px; font-weight:600; flex:1; }
    .btn { padding:5px 14px; border:none; border-radius:6px;
           cursor:pointer; font-size:12.5px; font-weight:500; }
    .btn-white { background:white; color:#4CAF50; }
    .btn-green { background:#037920; color:white; }
    .btn-ghost { background:rgba(255,255,255,0.18); color:white;
                 border:1px solid rgba(255,255,255,0.35); }
    .btn:hover { opacity:0.88; }
    #luckysheet { flex:1; }
  </style>
</head>
<body>

<div id="topBar">
  <span class="title">📋 Nhập Đề QuizHub từ Excel</span>
  <button class="btn btn-ghost" onclick="importXLSX()">⬆ Mở file .xlsx mẫu</button>
  <button class="btn btn-white" onclick="saveQuizData()">💾 Tạo Đề QuizHub</button>
</div>

<div id="luckysheet"></div>
<input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" onchange="handleImport(event)"/>

<script src="luckyexcel/luckyexcel.umd.js"></script>
<script src="luckysheet/plugins/js/plugin.js"></script>
<script src="luckysheet/luckysheet.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

<script>
$(function () {
  luckysheet.create({
    container: 'luckysheet',
    lang: 'zh',
    showtoolbar: true,
    data: [
      {
        name: 'Thong_tin_de',
        status: '1',
        order: '0',
        index: 0,
        celldata: buildMetaSheetCells(),
        config: { columnlen: { '0': 220, '1': 320 } }
      },
      {
        name: 'Cau_hoi',
        status: '0',
        order: '1',
        index: 1,
        celldata: buildCauHoiHeaderCells(),
        config: { columnlen: { '3': 380, '11': 300, '12': 380 } }
      }
    ]
  });
});

const META_FIELDS = ["Ten_de", "Mo_ta_ngan", "Mon_hoc", "Mau_chu_de",
                      "Tron_cau_hoi_mac_dinh", "Hien_giai_thich_ngay"];
const COLS = ["STT","Chu_de","Do_kho","Cau_hoi","Dap_an_A","Dap_an_B","Dap_an_C",
              "Dap_an_D","Dap_an_E","Dap_an_F","Dap_an_dung","Giai_thich",
              "Giai_thich_dap_an_sai","Hinh_anh"];

function cellObj(v) { return { v: v, m: v, ct: { fa: 'General', t: 'g' } }; }

function buildMetaSheetCells() {
  return META_FIELDS.map((key, r) => ({ r, c: 0, v: cellObj(key) }));
}

function buildCauHoiHeaderCells() {
  return COLS.map((name, c) => ({ r: 0, c, v: cellObj(name) }));
}

function findSheetByName(sheets, name) {
  return sheets.find(s => s.name === name);
}

function cellVal(row, idx) {
  if (idx == null || idx < 0 || !row || !row[idx]) return '';
  const raw = row[idx].v;
  return raw == null ? '' : String(raw).trim();
}

function buildColumnMap(headerRow) {
  const map = {};
  COLS.forEach((name, fallbackIdx) => {
    let foundIdx = -1;
    if (headerRow) {
      for (let c = 0; c < headerRow.length; c++) {
        const v = cellVal(headerRow, c).replace(/\s*\*\s*$/, '');
        if (v === name) { foundIdx = c; break; }
      }
    }
    map[name] = foundIdx >= 0 ? foundIdx : fallbackIdx;
  });
  return map;
}

function readMetaSheet(sheet) {
  const meta = {};
  if (!sheet || !sheet.data) return meta;
  sheet.data.forEach(row => {
    if (!row) return;
    const key = cellVal(row, 0);
    if (key) meta[key] = cellVal(row, 1);
  });
  return meta;
}

function saveQuizData() {
  const sheets = luckysheet.getAllSheets(); 
  const meta = readMetaSheet(findSheetByName(sheets, 'Thong_tin_de'));
  const quizSheet = findSheetByName(sheets, 'Cau_hoi');

  if (!quizSheet || !quizSheet.data || quizSheet.data.length < 2) {
    alert('Không tìm thấy dữ liệu trong sheet Cau_hoi.');
    return;
  }

  const data = quizSheet.data;
  const colMap = buildColumnMap(data[0]);
  const rows = [];

  for (let r = 1; r < data.length; r++) {
    const row = data[r];
    if (!row) continue;
    const cauHoi = cellVal(row, colMap['Cau_hoi']);
    if (!cauHoi) continue; 

    const item = { excelRowNumber: String(r + 1) };
    COLS.forEach(name => { item[name] = cellVal(row, colMap[name]); });
    rows.push(item);
  }

  if (rows.length === 0) {
    alert('Chưa có câu hỏi nào để lưu.');
    return;
  }

  window.cefQuery({
    request: 'IMPORT_QUIZ_ROWS:' + JSON.stringify({ meta, rows }),
    onSuccess: function (res) {
      const data = JSON.parse(res);
      if (data.ok) {
        alert('Đã tạo đề: ' + data.data.title + ' (' + data.data.questions.length + ' câu)');
      } else {
        alert('Có lỗi: ' + data.message);
      }
    },
    onFailure: function (code, msg) { alert('Lỗi gửi dữ liệu: ' + msg); }
  });
}

function importXLSX() { document.getElementById('fileInput').click(); }

function handleImport(e) {
  var file = e.target.files[0];
  if (!file) return;
  LuckyExcel.transformExcelToLucky(file, function(exportJson) {
    if (!exportJson.sheets || exportJson.sheets.length === 0) {
      alert('Không đọc được file!'); return;
    }
    luckysheet.destroy();
    luckysheet.create({
      container:'luckysheet', data:exportJson.sheets,
      title:exportJson.info.name,
      showtoolbar:true, sheetFormulaBar:true, showinfobar:false
    });
  });
}
</script>
</body>
</html>
