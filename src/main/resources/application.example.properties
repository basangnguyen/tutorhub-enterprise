# TutorHub Server Configuration
server.host=localhost
server.port=7860
server.scheme=ws

# Database Configuration
db.url=jdbc:postgresql://HOST/DB_NAME?sslmode=require
db.user=your_db_user
db.password=your_db_password

# Database Configuration used by DatabaseManager
tutorhub.db.url=jdbc:postgresql://HOST/DB_NAME?sslmode=require
tutorhub.db.user=your_db_user
tutorhub.db.password=your_db_password

# External API Keys / Secrets
tutorhub.b2.accessKey=
tutorhub.b2.secretKey=

# Application State
app.env=dev
secure.exam.enabled=true
