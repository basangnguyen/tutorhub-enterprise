# TutorHub Server Configuration
server.host=localhost
server.port=7860
server.scheme=ws

# Database Configuration
db.url=jdbc:postgresql://HOST:PORT/DB_NAME
db.user=your_db_user
db.password=your_db_password

# External API Keys / Secrets
tutorhub.b2.accessKey=your_access_key
tutorhub.b2.secretKey=your_secret_key

# Application State
app.env=dev
secure.exam.enabled=true
