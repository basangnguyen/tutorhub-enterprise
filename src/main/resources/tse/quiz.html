<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
<title>Quiz - Cơ sở ATTT</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #f7f7f4; --ink: #1a1a1a; --line: #e2e0d8; --muted: #777;
    --green: #3b6d11; --blue: #1a4f8b; --orange: #b85b14;
    --accent: var(--green);
  }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.5;
    padding-bottom: 84px;
  }
  .quiz-header {
    position: sticky; top: 0; z-index: 10; background: var(--bg);
    border-bottom: 1px solid var(--line);
  }
  .top {
    padding: 10px 14px 8px; background: var(--bg);
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .top h1 { margin: 0; font-size: 15px; flex: 1; min-width: 100px; }
  .top .score { font-size: 13px; color: #555; font-weight: 600; }
  .top .timer { font-size: 13px; font-weight: 600; color: var(--blue); font-variant-numeric: tabular-nums; }
  .back-btn { background: none; border: none; color: var(--blue); font-size: 14px; cursor: pointer; padding: 6px 2px; }
  .pbar { height: 4px; background: var(--line); }
  .pbar > div { height: 100%; background: var(--accent); width: 0; transition: width .2s; }
  .container { padding: 12px; max-width: 760px; margin: 0 auto; }

  /* MENU */
  .menu-wrap { padding: 24px 16px; text-align: center; }
  .menu-title { font-size: 24px; font-weight: 700; margin: 20px 0 6px; }
  .menu-sub { color: #666; margin-bottom: 22px; }
  .cards { display: flex; flex-direction: column; gap: 14px; max-width: 380px; margin: 0 auto; }
  @media (min-width: 800px) { .cards { flex-direction: row; max-width: 900px; } .cards .card { flex: 1; } }
  .card {
    background: white; border-radius: 14px; overflow: hidden;
    box-shadow: 0 2px 10px rgba(0,0,0,.06); border: 1px solid #e8e6df;
    cursor: pointer; transition: transform .15s, box-shadow .15s; text-align: left;
  }
  .card:active { transform: scale(.98); }
  .card .accent { height: 6px; }
  .card .body { padding: 18px; }
  .card .big { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
  .card .mid { font-size: 14px; color: #333; margin-bottom: 6px; }
  .card .desc { font-size: 12px; color: #777; }
  .card .best { font-size: 12px; color: #2b6b2b; font-weight: 600; margin-top: 8px; min-height: 16px; }
  .card .go { display: inline-block; margin-top: 12px; padding: 7px 16px; border-radius: 8px; color: white; font-weight: 600; font-size: 14px; }

  .modes { max-width: 380px; margin: 22px auto 0; text-align: left; background: white; border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; }
  .modes h3 { margin: 0 0 10px; font-size: 14px; }
  .toggle-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; font-size: 14px; }
  .toggle-row label { flex: 1; cursor: pointer; }
  .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .seg button { border: none; background: white; padding: 6px 12px; font-size: 13px; cursor: pointer; color: #555; font-family: inherit; }
  .seg button.on { background: var(--accent); color: white; font-weight: 600; }
  .switch { position: relative; width: 44px; height: 25px; flex-shrink: 0; }
  .switch input { display: none; }
  .switch span { position: absolute; inset: 0; background: #ccc; border-radius: 25px; transition: .2s; cursor: pointer; }
  .switch span::after { content: ""; position: absolute; width: 19px; height: 19px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: .2s; }
  .switch input:checked + span { background: var(--accent); }
  .switch input:checked + span::after { transform: translateX(19px); }

  /* QUIZ */
  .q { background: white; border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; position: relative; scroll-margin-top: 110px; }
  .q.flagged { border-color: #e0a93a; box-shadow: 0 0 0 1px #e0a93a; }
  .q-head { font-weight: 600; margin-bottom: 10px; font-size: 15px; line-height: 1.45; padding-right: 34px; }
  .q-num { color: #888; font-weight: 500; margin-right: 4px; }
  .q-multi { color: var(--blue); font-weight: 500; font-size: 12px; margin-left: 4px; }
  .flag-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 18px; cursor: pointer; opacity: .35; line-height: 1; padding: 2px; }
  .flag-btn.on { opacity: 1; }
  .opt { display: flex; align-items: flex-start; gap: 10px; padding: 10px 8px; border-radius: 8px; cursor: pointer; transition: background .1s; border: 1px solid transparent; margin: 2px 0; font-size: 14px; }
  .opt:active { background: #f0eee8; }
  .opt input { margin-top: 3px; flex-shrink: 0; width: 18px; height: 18px; cursor: pointer; }
  .opt .letter { font-weight: 600; color: #555; margin-right: 4px; }
  .opt.correct { background: #d6f5e0; border-color: #b3e6c2; }
  .opt.wrong { background: #f8d6d6; border-color: #eab8b8; }
  .expl { display: none; margin-top: 8px; padding: 8px 10px; border-radius: 6px; font-size: 12.5px; line-height: 1.5; background: #f5f5f2; }
  .expl.show { display: block; }
  .expl.ok { background: #eaf8ee; color: #2b6b2b; }
  .expl.err { background: #fdecec; color: #a33; }
  .expl.miss { background: #fff4e0; color: #8a5b00; }
  .why-wrong { margin-top: 7px; padding: 7px 9px; background: #fff0f0; border-left: 3px solid #e09; border-left-color: #d9534f; border-radius: 0 5px 5px 0; color: #a33; line-height: 1.55; }

  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid var(--line); padding: 9px 12px; display: flex; gap: 8px; align-items: center; box-shadow: 0 -2px 8px rgba(0,0,0,.04); z-index: 9; }
  .btn { border: none; border-radius: 8px; font-size: 14px; font-weight: 600; padding: 10px 14px; cursor: pointer; font-family: inherit; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-secondary { background: #e8e6df; color: #333; }
  .btn-ghost { background: white; border: 1px solid var(--line); color: #444; }
  .progress { margin-left: auto; font-size: 12px; color: #888; }

  .result-banner { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--line); }
  .result-banner .num { font-size: 22px; font-weight: 700; }
  .result-banner .msg { color: #555; margin-top: 4px; font-size: 13px; }
  .result-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

  /* navigator grid */
  .nav-toggle { position: fixed; right: 14px; bottom: 70px; z-index: 11; background: var(--accent); color: white; border: none; width: 46px; height: 46px; border-radius: 50%; font-size: 18px; cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,.2); }
  .nav-sheet { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 20; display: none; align-items: flex-end; }
  .nav-sheet.show { display: flex; }
  .nav-inner { background: white; width: 100%; max-height: 70vh; border-radius: 16px 16px 0 0; padding: 16px; overflow-y: auto; }
  .nav-inner h3 { margin: 0 0 4px; font-size: 16px; }
  .nav-legend { font-size: 12px; color: #888; margin-bottom: 12px; display: flex; gap: 12px; flex-wrap: wrap; }
  .dot { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 4px; vertical-align: middle; }
  .nav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(42px, 1fr)); gap: 8px; }
  .nav-cell { aspect-ratio: 1; border: 1px solid var(--line); border-radius: 8px; background: white; font-size: 13px; font-weight: 600; cursor: pointer; color: #444; display: flex; align-items: center; justify-content: center; position: relative; }
  .nav-cell.answered { background: #e3edf7; border-color: #b9d3ec; }
  .nav-cell.flagged::after { content: "🚩"; position: absolute; top: -6px; right: -4px; font-size: 10px; }
  .nav-cell.right { background: #d6f5e0; border-color: #b3e6c2; }
  .nav-cell.bad { background: #f8d6d6; border-color: #eab8b8; }

  /* flashcards */
  .fc-wrap { padding: 16px; max-width: 560px; margin: 0 auto; }
  .fc-card { background: white; border: 1px solid var(--line); border-radius: 16px; padding: 28px 22px; min-height: 240px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 3px 14px rgba(0,0,0,.07); cursor: pointer; }
  .fc-q { font-size: 17px; font-weight: 600; line-height: 1.5; }
  .fc-tap { text-align: center; color: #aaa; font-size: 12px; margin-top: 18px; }
  .fc-ans { margin-top: 16px; padding-top: 16px; border-top: 1px dashed var(--line); }
  .fc-ans .lbl { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .fc-ans .val { font-size: 15px; font-weight: 600; color: var(--green); }
  .fc-ans .ex { font-size: 13px; color: #555; margin-top: 8px; line-height: 1.5; }
  .fc-nav { display: flex; align-items: center; gap: 10px; margin-top: 18px; }
  .fc-nav .pos { margin-left: auto; font-size: 13px; color: #888; }

  /* search */
  .search-box { flex-basis: 100%; display: flex; align-items: center; gap: 8px; background: white; border: 1px solid var(--line); border-radius: 10px; padding: 7px 12px; margin-top: 2px; }
  .search-box .search-ico { font-size: 15px; opacity: .6; }
  .search-box input { flex: 1; border: none; outline: none; font-size: 15px; font-family: inherit; background: transparent; color: var(--ink); }
  .search-clear { border: none; background: #ececec; color: #777; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-size: 12px; display: none; flex-shrink: 0; }
  .search-clear.show { display: block; }
  .search-count { font-size: 12px; color: var(--muted); margin: 0 2px 8px; min-height: 0; }
  .search-count.show { min-height: 16px; }
  .search-empty { text-align: center; color: var(--muted); padding: 30px 16px; font-size: 14px; }
  .q.search-hide { display: none; }
  mark { background: #ffe07a; color: inherit; padding: 0 1px; border-radius: 2px; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- MENU -->
<div id="menu" class="menu-wrap">
  <div class="menu-title">Cơ sở An toàn Thông tin</div>
  <div class="menu-sub">Chọn đề và chế độ để bắt đầu</div>
  <div class="cards" id="decks-container">Đang tải danh sách đề...</div>
    <div class="modes">
    <h3>⚙️ Tuỳ chọn làm bài</h3>
    <div class="toggle-row">
      <label>Chế độ</label>
      <div class="seg" id="seg-mode">
        <button class="on" data-v="study" onclick="setMode('study')">Ôn tập</button>
        <button data-v="exam" onclick="setMode('exam')">Thi thử</button>
      </div>
    </div>
    <div class="toggle-row">
      <label for="sw-shuffleQ">Trộn thứ tự câu hỏi</label>
      <div class="switch"><input type="checkbox" id="sw-shuffleQ"><span onclick="this.previousElementSibling.click()"></span></div>
    </div>
    <div class="toggle-row">
      <label for="sw-shuffleO">Trộn thứ tự đáp án</label>
      <div class="switch"><input type="checkbox" id="sw-shuffleO"><span onclick="this.previousElementSibling.click()"></span></div>
    </div>
    <div class="toggle-row">
      <label for="sw-instant">Hiện giải thích ngay khi chọn (chỉ Ôn tập)</label>
      <div class="switch"><input type="checkbox" id="sw-instant" checked><span onclick="this.previousElementSibling.click()"></span></div>
    </div>
    <div class="toggle-row" id="row-limit">
      <label>Giới hạn số câu</label>
      <div class="seg" id="seg-limit">
        <button class="on" data-v="0" onclick="setLimit(0)">Tất cả</button>
        <button data-v="10" onclick="setLimit(10)">10</button>
        <button data-v="20" onclick="setLimit(20)">20</button>
        <button data-v="30" onclick="setLimit(30)">30</button>
      </div>
    </div>
    <div class="toggle-row" style="border-top:1px solid var(--line); margin-top:6px; padding-top:12px;">
      <label>Hoặc ôn nhanh kiểu thẻ lật</label>
      <button class="btn btn-ghost" onclick="startFlashcards()">🃏 Flashcard</button>
    </div>
  </div>
  <div id="fc-deck-pick" class="hidden"></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
  <div class="quiz-header">
    <div class="top">
      <button class="back-btn" onclick="backToMenu()">← Đổi đề</button>
      <h1 id="quiz-title"></h1>
      <span class="timer" id="timer"></span>
      <span class="score" id="score">Chưa nộp</span>
      <div class="search-box">
        <span class="search-ico">🔍</span>
        <input type="text" id="search-input" placeholder="Tìm câu hỏi / đáp án theo chữ..." oninput="doSearch(this.value)" autocomplete="off">
        <button class="search-clear" id="search-clear" onclick="clearSearch()" title="Xoá">✕</button>
      </div>
    </div>
    <div class="pbar"><div id="pbar-fill"></div></div>
  </div>
  <div class="container">
    <div class="search-count" id="search-count"></div>
    <div id="result" class="result-banner hidden"></div>
    <div id="questions"></div>
    <div id="search-empty" class="search-empty hidden">Không tìm thấy câu nào khớp với từ khoá.</div>
  </div>
  <button class="nav-toggle" onclick="openNav()" title="Bản đồ câu hỏi">⊞</button>
  <div class="bottom-bar">
    <button class="btn btn-primary" id="grade-btn" onclick="grade()">Chấm điểm</button>
    <button class="btn btn-secondary" onclick="resetQuiz()">Làm lại</button>
    <span class="progress" id="progress"></span>
  </div>
</div>

<!-- FLASHCARDS -->
<div id="flash" class="hidden">
  <div class="quiz-header">
    <div class="top">
      <button class="back-btn" onclick="backToMenu()">← Thoát</button>
      <h1 id="fc-title">Flashcard</h1>
    </div>
  </div>
  <div class="fc-wrap">
    <div class="fc-card" id="fc-card" onclick="flipCard()">
      <div class="fc-q" id="fc-q"></div>
      <div id="fc-back" class="hidden">
        <div class="fc-ans">
          <div class="lbl">Đáp án đúng</div>
          <div class="val" id="fc-a"></div>
          <div class="ex" id="fc-ex"></div>
        </div>
      </div>
      <div class="fc-tap" id="fc-hint">Chạm để lật thẻ</div>
    </div>
    <div class="fc-nav">
      <button class="btn btn-secondary" onclick="fcPrev()">← Trước</button>
      <button class="btn btn-ghost" onclick="fcShuffle()">🔀 Trộn</button>
      <button class="btn btn-primary" onclick="fcNext()">Sau →</button>
      <span class="pos" id="fc-pos"></span>
    </div>
  </div>
</div>

<!-- NAV SHEET -->
<div class="nav-sheet" id="nav-sheet" onclick="if(event.target===this)closeNav()">
  <div class="nav-inner">
    <h3>Bản đồ câu hỏi</h3>
    <div class="nav-legend">
      <span><i class="dot" style="background:#e3edf7;border:1px solid #b9d3ec"></i>Đã chọn</span>
      <span><i class="dot" style="background:white;border:1px solid var(--line)"></i>Chưa làm</span>
      <span>🚩 Đánh dấu</span>
    </div>
    <div class="nav-grid" id="nav-grid"></div>
  </div>
</div>

<script>
/* ====== DỮ LIỆU ====== */
const LETTERS = "ABCDEF";
let TITLES = {};

/* ====== BẢNG TỪ VIẾT TẮT ====== */
// Mỗi viết tắt -> tên đầy đủ chèn vào lần xuất hiện đầu tiên trong mỗi đoạn text
const ACRONYMS = {
  "MAC": "Mandatory Access Control - Kiểm soát truy cập bắt buộc",
  "DAC": "Discretionary Access Control - Kiểm soát truy cập tùy ý",
  "RBAC": "Role-Based Access Control - Kiểm soát truy cập theo vai trò",
  "ABAC": "Attribute-Based Access Control - Kiểm soát truy cập theo thuộc tính",
  "RuBAC": "Rule-Based Access Control - Kiểm soát truy cập theo quy tắc",
  "ACL": "Access Control List - Danh sách kiểm soát truy cập",
  "CL": "Capability List - Danh sách năng lực",
  "NIDS": "Network-based Intrusion Detection System - Hệ thống phát hiện xâm nhập mức mạng",
  "HIDS": "Host-based Intrusion Detection System - Hệ thống phát hiện xâm nhập trên máy chủ",
  "IDS": "Intrusion Detection System - Hệ thống phát hiện xâm nhập",
  "IPS": "Intrusion Prevention System - Hệ thống ngăn chặn xâm nhập",
  "NIPS": "Network-based Intrusion Prevention System - Hệ thống ngăn chặn xâm nhập mức mạng",
  "DLP": "Data Loss Prevention - Phòng chống thất thoát dữ liệu",
  "VPN": "Virtual Private Network - Mạng riêng ảo",
  "DMZ": "Demilitarized Zone - Vùng mạng đệm",
  "VLAN": "Virtual LAN - Mạng LAN ảo",
  "LAN": "Local Area Network - Mạng nội bộ",
  "NAT": "Network Address Translation - Biên dịch địa chỉ mạng",
  "DHCP": "Dynamic Host Configuration Protocol - Giao thức cấp phát IP động",
  "DNS": "Domain Name System - Hệ thống phân giải tên miền",
  "ARP": "Address Resolution Protocol - Giao thức phân giải địa chỉ",
  "NIC": "Network Interface Card - Card giao tiếp mạng",
  "TCP": "Transmission Control Protocol - Giao thức điều khiển truyền vận",
  "UDP": "User Datagram Protocol - Giao thức truyền không kết nối",
  "IP": "Internet Protocol - Giao thức Internet",

  "SSL": "Secure Sockets Layer - Lớp socket bảo mật",

  "DES": "Data Encryption Standard - Chuẩn mã hóa dữ liệu",
  "ECC": "Elliptic Curve Cryptography - Mật mã đường cong elliptic",
  "ECDHE": "Elliptic Curve Diffie-Hellman Ephemeral - Trao đổi khóa elliptic tạm thời",
  "MD5": "Message Digest 5 - Hàm băm 128-bit",

  "CSRF": "Cross-Site Request Forgery - Giả mạo yêu cầu liên trang",
  "CRSF": "Cross-Site Request Forgery - Giả mạo yêu cầu liên trang",

  "P2P": "Peer-to-Peer - Mạng ngang hàng",
  "AAA": "Authentication, Authorization, Accounting - Xác thực, Cấp quyền, Kiểm toán",
  "CIA": "Confidentiality, Integrity, Availability - Bí mật, Toàn vẹn, Sẵn sàng",

  "POS": "Point of Sale - Máy thanh toán tại điểm bán",
  "CLI": "Command-Line Interface - Giao diện dòng lệnh",
  "AXFR": "DNS Zone Transfer - Truyền toàn bộ vùng DNS"
};
// Chuỗi viết hoa KHÔNG phải viết tắt kỹ thuật (chữ tiếng Việt, tên riêng, mã đề) -> bỏ qua
const ACRONYM_SKIP = new Set(["AVI","CSDL","ATTT","IT","OS","WEB","IV","DIP","CMND","CCCD","SMS","OR","AN","TO","NG","KH","KD","LTV","HC","NH","CH","TH","PH","HI","HO","LI","LO","CU","GI","BU","PS","PL","MK","SAI","TRONG","TIN","CHI","TI","OSI"]);
// dài giảm dần để khớp 'C&C' trước 'C', tránh khớp lồng
const ACRONYM_KEYS = Object.keys(ACRONYMS).sort((a,b)=>b.length-a.length);

// Chèn (tên đầy đủ) vào LẦN ĐẦU mỗi viết tắt xuất hiện trong đoạn text thuần (chưa escape HTML)
function expandAcronyms(text){
  if(!text) return text;
  const seen=new Set();
  // tách theo ranh giới từ, giữ nguyên dấu cách & ký tự đặc biệt
  // duyệt bằng regex: token gồm chữ-số-& ; phần còn lại giữ nguyên
  return text.replace(/[A-Za-z0-9&]+/g, tok=>{
    // chỉ xét token viết HOA toàn bộ (cho phép số), khớp đúng một acronym
    if(seen.has(tok)) return tok;
    if(ACRONYM_SKIP.has(tok)) return tok;
    if(ACRONYMS[tok] && /^[A-Z][A-Z0-9&]*$/.test(tok)){
      seen.add(tok);
      return tok+' ('+ACRONYMS[tok]+')';
    }
    return tok;
  });
}

/* ====== HELPERS ====== */
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
// gộp: mở rộng viết tắt rồi escape HTML (dùng cho mọi text từ đề)
function esc(s){return escapeHtml(expandAcronyms(s));}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function setEq(set,arr){if(set.size!==arr.length)return false;return arr.every(x=>set.has(x));}

function setMode(v){
  opts.mode=v;
  document.querySelectorAll('#seg-mode button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  document.getElementById('sw-instant').closest('.toggle-row').style.opacity = v==='study'?'1':'.4';

async function loadBests(){
  for(const n of [1,2,3]){
    try{
      const r = await window.storage.get('best:'+n);
      if(r && r.value){
        const d = JSON.parse(r.value);
        document.getElementById('best-'+n).textContent = `🏆 Cao nhất: ${d.correct}/${d.total} (${d.score}/10)`;
      }
    }catch(e){/* chưa có */}
  }
}
async function saveBest(n, correct, total, score){
  try{
    let prev=null;
    try{const r=await window.storage.get('best:'+n); if(r&&r.value)prev=JSON.parse(r.value);}catch(e){}
    if(!prev || score>parseFloat(prev.score)){
      await window.storage.set('best:'+n, JSON.stringify({correct,total,score}));
      document.getElementById('best-'+n).textContent = `🏆 Cao nhất: ${correct}/${total} (${score}/10)`;
    }
  }catch(e){}
}

/* ====== BUILD QUIZ ====== */
function buildRunnable(){
  // áp dụng trộn câu + cắt giới hạn + trộn đáp án
  let items = baseQuiz.map((it,origIdx)=>({it, origIdx}));
  if(opts.shuffleQ) items = shuffle(items);
  if(opts.limit>0) items = items.slice(0, opts.limit);
  return items.map(({it})=>{
    let [q,options,correct,expl,wrongExpl]=it;
    wrongExpl = wrongExpl || {};
    if(opts.shuffleO){
      const idx = options.map((_,i)=>i);
      const order = shuffle(idx);
      const newOpts = order.map(i=>options[i]);
      const newCorrect = correct.map(c=>order.indexOf(c));
      // remap giải thích sai theo vị trí mới
      const newWrong = {};
      Object.keys(wrongExpl).forEach(oldIdx=>{
        const newIdx = order.indexOf(+oldIdx);
        newWrong[newIdx] = wrongExpl[oldIdx];
      });
      return [q,newOpts,newCorrect.sort((a,b)=>a-b),expl,newWrong];
    }
    return [q,options.slice(),correct.slice(),expl,Object.assign({},wrongExpl)];
  });
}

function startTimer(){

    const m=String(Math.floor(s/60)).padStart(2,'0');

/* ====== RENDER ====== */
function renderQuestions(){
  const root=document.getElementById('questions');
  root.innerHTML='';
  const showInstant = opts.mode==='study' && opts.instant;
  currentQuiz.forEach((item,qi)=>{
    const [q,options,correct]=item;
    const multi=correct.length>1;
    const card=document.createElement('div');
    card.className='q'; card.id='q-'+qi;
    let html=`<button class="flag-btn" data-qi="${qi}" onclick="toggleFlag(${qi})" title="Đánh dấu">🚩</button>`;
    html+=`<div class="q-head"><span class="q-num">Câu ${qi+1}.</span>${esc(q)}${multi?'<span class="q-multi">(chọn 2)</span>':''}</div>`;
    options.forEach((opt,oi)=>{
      const type=multi?'checkbox':'radio';
      html+=`<label class="opt" data-qi="${qi}" data-oi="${oi}">
        <input type="${type}" name="q${qi}" value="${oi}">
        <div><span class="letter">${LETTERS[oi]}.</span>${esc(opt)}</div>
      </label>`;
    });
    html+=`<div class="expl" id="expl-${qi}"></div>`;
    card.innerHTML=html;
    root.appendChild(card);
  });

  root.querySelectorAll('.opt input').forEach(inp=>{
    inp.addEventListener('change',e=>{
      const lbl=e.target.closest('.opt');
      const qi=+lbl.dataset.qi, oi=+lbl.dataset.oi;
      const multi=currentQuiz[qi][2].length>1;
      if(multi){ if(e.target.checked)selections[qi].add(oi); else selections[qi].delete(oi); }
      else selections[qi]=new Set([oi]);
      updateProgress();
      if(showInstant) revealOne(qi);
    });
  });
  updateProgress();
  if(searchTerm) doSearch(searchTerm);
}

// dựng nội dung giải thích: gồm giải thích đáp án đúng + lý do sai cho phương án đã chọn
function buildExplHtml(qi, prefix, correct, expl, chosen){
  const ans=correct.map(i=>LETTERS[i]).join(', ');
  let html=`${prefix}<b>Đáp án: ${ans}</b>`;
  if(expl) html+='<br>'+esc(expl);
  // lý do vì sao (các) phương án người dùng chọn lại sai
  const wrongExpl=currentQuiz[qi][4]||{};
  const right=new Set(correct);
  const chosenWrong=[...chosen].filter(oi=>!right.has(oi)).sort((a,b)=>a-b);
  if(chosenWrong.length){
    const parts=chosenWrong.map(oi=>{
      const why=wrongExpl[oi];
      return `<b>${LETTERS[oi]}</b> sai: ${why?esc(why):'không phải đáp án đúng.'}`;
    });
    html+=`<div class="why-wrong">✗ Bạn chọn ${chosenWrong.map(oi=>LETTERS[oi]).join(', ')} — ${parts.join('<br>')}</div>`;
  }
  return html;
}

function revealOne(qi){
  // hiện đáp án ngay cho 1 câu (chế độ ôn tập)
  const [,,correct,expl]=currentQuiz[qi];
  const right=new Set(correct);
  const chosen=selections[qi];
  // với câu chọn nhiều, chỉ chấm khi đã chọn đủ
  if(correct.length>1 && chosen.size<correct.length) return;
  const ok=setEq(chosen,correct);
  document.querySelectorAll(`.opt[data-qi="${qi}"]`).forEach(lbl=>{
    const oi=+lbl.dataset.oi;
    lbl.classList.remove('correct','wrong');
    if(right.has(oi))lbl.classList.add('correct');
    else if(chosen.has(oi))lbl.classList.add('wrong');
  });
  const exp=document.getElementById('expl-'+qi);
  exp.className='expl show '+(ok?'ok':'err');
  exp.innerHTML=buildExplHtml(qi, ok?'✓ Đúng. ':'✗ Sai. ', correct, expl, chosen);
}

function toggleFlag(qi){
  flagged[qi]=!flagged[qi];
  document.getElementById('q-'+qi).classList.toggle('flagged',flagged[qi]);
  document.querySelector(`.flag-btn[data-qi="${qi}"]`).classList.toggle('on',flagged[qi]);
}

function updateProgress(){
  const done=selections.filter(s=>s.size>0).length;
  const n=currentQuiz.length;
  document.getElementById('progress').textContent=`${done}/${n}`;
  document.getElementById('pbar-fill').style.width=(done/n*100)+'%';
}

/* ====== SEARCH (tìm theo chữ) ====== */
let searchTerm='';
function normalize(s){
  // bỏ dấu tiếng Việt để tìm gần đúng: "ma doc" khớp "mã độc"
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d');
}
function highlight(html, term){
  if(!term) return html;
  // html đã được escape; chèn <mark> quanh đoạn khớp, không phân biệt dấu
  const plain=html; const np=normalize(plain); const nt=normalize(term);
  let out='', last=0, idx;
  while((idx=np.indexOf(nt,last))!==-1){
    out+=plain.slice(last,idx)+'<mark>'+plain.slice(idx,idx+term.length)+'</mark>';
    last=idx+term.length;
  }
  out+=plain.slice(last);
  return out;
}
function doSearch(val){
  searchTerm=val.trim();
  const term=searchTerm;
  document.getElementById('search-clear').classList.toggle('show', !!term);
  const nt=normalize(term);
  let matches=0;
  currentQuiz.forEach((item,qi)=>{
    const [q,options]=item;
    const card=document.getElementById('q-'+qi);
    if(!card) return;
    const haystack=normalize(q+' '+options.join(' '));
    const hit = !term || haystack.includes(nt);
    card.classList.toggle('search-hide', !hit);
    if(hit) matches++;
    // cập nhật highlight trong câu hỏi + đáp án
    const head=card.querySelector('.q-head');
    const multi=item[2].length>1;
    head.innerHTML=`<span class="q-num">Câu ${qi+1}.</span>${highlight(esc(q),term)}${multi?'<span class="q-multi">(chọn 2)</span>':''}`;
    card.querySelectorAll('.opt').forEach(lbl=>{
      const oi=+lbl.dataset.oi;
      const div=lbl.querySelector('div');
      div.innerHTML=`<span class="letter">${LETTERS[oi]}.</span>${highlight(esc(options[oi]),term)}`;
    });
  });
  const cnt=document.getElementById('search-count');
  const empty=document.getElementById('search-empty');
  if(term){
    cnt.classList.add('show');
    cnt.textContent=`Tìm thấy ${matches} câu khớp "${term}"`;
    empty.classList.toggle('hidden', matches>0);
  }else{
    cnt.classList.remove('show'); cnt.textContent='';
    empty.classList.add('hidden');
  }
}
function clearSearch(){
  const inp=document.getElementById('search-input');
  inp.value=''; inp.focus();
  doSearch('');
}

/* ====== NAV ====== */
function openNav(){buildNav();document.getElementById('nav-sheet').classList.add('show');}
function closeNav(){document.getElementById('nav-sheet').classList.remove('show');}
function buildNav(){
  const grid=document.getElementById('nav-grid');
  grid.innerHTML='';
  currentQuiz.forEach((item,qi)=>{
    const cell=document.createElement('button');
    cell.className='nav-cell';
    cell.textContent=qi+1;

      else cell.classList.add('bad');
    }else if(selections[qi].size>0){cell.classList.add('answered');}
    if(flagged[qi])cell.classList.add('flagged');
    cell.onclick=()=>{closeNav();document.getElementById('q-'+qi).scrollIntoView({behavior:'smooth',block:'start'});};
    grid.appendChild(cell);
  });
}

/* ====== GRADE ====== */
function grade(){
  submitted=true;
  stopTimer();
  let correctCount=0;
  currentQuiz.forEach((item,qi)=>{
    const [,,correct,expl]=item;
    const right=new Set(correct);
    const chosen=selections[qi];
    const ok=setEq(chosen,correct);
    if(ok)correctCount++;
    document.querySelectorAll(`.opt[data-qi="${qi}"]`).forEach(lbl=>{
      const oi=+lbl.dataset.oi;
      lbl.classList.remove('correct','wrong');
      if(right.has(oi))lbl.classList.add('correct');
      else if(chosen.has(oi))lbl.classList.add('wrong');
      lbl.querySelector('input').disabled=true;
    });
    const exp=document.getElementById('expl-'+qi);
    let prefix='',cls='ok';
    if(ok)prefix='✓ ';
    else if(chosen.size===0){prefix='• Chưa chọn. ';cls='miss';}
    else {prefix='✗ Sai. ';cls='err';}
    exp.className='expl show '+cls;
    exp.innerHTML=buildExplHtml(qi, prefix, correct, expl, chosen);
  });

  const n=currentQuiz.length;
  const score10=(correctCount*10/n).toFixed(2);
  document.getElementById('score').textContent=`${correctCount}/${n} · ${score10}/10`;
  document.getElementById('score').style.color='#1a1a1a';

  // chỉ lưu best khi làm full đề (không trộn cắt) để công bằng
  if(opts.limit===0) saveBest(deckNum, correctCount, n, score10);

  const result=document.getElementById('result');
  const pct=correctCount/n;
  let verdict;
  if(pct>=0.9)verdict='Quá đỉnh! 🎯';
  else if(pct>=0.7)verdict='Ngon, qua môn thoải mái.';
  else if(pct>=0.5)verdict='Tạm ổn, ôn thêm chút.';
  else verdict='Cày lại đi bro.';
  const wrongCount=n-correctCount;
  let timeNote='';
  if(opts.mode==='exam'){
    const s=Math.floor((Date.now()-startTs)/1000);
    timeNote=` · ⏱ ${Math.floor(s/60)}p${String(s%60).padStart(2,'0')}s`;
  }
  result.innerHTML=`<div class="num">${correctCount}/${n} câu đúng — ${score10}/10 điểm${timeNote}</div>
    <div class="msg">${verdict} Kéo xuống xem câu xanh / đỏ kèm giải thích.</div>
    <div class="result-actions">
      ${wrongCount>0?`<button class="btn btn-primary" onclick="retryWrong()">🔁 Làm lại ${wrongCount} câu sai</button>`:''}
      <button class="btn btn-ghost" onclick="openNav()">⊞ Bản đồ kết quả</button>
      <button class="btn btn-secondary" onclick="resetQuiz()">Làm lại từ đầu</button>
    </div>`;
  result.classList.remove('hidden');
  document.getElementById('grade-btn').textContent='Đã chấm ✓';
  window.scrollTo({top:0,behavior:'smooth'});
}

function retryWrong(){
  // tạo đề mới chỉ gồm các câu đã làm sai
  const wrong=[];
  currentQuiz.forEach((item,qi)=>{ if(!setEq(selections[qi],item[2])) wrong.push(item); });
  if(!wrong.length)return;
  currentQuiz=wrong;
  document.getElementById('quiz-title').textContent=TITLES[deckNum]+` · ôn ${wrong.length} câu sai`;
  resetQuiz();
}

    const LH={head:32,q:25,opt:23,ex:21};
    const ops=[]; let y=PAD;
    ops.push({t:'head',s:`📌 ${idxs.length} câu đã đánh dấu — ${TITLES[deckNum]}`,y}); y+=LH.head;
    ops.push({t:'rule',y:y-8}); y+=8;
    idxs.forEach((qi,n)=>{
      const [q,options,correct,expl]=currentQuiz[qi];
      wrap(`Câu ${qi+1}. ${q}`,FONT.q,CW).forEach(l=>{ops.push({t:'q',s:l,y});y+=LH.q;});
      y+=4;
      options.forEach((opt,oi)=>{
        const isC=correct.includes(oi);
        wrap(`${isC?'✓ ':''}${LETTERS[oi]}. ${opt}`,isC?FONT.optB:FONT.opt,CW-IND)
          .forEach(l=>{ops.push({t:'opt',s:l,y,ok:isC});y+=LH.opt;});
      });
      y+=3;
      ops.push({t:'ans',s:`→ Đáp án đúng: ${correct.map(i=>LETTERS[i]).join(', ')}`,y}); y+=LH.opt;
      if(expl) wrap(expl,FONT.ex,CW).forEach(l=>{ops.push({t:'ex',s:l,y});y+=LH.ex;});
      y+=16;
      if(n<idxs.length-1) ops.push({t:'sep',y:y-9});
    });
    const H=y+PAD-10, dpr=2;
    const cv=document.createElement('canvas');
    cv.width=W*dpr; cv.height=H*dpr;
    const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
    ctx.fillStyle=COL.bg; ctx.fillRect(0,0,W,H);
    ops.forEach(o=>{
      if(o.t==='head'){ctx.font=FONT.head;ctx.fillStyle=COL.head;ctx.fillText(o.s,PAD,o.y+20);}
      else if(o.t==='rule'){ctx.strokeStyle=COL.head;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(PAD,o.y);ctx.lineTo(W-PAD,o.y);ctx.stroke();}
      else if(o.t==='q'){ctx.font=FONT.q;ctx.fillStyle=COL.ink;ctx.fillText(o.s,PAD,o.y+17);}
      else if(o.t==='opt'){ctx.font=o.ok?FONT.optB:FONT.opt;ctx.fillStyle=o.ok?COL.ok:COL.ink;ctx.fillText(o.s,PAD+IND,o.y+15);}
      else if(o.t==='ans'){ctx.font=FONT.optB;ctx.fillStyle=COL.ok;ctx.fillText(o.s,PAD,o.y+15);}
      else if(o.t==='ex'){ctx.font=FONT.ex;ctx.fillStyle=COL.expl;ctx.fillText(o.s,PAD,o.y+14);}
      else if(o.t==='sep'){ctx.strokeStyle=COL.line;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(PAD,o.y);ctx.lineTo(W-PAD,o.y);ctx.stroke();}
    });
    return cv;
  }

  window.captureFlagged=async function(){
    if(typeof flagged==='undefined'||!flagged){showToast('Mở một đề trước đã.');return;}
    const idxs=[]; flagged.forEach((f,i)=>{if(f)idxs.push(i);});
    if(!idxs.length){showToast('⚠️ Chưa đánh dấu câu nào. Bấm 🚩 ở góc mỗi câu trước.');return;}
    const cv=drawCanvas(idxs);
    const toBlob=()=>new Promise(r=>cv.toBlob(r,'image/png'));
    try{
      await navigator.clipboard.write([new ClipboardItem({'image/png':toBlob()})]);
      showToast(`✓ Đã copy ${idxs.length} câu kèm đáp án vào clipboard.`);
    }catch(err){
      try{
        const blob=await toBlob();
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob); a.download=`danh-dau-de${deckNum}.png`;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=>URL.revokeObjectURL(a.href),1000);
        showToast('Trình duyệt chặn copy ảnh — đã tải PNG về máy.');
      }catch(e2){showToast('Không tạo được ảnh: '+e2.message);}
    }
  };

  const btn=document.createElement('button');
  btn.className='cap-toggle';
  btn.title='Chụp các câu đã đánh dấu (kèm đáp án) → clipboard';
  btn.textContent='📸';
  btn.onclick=window.captureFlagged;
  document.getElementById('quiz').appendChild(btn);
})();
</script>

<script>
  let decksMeta = {};
  
  window.onload = function() {
    loadMenuDecks();
  };
  
  function loadMenuDecks() {
    if(!window.cefQuery) {
        document.getElementById('decks-container').innerHTML = 'Đang chạy ngoài JCEF hoặc chưa load xong cefQuery.';
        return;
    }
    window.cefQuery({
      request: 'LIST_DECKS:',
      onSuccess: function(res) {
        try {
          const decks = JSON.parse(res);
          decksMeta = {};
          const container = document.getElementById('decks-container');
          container.innerHTML = '';
          if (decks.length === 0) {
            container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #666; padding: 20px;">Chưa có đề nào. Hãy click "Nhập đề từ Excel" ở thanh công cụ phía trên.</div>';
            return;
          }
          decks.forEach(deck => {
            decksMeta[deck.id] = deck;
            const color = deck.color || '#1a4f8b';
            const title = deck.title || 'Đề thi';
            const count = deck.questionCount || 0;
            const desc = deck.shortDescription || '';
            
            const cardHtml = `
              <div class="card" onclick="fetchAndStart('${deck.id}', false)">
                <div class="accent" style="background:${color}"></div>
                <div class="body">
                  <div class="big" style="color:${color}">${escapeHtml(title)}</div>
                  <div class="mid">${count} câu trắc nghiệm</div>
                  <div class="desc">${escapeHtml(desc)}</div>
                  <div class="best" id="best-${deck.id}"></div>
                  <div class="go" style="background:${color}">Bắt đầu →</div>
                </div>
              </div>
            `;
            container.innerHTML += cardHtml;
          });
          loadBests(); 
        } catch (e) {
          console.error("Lỗi parse list decks", e);
        }
      },
      onFailure: function(code, msg) {
        console.error("Lỗi load decks: ", msg);
        document.getElementById('decks-container').innerHTML = 'Lỗi tải danh sách đề: ' + msg;
      }
    });
  }

  function fetchAndStart(deckId, isFlashcard) {
    if(!window.cefQuery) return;
    window.cefQuery({
        request: 'GET_DECK:' + deckId,
        onSuccess: function(res) {
            try {
                const deckData = JSON.parse(res);
                deckNum = deckId;
                
                baseQuiz = deckData.questions.map(q => {
                    return [
                        q.questionText || '',
                        q.options || [],
                        q.correctOptionIndexes || [0],
                        q.explanation || '',
                        q.wrongExplanations || {}
                    ];
                });
                
                TITLES[deckId] = deckData.title;

                if (isFlashcard) {
                    startFlashcardsMapped();
                } else {
                    startQuizMapped();
                }
            } catch(e) {
                alert("Lỗi parse dữ liệu đề: " + e);
            }
        },
        onFailure: function(code, msg) {
            alert("Lỗi tải đề: " + msg);
        }
    });
  }
  
  function startQuizMapped() {
      opts.shuffleQ = document.getElementById('sw-shuffleQ').checked;
      opts.shuffleO = document.getElementById('sw-shuffleO').checked;
      opts.instant  = document.getElementById('sw-instant').checked;
      currentQuiz=buildRunnable();
      document.getElementById('quiz-title').textContent=TITLES[deckNum]+(opts.limit?` · ${opts.limit} câu`:'');
      document.getElementById('menu').classList.add('hidden');
      document.getElementById('flash').classList.add('hidden');
      document.getElementById('quiz').classList.remove('hidden');
      resetQuiz();
  }
  
  function startFlashcardsMapped(){
      fcDeck=baseQuiz.slice();
      fcIdx=0; fcFlipped=false;
      document.getElementById('fc-title').textContent='Flashcard — '+TITLES[deckNum];
      document.getElementById('menu').classList.add('hidden');
      document.getElementById('quiz').classList.add('hidden');
      document.getElementById('flash').classList.remove('hidden');
      renderCard();
      window.scrollTo(0,0);
  }
  
  startFlashcards = function() {
      const deckIds = Object.keys(decksMeta);
      if (deckIds.length === 0) return alert("Chưa có đề nào!");
      let target = decksMeta[deckNum] ? deckNum : deckIds[0];
      fetchAndStart(target, true);
  };
  
  loadBests = function() {
      const deckIds = Object.keys(decksMeta);
      deckIds.forEach(id => {
          window.cefQuery({
              request: 'GET_BEST_SCORE:' + id,
              onSuccess: function(res) {
                  if (res) {
                      try {
                          const d = JSON.parse(res);
                          const el = document.getElementById('best-'+id);
                          if(el) el.textContent = `🏆 Cao nhất: ${d.correct}/${d.total} (${d.score}/10)`;
                      } catch(e) {}
                  }
              }
          });
      });
  };
  
  saveBest = function(n, correct, total, score) {
      window.cefQuery({
          request: 'SAVE_BEST_SCORE:' + n + '|' + JSON.stringify({correct,total,score}),
          onSuccess: function(res) {
              const el = document.getElementById('best-'+n);
              if(el) el.textContent = `🏆 Cao nhất: ${correct}/${total} (${score}/10)`;
          }
      });
  };
</script>
</body>

</html>
