        // Hàm xáo trộn mảng (Fisher-Yates Shuffle)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        const quizContainer = document.getElementById('quiz');
        const searchInput = document.getElementById('searchInput'); // Bắt ID của ô tìm kiếm

        function buildQuiz() {
            const output = [];

            quizData.forEach((currentQuestion, questionNumber) => {
                // Lấy danh sách keys [a, b, c, d] và xáo trộn chúng
                let answerKeys = Object.keys(currentQuestion.answers);
                shuffleArray(answerKeys);

                const answersHTML = [];
                // Render các đáp án theo thứ tự đã xáo trộn
                answerKeys.forEach(key => {
                    answersHTML.push(
                        `<label id="label-${questionNumber}-${key}" class="option-label">
                            <input type="radio" name="q${questionNumber}" value="${key}" onclick="checkAnswer(${questionNumber}, '${key}')">
                            ${currentQuestion.answers[key]}
                        </label>`
                    );
                });

                // Khung HTML hiển thị câu hỏi, đáp án và khung giải thích ẩn
                output.push(
                    `<div class="question-block" id="question-block-${questionNumber}">
                        <div class="question">${currentQuestion.question}</div>
                        <div class="options">${answersHTML.join('')}</div>
                        <div id="explanation-${questionNumber}" class="explanation"></div>
                    </div>`
                );
            });

            quizContainer.innerHTML = output.join('');
        }

        // Hàm xử lý ngay khi người dùng bấm vào 1 đáp án (ĐÃ SỬA: CHO PHÉP CHỌN LẠI)
        window.checkAnswer = function(questionNumber, selectedKey) {
            const currentQuestion = quizData[questionNumber];
            const correctKey = currentQuestion.correctAnswer;
            const explanationDiv = document.getElementById(`explanation-${questionNumber}`);
            
            // Xóa toàn bộ định dạng đúng/sai cũ của câu hỏi này nếu người dùng chọn lại
            const allLabels = document.querySelectorAll(`#question-block-${questionNumber} .option-label`);
            allLabels.forEach(label => {
                label.classList.remove('correct-answer', 'wrong-answer');
            });

            const selectedLabel = document.getElementById(`label-${questionNumber}-${selectedKey}`);
            const correctLabel = document.getElementById(`label-${questionNumber}-${correctKey}`);

            // Kiểm tra Đúng / Sai và hiển thị màu sắc + giải thích
            if (selectedKey === correctKey) {
                // Làm đúng
                selectedLabel.classList.add('correct-answer');
                explanationDiv.innerHTML = `<strong>✅ Chính xác!</strong><br><br>${currentQuestion.explanation}`;
                explanationDiv.className = "explanation correct-exp";
            } else {
                // Làm sai
                selectedLabel.classList.add('wrong-answer');
                correctLabel.classList.add('correct-answer'); // Highlight luôn câu đúng
                
                explanationDiv.innerHTML = `<strong>❌ Chưa đúng!</strong> Đáp án đúng là phần được bôi xanh.<br><br><strong>Giải thích:</strong> ${currentQuestion.explanation}`;
                explanationDiv.className = "explanation wrong-exp";
            }

            // Hiển thị khung giải thích
            explanationDiv.style.display = "block";
        }

        // TÍNH NĂNG MỚI: XỬ LÝ TÌM KIẾM (Đã nâng cấp tìm cả trong câu hỏi lẫn đáp án)
        if (searchInput) {
            searchInput.addEventListener('input', function(e) {
                const term = e.target.value.toLowerCase().trim();
                const blocks = document.querySelectorAll('.question-block');

                blocks.forEach((block, index) => {
                    // Lấy nội dung câu hỏi
                    const questionText = quizData[index].question.toLowerCase();
                    
                    // Lấy nội dung tất cả các đáp án ghép lại thành 1 chuỗi
                    const answersText = Object.values(quizData[index].answers).join(' ').toLowerCase();
                    
                    // Gộp chung câu hỏi và đáp án để quét từ khóa
                    const fullTextToSearch = questionText + " " + answersText;
                    
                    // Nếu câu hỏi HOẶC đáp án chứa từ khóa thì hiển thị, ngược lại thì ẩn đi
                    if (fullTextToSearch.includes(term)) {
                        block.style.display = "block";
                    } else {
                        block.style.display = "none";
                    }
                });
            });
        }

        // Khởi động render trang
        buildQuiz();
    </script>
