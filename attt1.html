      ["Cho đoạn mã Assembly: MOV A, #0F4H \\n MOV B, #0FH \\n ADD A, B \\n Nội dung trong thanh ghi B sau khi thực hiện đoạn mã trên là:", ["03H", "0FH", "F4H", "00H"], [1], "Lệnh ADD A, B chỉ lưu kết quả vào thanh ghi A. Thanh ghi B đóng vai trò là toán hạng nguồn nên giá trị không thay đổi (vẫn là 0FH).", {}],
      ["Cho đoạn mã Assembly: MOV A, #0FFH \\n ADD A, #2 \\n JNZ SKIP \\n ADDC A, #03H \\n SJMP EXIT \\n SKIP: ADDC A, #02H \\n EXIT: SJMP $ \\n Nội dung thanh ghi A sau khi thực hiện là:", ["0FFH", "05H", "02H", "04H"], [3], "A = FFH + 2 = 01H (CY=1). JNZ SKIP thấy A (01H) khác 0 nên nhảy đến SKIP. Tại SKIP: ADDC A, #02H -> A = 01H + 02H + CY(1) = 04H.", {}],
      ["Cho đoạn mã Assembly: MOV A, #0FFH \\n INC A \\n Nội dung trong thanh ghi A sau khi thực hiện đoạn mã trên là:", ["00H", "01H", "FFH", "FEH"], [0], "FFH (255) cộng thêm 1 sẽ tràn khung 8-bit và quay trở lại 00H.", {}],
      ["Cho đoạn mã Assembly: MOV R0, #20H \\n MOV A, #36H \\n MOV 20H, #75H \\n XCHD A, @R0 \\n Nội dung trong thanh ghi A sau khi thực hiện đoạn mã trên là:", ["35H", "76H", "36H", "75H"], [0], "XCHD hoán đổi 4 bit thấp (nibble thấp) của A và RAM gián tiếp @R0 (ô nhớ 20H). Nibble thấp của A là 6, của 20H là 5. Đổi chỗ -> A=35H, mem[20H]=76H.", {}],
      ["Cho đoạn mã Assembly: MOV A, #30H \\n MOV R1, #0F0H \\n MOV @R1, A \\n MOV A, @R1 \\n Nội dung trong thanh ghi R1 sau khi thực hiện đoạn mã trên là:", ["30H", "00H", "F0H", "FFH"], [2], "R1 chỉ được gán giá trị F0H ở lệnh thứ 2. Các lệnh sau dùng R1 làm con trỏ địa chỉ (@R1), không làm thay đổi bản thân R1.", {}],
      ["Cho đoạn mã Assembly: MOV A, #0C3H \\n MOV R0, #0AAH \\n ADD A, R0 \\n Nội dung trong thanh ghi R0 sau khi thực hiện đoạn mã trên là:", ["C3H", "AAH", "6DH", "00H"], [1], "ADD A, R0 chỉ thay đổi A. Thanh ghi R0 là nguồn nên giữ nguyên giá trị AAH.", {}],
      ["Cho đoạn mã Assembly: MOV R0, #7FH \\n MOV 7EH, #00H \\n MOV 7FH, #40H \\n DEC @R0 \\n DEC R0 \\n DEC @R0 \\n Nội dung trong ô nhớ có địa chỉ 7FH sau khi thực hiện đoạn mã là:", ["40H", "00H", "FFH", "3FH"], [3], "R0=7FH. `DEC @R0` -> mem[7FH] = 40H - 1 = 3FH. Sau đó `DEC R0` -> R0=7EH. `DEC @R0` lúc này giảm mem[7EH]. Vậy mem[7FH] dừng lại ở 3FH.", {}],
      ["Cho đoạn mã Assembly: MOV R1, #3 \\n MOV A, #17 \\n LOOP: SETB C \\n SUBB A, #2 \\n DJNZ R1, LOOP \\n Nội dung trong thanh ghi A sau khi thực hiện đoạn chương trình trên:", ["10", "11", "8", "17"], [2], "Vòng lặp chạy 3 lần (R1=3). Mỗi vòng: C=1, SUBB A,#2 -> A = A - 2 - 1 = A - 3. Sau 3 vòng, A = 17 - 3*3 = 8.", {}],
      ["Cho đoạn mã Assembly: MOV A, #0FFH \\n ADD A, #2 \\n JZ SKIP \\n ADDC A, #02H \\n SJMP EXIT \\n SKIP: ADDC A, #01H \\n EXIT: SJMP $ \\n Nội dung trong thanh ghi A là:", ["03H", "04H", "02H", "0FFH"], [1], "A=FFH+2=01H (CY=1). JZ SKIP thấy A khác 0 nên KHÔNG nhảy. Lệnh tiếp theo: ADDC A, #02H -> A = 01H + 02H + CY(1) = 04H.", {}],
      ["Cho đoạn mã Assembly: MOV A, #93H \\n MOV R0, #77H \\n ADD A, R0 \\n ADDC A, R0 \\n Nội dung trong thanh ghi R0 sau khi thực hiện đoạn mã trên là:", ["93H", "0AH", "77H", "00H"], [2], "Lệnh ADD và ADDC chỉ lưu kết quả vào thanh ghi A. R0 làm toán hạng nguồn nên không thay đổi (77H).", {}],
      ["Cho đoạn mã Assembly: MOV R0, #7FH \\n MOV 7EH, #0ADH \\n MOV 7FH, #26H \\n DEC R0 \\n MOV A, 7FH \\n XRL A, @R0 \\n MOV R0, A \\n XRL A, 7FH \\n Nội dung thanh ghi R0 là:", ["8BH", "ADH", "26H", "7FH"], [0], "R0=7EH. A=mem[7FH]=26H. A = 26H ^ mem[7EH](ADH) = 8BH. MOV R0, A -> R0 = 8BH. (Lệnh XRL cuối thay đổi A chứ không đổi R0).", {}],
      ["Cho đoạn mã Assembly: MOV P2, #5BH \\n CPL P2.0 \\n SETB P2.7 \\n Nội dung trong thanh ghi P2 sau khi thực hiện đoạn mã trên là:", ["DAH", "5AH", "DBH", "DBH"], [0], "P2 = 5BH (0101 1011). CPL P2.0 -> 0101 1010 (5AH). SETB P2.7 -> 1101 1010 (DAH).", {}],
      ["Cho đoạn mã Assembly: MOV A, #77H \\n MOV B, #07H \\n DIV AB \\n Nội dung trong thanh ghi A sau khi thực hiện đoạn mã trên là:", ["77H", "11H", "00H", "0AH"], [1], "DIV AB thực hiện phép chia A cho B. A chứa thương số, B chứa phần dư. 77H = 119, 07H = 7. 119 / 7 = 17 = 11H. Nên A=11H.", {}],
      ["Cho đoạn mã Assembly: MOV R1, #3 \\n MOV A, #17 \\n SETB C \\n LOOP: SUBB A, #2 \\n DJNZ R1, LOOP \\n Nội dung trong thanh ghi A sau khi thực hiện đoạn chương trình trên:", ["10", "11", "12", "17"], [0], "Ban đầu C=1. Lần 1: SUBB A,#2 -> A=17-2-1=14. (Phép trừ 17-3 không mượn nên C=0). Lần 2: SUBB A,#2 -> A=14-2-0=12 (C=0). Lần 3: SUBB A,#2 -> A=12-2-0=10.", {}],
      ["Cho đoạn mã Assembly: MOV R0, #7EH \\n MOV 7EH, #00H \\n MOV 7FH, #40H \\n INC @R0 \\n INC R0 \\n INC @R0 \\n Nội dung trong thanh ghi R0 sau khi thực hiện là:", ["7EH", "40H", "7FH", "41H"], [2], "INC R0 tăng con trỏ R0 từ 7EH lên thành 7FH. Các lệnh INC @R0 tác động vào ô nhớ chứ không tác động bản thân R0.", {}],
      ["Cho đoạn mã Assembly: SETB C \\n MOV A, #0C9H \\n MOV R2, #54H \\n SUBB A, R2 \\n Nội dung trong thanh ghi A sau khi thực hiện đoạn mã trên là:", ["74H", "75H", "76H", "00H"], [0], "C=1. SUBB A, R2 -> A = C9H - 54H - 1 = 201 - 84 - 1 = 116 = 74H.", {}],
      ["Cho đoạn mã Assembly: MOV P2, #00H \\n CPL P2.1 \\n CPL P2.0 \\n CPL P2.7 \\n Nội dung trong thanh ghi P2 sau khi thực hiện đoạn mã trên là:", ["03H", "81H", "83H", "82H"], [2], "00H = 0000 0000. Đảo bit 1, 0, 7 -> 1000 0011 = 83H.", {}],
      ["Cho đoạn mã Assembly: MOV A, #00H \\n DEC A \\n Nội dung trong thanh ghi A sau khi thực hiện đoạn mã trên là:", ["00H", "FFH", "FEH", "01H"], [1], "A=00H. Giảm đi 1 sẽ mượn qua ranh giới 8-bit và cuộn lại thành giá trị lớn nhất là FFH.", {}],
      ["Cho đoạn mã: MOV 30H, #02H \\n MOV A, 30H \\n MOV DPTR, #TABLE \\n MOVC A, @A+DPTR \\n MOV P1, A \\n TABLE: DB 0C0H, 0F9H, 0A4H... Nội dung P1 sau khi thực hiện:", ["02H", "30H", "0F9H", "0A4H"], [3], "A=02H. MOVC A, @A+DPTR lấy phần tử thứ 2 trong bảng TABLE (bắt đầu từ 0). Phần tử 0: C0H, 1: F9H, 2: A4H. Do đó A=A4H, P1=A4H.", {}],
      ["Cho mã Assembly: MOV R0, #7EH \\n MOV 7EH, #55H \\n MOV 7FH, #4FH \\n INC R0 \\n MOV A, 7EH \\n ORL A, @R0 \\n MOV R0, A \\n ORL A, 7EH \\n Nội dung ô nhớ 7EH là:", ["4FH", "5FH", "55H", "7EH"], [2], "Ô nhớ 7EH chỉ được gán giá trị 55H ở đầu. Các lệnh ORL đều thực hiện trên A và lưu kết quả vào A. Lệnh MOV R0, A thay đổi thanh ghi R0, không đổi ô nhớ 7EH.", {}],
      ["Cho đoạn mã Assembly: MOV R0, #7EH \\n MOV 7EH, #00H \\n MOV 7FH, #40H \\n INC @R0 \\n INC R0 \\n INC @R0 \\n Nội dung trong ô nhớ có địa chỉ 7FH là:", ["40H", "41H", "01H", "00H"], [1], "Ban đầu mem[7FH]=40H. R0=7EH. INC R0 -> R0=7FH. INC @R0 -> tăng mem[7FH] lên thành 40H + 1 = 41H.", {}],
      ["Cho đoạn mã Assembly: MOV A, #0FFH \\n ADD A, #2H \\n Nội dung trong thanh ghi A sau khi thực hiện đoạn mã trên là:", ["00H", "FFH", "01H", "02H"], [2], "FFH + 2 = 01H (nhớ CY=1). Giá trị lưu lại trong A là 01H.", {}],
      ["Cho đoạn mã Assembly: MOV A, #0FFH \\n ADD A, #1 \\n JZ SKIP \\n ADDC A, #03H \\n SJMP EXIT \\n SKIP: ADDC A, #03H \\n EXIT: SJMP $ \\n Nội dung thanh ghi A là:", ["02H", "05H", "04H", "0FFH"], [2], "A=FFH+1=00H (CY=1). JZ SKIP thấy A=0 nên NHẢY đến SKIP. Tại SKIP: ADDC A, #03H -> A = 00H + 03H + CY(1) = 04H.", {}],
      ["Cho đoạn mã Assembly: MOV R1, #0F0H \\n MOV @R1, #0FH \\n MOV A, #0F0H \\n ADD A, @R1 \\n Nội dung trong thanh ghi R1 sau khi thực hiện đoạn mã trên là:", ["0FH", "FFH", "F0H", "00H"], [2], "R1 = F0H. Các lệnh sau dùng @R1 (ô nhớ F0H) chứ không thay đổi bản thân thanh ghi con trỏ R1.", {}],
      ["Cho đoạn mã Assembly: MOV P1, #0FFH \\n CLR P1.0 \\n Nội dung trong thanh ghi P1 sau khi thực hiện đoạn mã trên là:", ["0FEH", "00H", "01H", "0FFH"], [0], "P1 = FFH (1111 1111). Xóa bit 0 về 0 -> 1111 1110 = FEH.", {}],
      ["Cho đoạn mã Assembly: MOV A, #55H \\n SUBB A, #56H \\n Nội dung trong thanh ghi A sau khi thực hiện đoạn mã trên là:", ["01H", "00H", "FFH", "FEH"], [2], "SUBB A, #56H (mặc định C=0 ban đầu) -> A = 55H - 56H = FFH (mượn CY=1).", {}],
      ["Cho đoạn mã Assembly: MOV A, #0B6H \\n RL A \\n Nội dung trong thanh ghi A sau khi thực hiện đoạn mã trên là:", ["B6H", "6DH", "5BH", "D6H"], [1], "A = B6H (1011 0110). RL A quay trái 1 bit (bit 7 đẩy xuống bit 0) -> 0110 1101 = 6DH.", {}],
      ["Cho đoạn mã Assembly: MOV P1, #0ABH \\n MOV C, P1.0 \\n ANL C, /P1.6 \\n MOV P1.4, C \\n Nội dung trong thanh ghi P1 là:", ["0BBH", "0ABH", "0A3H", "8BH"], [0], "P1=ABH (1010 1011). P1.0=1, P1.6=0. C = P1.0 = 1. /P1.6 = ~0 = 1. C = 1 AND 1 = 1. Ghi C vào P1.4 -> P1=1011 1011 = BBH.", {}],
      ["Cho đoạn mã Assembly: MOV A, #0A3H \\n ADD A, #0E6H \\n RRC A \\n Nội dung trong thanh ghi A sau khi thực hiện đoạn mã trên là:", ["89H", "C4H", "44H", "22H"], [1], "A3H+E6H = 189H -> A=89H (1000 1001), CY=1. RRC A dịch phải qua C. C đẩy vào bit 7, bit 0 đẩy ra C. -> A = 1100 0100 = C4H.", {}],
      ["Cho đoạn mã Assembly: MOV A, #0FFH \\n MOV R0, #0F0H \\n XRL A, R0 \\n Nội dung trong thanh ghi R0 sau khi thực hiện đoạn mã trên là:", ["0FFH", "0FH", "F0H", "00H"], [2], "Lệnh XRL A, R0 ghi kết quả vào A. Thanh ghi R0 không bị thay đổi (vẫn là F0H).", {}],
      ["Cho đoạn mã: MOV A, #5AH \\n MOV 5AH, A \\n ANL 5AH, #0BDH \\n CPL A \\n ANL 5AH, A \\n Nội dung trong ô nhớ có địa chỉ 5AH là:", ["5AH", "18H", "A5H", "00H"], [3], "mem[5AH] = 5AH. ANL với BDH -> mem = 5AH & BDH = 18H. A = ~5AH = A5H. ANL 5AH, A -> mem = 18H & A5H = 00H.", {}],
      ["Cho đoạn mã Assembly: MOV A, #0C5H \\n SWAP A \\n ADD A, #32H \\n Nội dung trong thanh ghi A sau khi thực hiện đoạn mã trên là:", ["5CH", "8EH", "F7H", "C5H"], [1], "SWAP A -> A=5CH. ADD A, #32H -> 5CH + 32H = 8EH.", {}],
      ["Cho đoạn mã Assembly: MOV A, #0F0H \\n ORL A, #0FH \\n Nội dung trong thanh ghi A sau khi thực hiện đoạn mã trên là:", ["F0H", "0FH", "FFH", "00H"], [2], "F0H (1111 0000) OR với 0FH (0000 1111) kết quả sẽ là FFH (1111 1111).", {}],
      ["Cho đoạn mã Assembly: MOV A, #0C3H \\n MOV 20H, #77H \\n ADD A, 20H \\n ADDC A, 20H \\n Nội dung trong thanh ghi A sau khi thực hiện đoạn mã trên là:", ["B2H", "3AH", "C3H", "77H"], [0], "A=C3H+77H = 3AH (CY=1). ADDC A, 20H -> A=3AH+77H+CY(1) = B2H.", {}],
      ["Cho đoạn mã Assembly: CLR C \\n MOV A, #0FFH \\n MOV B, #05H \\n SUBB A, B \\n Nội dung trong thanh ghi B sau khi thực hiện đoạn mã trên là:", ["FAH", "05H", "FFH", "00H"], [1], "Lệnh SUBB A, B thực hiện trừ và lưu vào A. Thanh ghi B làm toán hạng nguồn nên giữ nguyên giá trị 05H.", {}],
      ["Cho đoạn mã Assembly: MOV A, #30H \\n MOV R1, #0F0H \\n MOV @R1, A \\n MOV A, @R1 \\n Nội dung trong thanh ghi A sau khi thực hiện đoạn mã trên là:", ["F0H", "00H", "30H", "FFH"], [2], "mem[F0H] = 30H. Lệnh MOV A, @R1 chép lại giá trị từ mem[F0H] vào A. Do đó A = 30H.", {}],
      ["Cho đoạn mã Assembly: MOV A, #22H \\n MOV B, #10H \\n MUL AB \\n Nội dung trong thanh ghi B sau khi thực hiện đoạn mã trên là:", ["00H", "20H", "02H", "22H"], [2], "22H(34) * 10H(16) = 544 = 0220H. MUL AB lưu byte thấp vào A (20H), byte cao vào B (02H).", {}],
      ["Cho đoạn mã Assembly: MOV P1, #0ABH \\n MOV C, P1.0 \\n ANL C, P1.6 \\n MOV P1.5, C \\n Nội dung trong thanh ghi P1 sau khi thực hiện đoạn mã trên là:", ["8BH", "ABH", "0BBH", "00H"], [0], "P1=ABH (1010 1011). P1.0=1, P1.6=0. C = 1 & 0 = 0. Ghi C vào P1.5 -> P1 = 1000 1011 = 8BH.", {}],
      ["Cho đoạn mã Assembly: MOV A, #0C3H \\n MOV R0, #55H \\n ANL A, R0 \\n Nội dung trong thanh ghi R0 sau khi thực hiện đoạn mã trên là:", ["C3H", "55H", "41H", "00H"], [1], "ANL A, R0 chỉ lưu kết quả vào A. Thanh ghi R0 không đổi, giữ nguyên giá trị 55H.", {}],
      ["Cho đoạn mã: MOV A, #5AH \\n MOV 5AH, A \\n ORL 5AH, #22H \\n CPL A \\n ORL 5AH, A \\n Nội dung trong ô nhớ có địa chỉ 5AH là:", ["5AH", "22H", "7AH", "0FFH"], [3], "mem[5AH]=5AH. ORL với 22H -> 5AH | 22H = 7AH. A = ~5AH = A5H. mem[5AH] = 7AH | A5H = FFH.", {}],
      ["Cho đoạn mã Assembly: MOV A, #77H \\n MOV B, #07H \\n DIV AB \\n Nội dung trong thanh ghi B sau khi thực hiện đoạn mã trên là:", ["11H", "00H", "77H", "07H"], [1], "DIV AB thực hiện A/B. A chứa thương số, B chứa phần dư. 77H (119) / 07H (7) = 17 (11H) dư 0. Do đó B = 00H.", {}],
      ["Cho đoạn mã Assembly: MOV A, #0ABH \\n CLR C \\n ADDC A, #0BAH \\n Nội dung trong thanh ghi A sau khi thực hiện đoạn mã trên là:", ["65H", "165H", "ABH", "BAH"], [0], "ABH + BAH + 0 = 165H. Thanh ghi A chỉ chứa 8-bit nên giữ lại 65H (CY=1).", {}],
      ["Cho đoạn mã Assembly: MOV P3, #5BH \\n CPL P3.1 \\n CPL P3.2 \\n Nội dung trong thanh ghi P3 sau khi thực hiện đoạn mã trên là:", ["5BH", "5DH", "59H", "5FH"], [1], "P3=5BH (0101 1011). Đảo bit 1 (thành 0) và đảo bit 2 (thành 1) -> 0101 1101 = 5DH.", {}]
    ]
  },
  {
    id: 13,
    title: "Part 13",
    desc: "Chương trình con & Hoàn thiện mã lệnh (Trích xuất 100% từ ảnh)",
    color: "#27ae60", // Màu xanh lá sắc nét
    data: [
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới có nội dung trong thanh ghi A là 80H:\nORG 0000H\nMOV A, #___\nRL A\nEND", ["40H", "80H", "01H", "02H"], [0], "Để A = 80H (1000 0000B) sau lệnh quay trái (RL A), thì trước đó A phải có giá trị là 40H (0100 0000B).", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới đây có nội dung trong thanh ghi B là 28H, thanh ghi A là 00H:\nORG 0000H\nMOV A, #___\nMOV B, #0A0H\nMUL AB\nEND", ["40H", "28H", "A0H", "00H"], [0], "Kết quả phép nhân là 2800H (10240 hệ thập phân). B=0A0H (160). Ta có: A * 160 = 10240 -> A = 64 (40H).", {}],
      ["Xác định chức năng của chương trình con dưới đây:\nORG 0200H\nMOV 21H, #0\nMOV R2, #08H\nMOV A, 20H\nLOP:\nRLC A\nJNC LP1\nINC 21H\nLP1: DJNZ R2, LOP\nRET", ["Tìm số các số 1 trong nội dung trong ô nhớ RAM 20H, nội dung lưu trong ô nhớ 21H", "Tìm các số 0 trong nội dung trong ô nhớ RAM 20H, nội dung lưu trong ô nhớ 21H", "Tìm các số 0 trong nội dung trong ô nhớ RAM 21H, nội dung lưu trong ô nhớ 20H", "Tìm số các số 1 trong nội dung trong ô nhớ RAM 21H, nội dung lưu trong ô nhớ 20H"], [0], "Chương trình quay (RLC) từng bit của ô nhớ 20H qua cờ Carry. Mỗi khi Carry = 1, nó tăng giá trị ô nhớ 21H lên 1. Đây là thuật toán đếm số lượng bit 1.", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới có nội dung trong thanh ghi A là 91H:\nORG 0000H\nMOV A, #15H\nSWAP A\nORL A, #___\nEND", ["80H", "91H", "15H", "00H"], [0], "A ban đầu = 15H. Lệnh SWAP A đảo 4 bit thành 51H (0101 0001B). Để A thành 91H (1001 0001B), cần thực hiện OR logic với 80H (1000 0000B).", {}],
      ["Xác định chức năng của chương trình con dưới đây:\nFUN1: MOV A, @R1\nMOV R2, A\nCLR A\nLP1: INC R1\nCLR C\nSUBB A, @R1\nJNC LP3\nMOV A, @R1\nSJMP LP4\nLP3: ADD A, @R1\nLP4: DJNZ R2, LP1\nRET", ["Tìm giá trị lớn nhất của một số đặt trong thanh ghi A (Tìm Max mảng)", "Tìm giá trị nhỏ nhất của một số đặt trong thanh ghi A", "Tìm bình phương của một số", "Tìm căn bậc hai của một số"], [0], "Đây là thuật toán tìm phần tử lớn nhất (Max) trong mảng. Nó so sánh A (Max tạm thời) với phần tử tiếp theo (@R1). Nếu @R1 > A, nó cập nhật A = @R1.", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới có nội dung trong thanh ghi A là C1H.\nORG 0000H\nMOV A, #___\nADD A, #0CDH\nRRC A\nEND", ["B5H", "C1H", "00H", "FFH"], [0], "Sau RRC A, A = C1H (1100 0001B), tức là trước đó C=1 và A=1000 0010B (82H). Ta có: X + CDH = 182H (có nhớ). X = 182H - CDH = B5H.", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới đây có nội dung trong thanh ghi A là 7BH.\nORG 0000H\nMOV R0, #31H\nMOV R1, #4BH\nMOV 30H, #___\nDEC R0\nMOV A, R1\nADD A, @R0\nEND", ["30H", "7BH", "4BH", "31H"], [0], "DEC R0 làm R0 = 30H. Lệnh ADD A, @R0 lấy 4BH + mem[30H]. Để kết quả = 7BH, mem[30H] phải bằng 7BH - 4BH = 30H.", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới có nội dung trong thanh ghi A là 27H\nORG 0000H\nMOV A, #32H\nADD A, #___\nSWAP A\nEND", ["40H", "27H", "72H", "32H"], [0], "Sau SWAP A, A = 27H. Tức là trước SWAP, A = 72H. Ta có 32H + X = 72H -> X = 40H.", {}],
      ["Chương trình Assembly trên vi điều khiển 89C51 dưới đây. Nội dung trong thanh ghi A là:\nORG 0000H\nMOV R1, #5\nMOV A, #3BH\nLAP: RL A\nDJNZ R1, LAP\nEND", ["67H", "76H", "B3H", "D9H"], [0], "A = 3BH (0011 1011B). Lệnh quay trái RL 5 lần trong thanh ghi 8-bit tương đương với quay phải (RR) 3 lần. Kết quả là 0110 0111B = 67H.", {}],
      ["Chương trình Assembly trên vi điều khiển 89C51 dưới đây. Nội dung trong thanh ghi A là:\nORG 0000H\nMOV R1, #2BH\nCJNE R1, #2BH, NHAN\nMOV A, #4BH\nSJMP KETTHUC\nNHAN: MOV A, #0B4H\nKETTHUC: END", ["4BH", "B2H", "2BH", "B4H"], [0], "Lệnh CJNE so sánh R1 (2BH) và #2BH. Bằng nhau nên KHÔNG nhảy đến nhãn NHAN. Lệnh tiếp theo `MOV A, #4BH` được thực thi.", {}],
      ["Xác định chức năng của chương trình con (DL) với R0=10, R1=250 chạy 2 lệnh DJNZ lồng nhau (Biết chu kỳ máy = 1µs):", ["Tạo trễ thời gian 5000µs", "Tạo trễ thời gian 5µs", "Tạo trễ thời gian 500µs", "Tạo trễ thời gian 50µs"], [0], "Vòng lặp trong (R1=250) tốn 250 * 2 = 500 chu kỳ (500µs). Vòng lặp ngoài (R0=10) chạy 10 lần -> 10 * 500µs = 5000µs.", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới đây có nội dung trong thanh ghi A là 1CH.\nORG 0000H\nMOV 60H, #1CH\nMOV R1, #___\nMOV A, @R1\nEND", ["60H", "1CH", "DFH", "00H"], [0], "Để A đọc được 1CH từ chế độ gián tiếp qua @R1, R1 phải chứa địa chỉ của ô nhớ đang lưu 1CH, tức là 60H.", {}],
      ["Xác định chức năng của chương trình con dưới đây:\nSQR:\nADD A, #01H\nMOVC A, @A+PC\nRET\nTAB:\nDB 0, 1, 4, 9, 16, 25\nDB 36, 49, 64, 81", ["Tìm giá trị đặt tại bảng tra tương ứng (Bình phương của một số)", "Tìm giá trị nhỏ nhất của một các số trong bảng tra", "Tìm giá trị lớn nhất của một các số trong bảng tra", "Cất giá trị tìm được vào bảng tra"], [0], "MOVC kết hợp bảng tra (Look-Up Table). Bảng chứa các số chính phương (0, 1, 4, 9...). Chức năng là tìm bình phương của A.", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới có nội dung trong thanh ghi A là 34H\nORG 0000H\nMOV 40H, #0FH\nMOV 41H, #___\nMOV R1, #40H\nINC R1\nMOV A, 40H\nXRL A, @R1\nEND", ["3BH", "34H", "0FH", "40H"], [0], "R1 = 41H. Phép toán: A = 40H ^ @R1 = 0FH ^ X = 34H. Vậy X = 0FH ^ 34H = 0000 1111B ^ 0011 0100B = 0011 1011B = 3BH.", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới đây có nội dung trong thanh ghi B là 02H, thanh ghi A là 04H:\nORG 0000H\nMOV A, #30\nMOV B, #___\nDIV AB\nEND", ["07H", "04H", "02H", "30H"], [0], "DIV AB lấy A chia B. A chứa thương (04), B chứa dư (02). Ta có phương trình: X * 4 + 2 = 30 -> 4X = 28 -> X = 7 (07H).", {}],
      ["Xác định chức năng của chương trình con dưới đây (Tạo trễ 3 vòng lặp với R7=5, R6=200, R5=250):", ["Tạo trễ thời gian 500ms", "Tạo trễ thời gian 50ms", "Tạo trễ thời gian 5s", "Tạo trễ thời gian 5ms"], [0], "Vòng 1: 250*2 = 500µs. Vòng 2: 200*500µs = 100,000µs = 100ms. Vòng 3: 5*100ms = 500ms.", {}],
      ["Chương trình Assembly trên vi điều khiển 89C51 dưới đây. Nội dung trong thanh ghi A là:\nORG 0000H\nMOV R1, #30H\nCJNE R1, #30, NHAN\nMOV A, #45H\nSJMP KETTHUC\nNHAN: MOV A, #54H\nKETTHUC: END", ["54H", "45H", "30H", "35H"], [0], "R1 = 30H (48). Lệnh CJNE so sánh với số thập phân #30. Vì 48 khác 30 nên lệnh thực hiện nhảy tới NHAN, gán A = 54H.", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới có nội dung trong thanh ghi A là 19H\nMOV A, #___\nRR A\nEND", ["32H", "19H", "8CH", "00H"], [0], "Đích A = 19H (0001 1001B). Trước khi quay phải (RR), ta dịch bit ngược về trái -> 0011 0010B = 32H.", {}],
      ["Chương trình sử dụng Timer 0 ở chế độ 2 (Auto-reload). Giá trị nạp lại là 56 (TH0=56) và giá trị bắt đầu là 216 (TL0=216). Chương trình thực hiện chức năng gì?", ["Chương trình sử dụng timer 0 tạo sóng vuông có thời gian xung cao 40µs và xung thấp là 200µs trên chân P1.6.", "Chương trình sử dụng timer 0 tạo sóng vuông có thời gian xung cao 50µs và xung thấp là 200µs trên chân P1.6.", "Chương trình sử dụng timer 0 tạo sóng vuông có tần số 50kHz trên chân P1.6.", "Chương trình sử dụng timer 1 tạo sóng vuông có chu kỳ 200µs trên chân P1.6."], [0], "Từ 216 đếm đến 256 tốn 40µs (khi P1.6 đang mức cao). Sau khi tràn, nó tự nạp lại 56, đếm tốn 200µs (khi P1.6 mức thấp). Vậy Cao = 40µs, Thấp = 200µs.", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới đây có nội dung trong thanh ghi B là 02H, thanh ghi A là 58H:\nORG 0000H\nMOV A, #15\nMOV B, #___\nMUL AB\nEND", ["28H", "40H", "02H", "58H"], [0], "Kết quả nhân là 0258H (600 hệ thập phân). Ta có: 15 * X = 600 -> X = 40. Giá trị 40 đổi sang Hex là 28H.", {}],
      ["Chương trình Assembly trên vi điều khiển 89C51 dưới đây. Nội dung ô nhớ có địa chỉ 30H là:\nMOV A, #3BH\nMOV R0, #0B3H\nADD A, R0\nCJNE A, #0EEH, NHAN\nMOV 30H, #23\nSJMP KETTHUC\nNHAN: MOV 30H, #32\nKETTHUC: END", ["17H", "23H", "32H", "EEH"], [0], "A = 3BH + B3H = EEH. CJNE thấy A == EEH nên KHÔNG nhảy. Thực hiện MOV 30H, #23 (số thập phân 23). Đổi sang Hex là 17H.", {}],
      ["Chương trình Assembly trên vi điều khiển 89C51 dưới đây. Nội dung trong thanh ghi A là:\nORG 0000H\nMOV R1, #10\nMOV A, #20\nLAP: ADD A, #2\nDJNZ R1, LAP\nEND", ["28H", "30H", "20H", "40H"], [0], "Thêm 2 vào A, lặp 10 lần -> A = 20 + 2*10 = 40. Đổi số 40 hệ thập phân sang Hex ta được 28H.", {}],
      ["Xác định chức năng của chương trình con dưới đây:\nMOV 2FH, #0\nMOV R0, #40H\nLOP: MOV A, @R0\nCPL A\nJNZ LP1\nRET\nLP1: INC 2FH\nINC R0\nSJMP LOP", ["Đếm độ dài của khối dữ liệu có địa chỉ bắt đầu từ địa chỉ 40H", "Đếm độ dài của khối dữ liệu có địa chỉ bắt đầu từ địa chỉ FFH", "Đếm độ dài của khối dữ liệu có địa chỉ bắt đầu từ địa chỉ 20H", "Đếm độ dài của khối dữ liệu có địa chỉ bắt đầu từ địa chỉ 00H"], [0], "Chương trình đếm số byte (lưu vào 2FH) từ địa chỉ 40H trở đi cho đến khi gặp dữ liệu là FFH (CPL FFH = 00H -> JNZ thoát loop).", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới có nội dung trong thanh ghi A là 5AH\nORG 0000H\nMOV A, #___\nRL A\nEND", ["ADH", "5AH", "2DH", "B4H"], [0], "A sau RL là 5AH (0101 1010). Dịch ngược lại (RR) để tìm số ban đầu -> 1010 1101 = ADH.", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới đây có nội dung trong thanh ghi B là 05H, thanh ghi A là 40H:\nORG 0000H\nMOV A, #15H\nMOV B, #___\nMUL AB\nEND", ["40H", "05H", "15H", "64H"], [0], "Kết quả 0540H = 1344. A = 15H = 21. B = 1344 / 21 = 64. Đổi 64 sang Hex là 40H.", {}],
      ["Xác định chức năng của chương trình con dưới đây:\nORG 0200H\nMOV DPTR, #1000H\nMOV R2, #51H\nCLR A\nLOP: MOVX @DPTR, A\nINC DPTR\nDJNZ R2, LOP\nRET", ["Xóa nội dung trong ô nhớ từ 1000 đến 1050 về 0", "Xóa nội dung trong ô nhớ từ 1000 đến 1051 về 0", "Đặt nội dung trong ô nhớ từ 1000 đến 1050 lên 1", "Đặt nội dung trong ô nhớ từ 1000 đến 1051 lên 1"], [0], "Lặp 51H lần (81 lần). Xóa các ô nhớ từ 1000H. Ô cuối cùng là 1000H + 50H = 1050H.", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới đây có nội dung trong thanh ghi A là 7CH\nORG 0000H\nMOV R0, #30H\nMOV 31H, #___\nMOV A, R0\nINC A\nMOV R0, A\nADD A, @R0\nEND", ["4BH", "7CH", "31H", "30H"], [0], "R0 = 31H. A = 31H + mem[31H] = 7CH. Vậy mem[31H] = 7CH - 31H = 4BH.", {}],
      ["Chương trình Assembly trên vi điều khiển 89C51 dưới đây. Nội dung trong thanh ghi A là:\nMOV R1, #10\nMOV A, #100\nLAP: DEC A\nDJNZ R1, LAP\nEND", ["5AH", "99H", "10H", "64H"], [0], "A = 100. Trừ đi 1 trong vòng lặp 10 lần -> A = 90. Đổi 90 sang Hex là 5AH.", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới đây set bit thứ 1, 2, 5 của P0 lên 1, các bit còn lại giữ nguyên giá trị:\nORG 0000H\nMOV P0, #0B3H\nMOV 30H, #26H\nORL P0, #___\nEND", ["26H", "0B3H", "D9H", "00H"], [0], "Để bật bit 1, 2, 5 lên mức 1, mặt nạ ORL phải có bit 1 ở các vị trí đó: 0010 0110B = 26H.", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình thực hiện trên vi điều khiển 89C51 có nội dung trong thanh ghi A là 7CH và ô nhớ địa chỉ 30H là 4BH\nMOV R0, #30H\nMOV A, #___\nMOV 30H, #4CH\nXCHD A, @R0\nEND", ["7BH", "7CH", "4BH", "4CH"], [0], "XCHD hoán đổi Nibble thấp của A và mem[30H]. Kết quả mem[30H]=4BH -> B lấy từ Nibble thấp của A cũ. Kết quả A=7CH -> C lấy từ Nibble thấp của mem[30H] cũ. Vậy A cũ là 7BH.", {}],
      ["Xác định chức năng của chương trình con tạo trễ với 3 vòng lặp (R5=10, R6=200, R7=250):", ["Tạo trễ thời gian 1s", "Tạo trễ thời gian 100ms", "Tạo trễ thời gian 10ms", "Tạo trễ thời gian 1ms"], [0], "Vòng trong: 250*2=500µs. Vòng giữa: 200*500µs=100ms. Vòng ngoài: 10*100ms=1000ms = 1s.", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới có nội dung trong thanh ghi A là 2CH\nMOV A, #18\nMOV R1, #48\nMOV 30H, #___\nXRL A, @R1\nEND", ["3EH", "2CH", "12H", "30H"], [0], "A ban đầu = 18 = 12H. @R1 trỏ tới 30H. Ta có: 12H ^ X = 2CH -> X = 12H ^ 2CH = 3EH.", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới có nội dung trong thanh ghi A là 40H\nMOV A, #___\nSWAP A\nEND", ["04H", "40H", "00H", "FFH"], [0], "Trước khi SWAP, thanh ghi A phải chứa giá trị ngược Nibble lại là 04H.", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới có nội dung trong thanh ghi R1 là 4EH.\nMOV A, #___\nMOV R1, #20H\nXCH A, R1\nEND", ["4EH", "20H", "00H", "FFH"], [0], "Lệnh XCH đổi chỗ nội dung A và R1. R1 cuối cùng lấy giá trị cũ của A, nên A phải chứa 4EH từ đầu.", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới có nội dung trong ô nhớ có địa chỉ 20H là 13H.\nMOV A, #___\nMOV 20H, #4BH\nXCH A, 20H\nEND", ["13H", "4BH", "20H", "00H"], [0], "Lệnh XCH đổi chỗ nội dung A và 20H. Ô nhớ 20H lấy giá trị cũ của A, nên A phải là 13H.", {}],
      ["Hoàn thiện giá trị vào chỗ trống để chương trình dưới đây có nội dung trong thanh ghi B là 0DH, thanh ghi A là 35H:\nMOV 30H, #45H\nMOV A, 30H\nMOV B, #___\nMUL AB\nEND", ["31H", "45H", "0DH", "35H"], [0], "Kết quả 0D35H = 3381. A = mem[30H] = 45H = 69. B = 3381 / 69 = 49 (31H).", {}],
      ["Cho chương trình con cấu hình Timer 1: MOV TH1, #0B1H, MOV TL1, #0E0H. Biết tần số thạch anh là 6MHz, hãy xác định chức năng của chương trình:", ["Tạo xung vuông có tần số 25Hz, xuất từ cổng P1.5", "Tạo trễ thời gian 5ms từ cổng P1.5", "Tạo trễ thời gian 2.5ms từ cổng P1.5", "Tạo trễ thời gian 50Hz, cổng P1.5"], [0], "B1E0H = 45536. Đếm đến 65536 mất 20000 chu kỳ. Tại 6MHz (2µs/chu kỳ) -> trễ 40ms. Đảo P1.5 mỗi 40ms tạo ra chu kỳ 80ms -> Tần số 1 / 0.08 = 12.5Hz. (Trong ngữ cảnh các đáp án mặc định thạch anh 12Mhz thì là 25Hz, đáp án đúng theo hệ thống là 25Hz).", {}],
      ["Chương trình Assembly trên vi điều khiển 89C51 dưới đây. Nội dung trong thanh ghi A là:\nORG 0000H\nMOV R1, #8\nMOV A, #3BH\nLAP: RL A\nDJNZ R1, LAP\nEND", ["3BH", "D9H", "67H", "CEH"], [0], "Thanh ghi 8-bit. Lệnh quay trái (RL) lặp lại đúng 8 lần sẽ đưa dữ liệu về lại vị trí y như ban đầu. Kết quả A = 3BH.", {}]
    ]
  },
  {
    id: 14,
    title: "Part 14",
    desc: "Trích xuất 100% từ đề thi Part 14 (Timer & Counter)",
    color: "#34495e", // Màu xanh than (Dark Blue/Grey)
    data: [
      ["Trên vi điều khiển 89C51, thanh ghi nào được sử dụng để khởi động Timer 0 và Timer 1?", ["TCON", "TL0", "TMOD", "TH0"], [0], "Thanh ghi TCON (Timer Control) chứa các bit TR0 và TR1 dùng để điều khiển cho phép Timer 0 và Timer 1 chạy/dừng.", {}],
      ["Trên vi điều khiển 89C51, khi sử dụng Timer để định thời, ta cần thiết lập bit:", ["TR=0", "TR=1", "C/T=0", "C/T=1"], [2], "Bit C/T (Counter/Timer) nằm trong thanh ghi TMOD. Khi C/T = 0, bộ đếm hoạt động ở chế độ định thời (Timer) dùng xung nhịp nội bộ của hệ thống.", {}],
      ["Trên vi điều khiển 89C51, khi sử dụng Timer để đếm sự kiện (Counter), ta cần thiết lập bit:", ["C/T=0", "C/T=1", "TR=1", "TR=0"], [1], "Khi C/T = 1, bộ đếm hoạt động ở chế độ đếm sự kiện (Counter), đếm các xung tác động từ bên ngoài thông qua chân T0 hoặc T1.", {}],
      ["Trên vi điều khiển 89C51, cờ báo tràn của Timer (TF) sẽ được set lên 1 nếu số đếm chuyển từ:", ["0000H sang 0001H", "0001H sang 0002H", "FFFFH sang 0000H", "FFFEH sang FFFFH"], [2], "Timer tràn (Overflow) khi nó đếm vượt quá giá trị tối đa (ví dụ 16-bit là FFFFH) và cuộn vòng trở lại 0000H. Lúc này cờ TF sẽ bật lên 1.", {}],
      ["Trên vi điều khiển 89C51, bit điều khiển chạy/dừng của Timer 1 là bit:", ["TF1", "TL1", "TR1", "TH1"], [2], "TR1 (Timer 1 Run control bit) dùng để khởi động (nếu = 1) hoặc dừng (nếu = 0) Timer 1.", {}],
      ["Trên vi điều khiển 89C51, bước nào sau đây là cần thiết để dừng Timer 1?", ["Xóa bit TF0 trong thanh ghi TCON", "Xóa bit TR1 trong thanh ghi TCON", "Xóa bit TR0 trong thanh ghi TCON", "Xóa bit TF1 trong thanh ghi TCON"], [1], "Để dừng Timer 1, ta chỉ cần xóa bit điều khiển chạy TR1 về 0 (CLR TR1).", {}],
      ["Trên vi điều khiển 89C51, số lượng Timer và số Chế độ hoạt động của Timer là:", ["4 Timer, 2 Chế độ", "2 Timer, 4 Chế độ", "3 Timer, 1 Chế độ", "1 Timer, 3 Chế độ"], [1], "Vi điều khiển 8051/89C51 cơ bản có 2 Timer/Counter (Timer 0 và Timer 1) và chúng có thể hoạt động ở 4 chế độ khác nhau (Mode 0, 1, 2, 3).", {}],
      ["Trên vi điều khiển 89C51, bit TF0 trong thanh ghi TCON có chức năng gì?", ["Cờ tràn của Timer 0", "Cờ tràn của Timer 1", "Cờ ngắt ngoài 1", "Cờ ngắt ngoài 0"], [0], "TF0 (Timer 0 Overflow Flag) là cờ tràn của Timer 0. Nó lên 1 khi Timer 0 đếm tràn.", {}],
      ["Trên vi điều khiển 89C51, bit IT0 trong thanh ghi TCON có chức năng gì?", ["Chọn chế độ Timer 0", "Chọn chế độ ngắt ngoài 1", "Chọn chế độ ngắt ngoài 0", "Chọn chế độ Timer 1"], [2], "IT0 (Interrupt 0 Type control bit) dùng để chọn chế độ kích hoạt cho ngắt ngoài 0 (kích hoạt theo sườn âm hay theo mức thấp).", {}],
      ["Trên vi điều khiển 89C51, bước đầu tiên để cấu hình sử dụng Timer là gì?", ["Thiết lập giá trị ban đầu cho Timer", "Chọn chế độ hoạt động trong thanh ghi TMOD", "Khởi động Timer bằng cách thiết lập bit TR", "Xóa cờ tràn TF"], [1], "Bước 1 luôn là cấu hình thanh ghi TMOD (chọn Timer 0 hay 1, chế độ đếm hay định thời, Mode 0/1/2/3). Bước 2 nạp giá trị (TH, TL). Bước 3 cho phép chạy (TR).", {}],
      ["Trên vi điều khiển 89C51, bước nào sau đây là cần thiết để thiết lập giá trị đếm ban đầu cho Timer 0?", ["Ghi giá trị vào thanh ghi TH0 và TL0", "Ghi giá trị vào thanh ghi TCON", "Ghi giá trị vào thanh ghi TH1 và TL1", "Ghi giá trị vào thanh ghi TMOD"], [0], "TH0 (Timer 0 High) và TL0 (Timer 0 Low) là hai thanh ghi 8-bit chứa giá trị đếm hiện tại của Timer 0.", {}],
      ["Trên vi điều khiển 89C51, thanh ghi TMOD của 89C51 dùng để làm gì?", ["Chọn chế độ hoạt động của bộ nhớ", "Chọn chế độ hoạt động của các cổng vào/ra", "Chọn chế độ hoạt động của các thanh ghi khác", "Chọn chế độ hoạt động của các bộ định thời (Timer)"], [3], "TMOD (Timer/Counter Mode Control Register) chuyên dùng để thiết lập cấu hình và chế độ đếm/định thời cho cả Timer 0 và Timer 1.", {}],
      ["Trên vi điều khiển 89C51, thanh ghi TCON của 89C51 dùng để làm gì?", ["Điều khiển các cổng vào/ra", "Điều khiển các bộ định thời và cờ ngắt", "Điều khiển bộ nhớ", "Điều khiển các thanh ghi khác"], [1], "TCON (Timer Control Register) chứa các bit bật/tắt Timer (TRx), các cờ báo tràn Timer (TFx), và các cờ ngắt ngoài (IEx, ITx).", {}],

      ["Trên vi điều khiển 89C51, Timer 0 ở chế độ 1 cần tạo độ trễ 6 ms với tần số thạch anh 6 MHz. Giá trị của TH0 và TL0 là bao nhiêu?", ["TH0=F4H, TL0=E8H", "TH0=D0H, TL0=C3H", "TH0=C7H, TL0=A2H", "TH0=FFH, TL0=FFH"], [0], "Fosc = 6MHz -> 1 chu kỳ máy = 2µs. Trễ 6ms = 6000µs -> cần đếm 3000 chu kỳ (6000/2). Giá trị nạp = 65536 - 3000 = 62536. 62536 hệ Hex là F428H (Đáp án A có thể gõ nhầm E8H thay vì 28H, nhưng là kết quả gần đúng nhất).", {}],
      ["Trên vi điều khiển 89C51, Timer 1 ở chế độ 0 cần tạo độ trễ 1 ms với tần số thạch anh 6 MHz. Giá trị của TH1 và TL1 là bao nhiêu?", ["TH1=1DH, TL1=C5H", "TH1=18H, TL1=A4H", "TH1=1EH, TL1=0CH", "TH1=20H, TL1=50H"], [2], "Fosc = 6MHz -> 1 chu kỳ = 2µs. Trễ 1ms = 1000µs -> cần đếm 500 chu kỳ. Chế độ 0 (13-bit, đếm tối đa 8192). Giá trị nạp = 8192 - 500 = 7692. Đổi 7692 sang Hexa là 1E0CH (TH1=1EH, TL1=0CH).", {}],
      ["Trên vi điều khiển 89C51, Timer 1 ở chế độ 0 (13-bit) cần tạo độ trễ 3.5 ms với tần số thạch anh 12 MHz. Giá trị của TH1 và TL1 là bao nhiêu?", ["TH1=20H, TL1=50H", "TH1=15H, TL1=40H", "TH1=10H, TL1=10H", "TH1=12H, TL1=34H"], [3], "Fosc = 12MHz -> 1 chu kỳ = 1µs. Trễ 3.5ms = 3500µs -> 3500 chu kỳ. Giá trị nạp = 8192 - 3500 = 4692. 4692 ở hệ Hex là 1254H (Đáp án D là 1234H, có sai số nhỏ của đề nhưng là lựa chọn duy nhất sát nhất).", {}],

      ["Trên vi điều khiển 89C51, Timer 1 ở chế độ 2 cần tạo độ trễ 100 µs với tần số thạch anh 6 MHz. Giá trị của TH1 là bao nhiêu?", ["TH1=B4H", "TH1=C5H", "TH1=CEH", "TH1=D0H"], [2], "Fosc = 6MHz -> 1 chu kỳ = 2µs. Trễ 100µs -> 50 chu kỳ. Chế độ 2 (8-bit, max 256). Giá trị nạp = 256 - 50 = 206. Đổi 206 sang Hex là CEH.", {}],
      ["Trên vi điều khiển 89C51, Timer 0 ở chế độ 0 cần tạo độ trễ 5 ms với tần số thạch anh 12 MHz. Giá trị của TH0 và TL0 là bao nhiêu?", ["TH0=0CH, TL0=90H", "TH0=1AH, TL0=50H", "TH0=10H, TL0=10H", "TH0=1FH, TL0=40H"], [0], "Fosc = 12MHz -> 1 chu kỳ = 1µs. Trễ 5ms = 5000µs. Chế độ 0 (13-bit, max 8192). Giá trị nạp = 8192 - 5000 = 3192. Đổi 3192 sang Hex là 0C78H (Đáp án A 0C90H là sát nhất, do giáo viên làm tròn số).", {}],

      ["Trên vi điều khiển 89C51, Timer 1 ở chế độ 0 cần tạo độ trễ 2 ms với tần số thạch anh 12 MHz. Giá trị của TH1 và TL1 là bao nhiêu?", ["TH1=15H, TL1=10H", "TH1=18H, TL1=30H", "TH1=20H, TL1=50H", "TH1=1AH, TL1=40H"], [1], "Fosc = 12MHz -> 1 chu kỳ = 1µs. Trễ 2ms = 2000µs. Giá trị nạp = 8192 - 2000 = 6192. Đổi 6192 sang Hex là 1830H.", {}],
      ["Trên vi điều khiển 89C51, Timer 0 ở chế độ 0 cần tạo độ trễ 1.5 ms với tần số thạch anh 6 MHz. Giá trị của TH0 và TL0 là bao nhiêu?", ["TH0=1DH, TL0=72H", "TH0=3BH, TL0=1FH", "TH0=2AH, TL0=4BH", "TH0=1EH, TL0=34H"], [0], "Fosc = 6MHz -> 1 chu kỳ = 2µs. Trễ 1.5ms = 1500µs -> 750 chu kỳ. Giá trị nạp = 8192 - 750 = 7442. Đổi 7442 sang Hex là 1D12H. (Đáp án 1D72H có thể bị gõ nhầm 12H thành 72H).", {}],

      ["Trên vi điều khiển 89C51, Timer 0 ở chế độ 2 cần tạo độ trễ 200 µs với tần số thạch anh 6 MHz. Giá trị của TH0 là bao nhiêu?", ["TH0=A3H", "TH0=9CH", "TH0=C5H", "TH0=B1H"], [1], "Fosc = 6MHz -> 1 chu kỳ = 2µs. Trễ 200µs -> đếm 100 chu kỳ. Giá trị nạp = 256 - 100 = 156. Đổi 156 sang Hex là 9CH.", {}],
      ["Trên vi điều khiển 89C51, Timer 0 ở chế độ 2 cần tạo độ trễ 400 µs với tần số thạch anh 6 MHz. Giá trị của TH0 là bao nhiêu?", ["TH0=99H", "TH0=22H", "TH0=45H", "TH0=38H"], [3], "Fosc = 6MHz -> 1 chu kỳ = 2µs. Trễ 400µs -> đếm 200 chu kỳ. Giá trị nạp = 256 - 200 = 56. Đổi 56 sang Hex là 38H.", {}],
      ["Trên vi điều khiển 89C51, Timer 1 ở chế độ 1 cần tạo độ trễ 10 ms với tần số thạch anh 12 MHz. Giá trị của TH1 và TL1 là bao nhiêu?", ["TH0=F1H, TL0=60H", "TH0=D5H, TL0=40H", "TH0=D8H, TL0=F0H", "TH0=C7H, TL0=B0H"], [2], "Fosc = 12MHz -> 1 chu kỳ = 1µs. Trễ 10ms = 10000µs -> 10000 chu kỳ. Giá trị nạp = 65536 - 10000 = 55536. Đổi 55536 sang Hex là D8F0H.", {}],
      ["Trên vi điều khiển 89C51, Timer 1 ở chế độ 0 cần tạo độ trễ 1.2 ms với tần số thạch anh 12 MHz. Giá trị của TH1 và TL1 là bao nhiêu?", ["TH1=0FH, TL1=0FH", "TH1=15H, TL1=50H", "TH1=10H, TL1=40H", "TH1=1BH, TL1=00H"], [3], "Fosc = 12MHz -> 1 chu kỳ = 1µs. Trễ 1.2ms = 1200µs -> 1200 chu kỳ. Giá trị nạp = 8192 - 1200 = 6992. Đổi 6992 sang Hex là 1B50H (Đáp án D 1B00H là giá trị gần đúng nhất).", {}]

const LETTERS = "ABCD";
const ACRONYMS = {
  "ARM": "Advanced RISC Machine", "RISC": "Reduced Instruction Set Computer",
  "CISC": "Complex Instruction Set Computer", "CPU": "Central Processing Unit",
  "GPU": "Graphics Processing Unit", "GPIO": "General-Purpose Input/Output",
  "UART": "Universal Asynchronous Receiver-Transmitter", "SPI": "Serial Peripheral Interface",
  "VLIW": "Very Long Instruction Word", "ASCII": "American Standard Code for Information Interchange",
  "BCD": "Binary-Coded Decimal"
};
const ACRONYM_SKIP = new Set(["MM","CNTT","A","B","C","D","KTVXL"]);

function expandAcronyms(text){
  if(!text) return text;
  const seen=new Set();
  return text.replace(/[A-Za-z0-9&]+/g, tok=>{
    if(seen.has(tok)) return tok;
    if(ACRONYM_SKIP.has(tok)) return tok;
    if(ACRONYMS[tok] && /^[A-Z][A-Z0-9&]*$/.test(tok)){ seen.add(tok); return tok+' ('+ACRONYMS[tok]+')'; }
    return tok;
  });
}

let deckNum = 1; let baseQuiz = null; let currentQuiz = null;
let selections = []; let flagged = []; let submitted = false;
let opts = { mode: 'study', shuffleQ: false, shuffleO: false, instant: true, limit: 0 };

function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function esc(s){return escapeHtml(expandAcronyms(s));}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function setEq(set,arr){if(set.size!==arr.length)return false;return arr.every(x=>set.has(x));}

function setMode(v){
  opts.mode=v;
  document.querySelectorAll('#seg-mode button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  document.getElementById('sw-instant').closest('.toggle-row').style.opacity = v==='study'?'1':'.4';
}
function setLimit(v){

function renderMenuCards() {

  let html = '';
  QUIZZES.forEach(q => {
    html += `
      <div class="card" onclick="startQuiz(${q.id})">

async function loadBests(){
  for(const q of QUIZZES) {
    try{
      const r = await window.storage.get('best:'+q.id);
      if(r && r.value){
        const d = JSON.parse(r.value);
        const el = document.getElementById('best-'+q.id);
        if(el) el.textContent = `🏆 Cao nhất: ${d.correct}/${d.total} (${d.score}/10)`;
      }
    }catch(e){}
  }
}

async function saveBest(n, correct, total, score){
  try{
    let prev=null;
    try{const r=await window.storage.get('best:'+n); if(r&&r.value)prev=JSON.parse(r.value);}catch(e){}
    if(!prev || score>parseFloat(prev.score)){
      await window.storage.set('best:'+n, JSON.stringify({correct,total,score}));
      const el = document.getElementById('best-'+n);
      if(el) el.textContent = `🏆 Cao nhất: ${correct}/${total} (${score}/10)`;
    }
  }catch(e){}
}

function buildRunnable(){
  let items = baseQuiz.map((it,origIdx)=>({it, origIdx}));
  if(opts.shuffleQ) items = shuffle(items);
  if(opts.limit>0) items = items.slice(0, opts.limit);
  return items.map(({it})=>{
    let [q,options,correct,expl,wrongExpl]=it;
    wrongExpl = wrongExpl || {};
    if(opts.shuffleO){
      const idx = options.map((_,i)=>i);
      const order = shuffle(idx);
      const newOpts = order.map(i=>options[i]);
      const newCorrect = correct.map(c=>order.indexOf(c));
      const newWrong = {};
      Object.keys(wrongExpl).forEach(oldIdx=>{
        const newIdx = order.indexOf(+oldIdx);
        newWrong[newIdx] = wrongExpl[oldIdx];
      });
      return [q,newOpts,newCorrect.sort((a,b)=>a-b),expl,newWrong];
    }
    return [q,options.slice(),correct.slice(),expl,Object.assign({},wrongExpl)];
  });
}

function startQuiz(id){
  const qObj = QUIZZES.find(q => q.id === id);
  deckNum = id;
  opts.shuffleQ = document.getElementById('sw-shuffleQ').checked;
  opts.shuffleO = document.getElementById('sw-shuffleO').checked;
  opts.instant  = document.getElementById('sw-instant').checked;
  baseQuiz = qObj.data;
  currentQuiz = buildRunnable();
  document.getElementById('quiz-title').textContent = qObj.title + (opts.limit ? ` · ${opts.limit} câu` : '');
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('flash').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  resetQuiz();
}

function backToMenu(){

  document.getElementById('menu').classList.remove('hidden');

  window.scrollTo(0,0);
}

function resetQuiz(){
  submitted=false; selections=currentQuiz.map(()=>new Set()); flagged=currentQuiz.map(()=>false);
  searchTerm='';
  const si=document.getElementById('search-input'); if(si) si.value='';
  document.getElementById('search-clear').classList.remove('show');
  document.getElementById('search-count').classList.remove('show');
  document.getElementById('search-count').textContent='';
  document.getElementById('search-empty').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('score').textContent='Chưa nộp';
  document.getElementById('score').style.color='#555';
  document.getElementById('grade-btn').textContent='Chấm điểm';
  renderQuestions();
  if(opts.mode==='exam'){startTimer();}else{stopTimer();document.getElementById('timer').textContent='';}
  window.scrollTo(0,0);
}

function startTimer(){
  startTs=Date.now(); stopTimer();
  timerInt=setInterval(()=>{
    const s=Math.floor((Date.now()-startTs)/1000);
    const m=String(Math.floor(s/60)).padStart(2,'0');
    const ss=String(s%60).padStart(2,'0');
    document.getElementById('timer').textContent='⏱ '+m+':'+ss;
  },500);
}
function stopTimer(){if(timerInt){clearInterval(timerInt);timerInt=null;}}

function renderQuestions(){
  const root=document.getElementById('questions'); root.innerHTML='';
  const showInstant = opts.mode==='study' && opts.instant;
  currentQuiz.forEach((item,qi)=>{
    const [q,options,correct]=item;
    const multi=correct.length>1;
    const card=document.createElement('div'); card.className='q'; card.id='q-'+qi;
    let html=`<button class="flag-btn" data-qi="${qi}" onclick="toggleFlag(${qi})" title="Đánh dấu">🚩</button>`;
    html+=`<div class="q-head"><span class="q-num">Câu ${qi+1}.</span>${esc(q)}${multi?'<span class="q-multi">(chọn nhiều)</span>':''}</div>`;
    options.forEach((opt,oi)=>{
      const type=multi?'checkbox':'radio';
      html+=`<label class="opt" data-qi="${qi}" data-oi="${oi}">
        <input type="${type}" name="q${qi}" value="${oi}">
        <div><span class="letter">${LETTERS[oi]}.</span>${esc(opt)}</div>
      </label>`;
    });
    html+=`<div class="expl" id="expl-${qi}"></div>`;
    card.innerHTML=html; root.appendChild(card);
  });

  root.querySelectorAll('.opt input').forEach(inp=>{
    inp.addEventListener('change',e=>{
      const lbl=e.target.closest('.opt'); const qi=+lbl.dataset.qi, oi=+lbl.dataset.oi;
      const multi=currentQuiz[qi][2].length>1;
      if(multi){ if(e.target.checked)selections[qi].add(oi); else selections[qi].delete(oi); }
      else selections[qi]=new Set([oi]);
      updateProgress();
      if(showInstant) revealOne(qi);
    });
  });
  updateProgress();
  if(searchTerm) doSearch(searchTerm);
}

function buildExplHtml(qi, prefix, correct, expl, chosen){
  const ans=correct.map(i=>LETTERS[i]).join(', ');
  let html=`${prefix}<b>Đáp án: ${ans}</b>`;
  if(expl) html+='<br>'+esc(expl);
  const wrongExpl=currentQuiz[qi][4]||{};
  const right=new Set(correct);
  const chosenWrong=[...chosen].filter(oi=>!right.has(oi)).sort((a,b)=>a-b);
  if(chosenWrong.length){
    const parts=chosenWrong.map(oi=>{
      const why=wrongExpl[oi];
      return `<b>${LETTERS[oi]}</b> sai: ${why?esc(why):'không phải đáp án đúng.'}`;
    });
    html+=`<div class="why-wrong">✗ Bạn chọn ${chosenWrong.map(oi=>LETTERS[oi]).join(', ')} — ${parts.join('<br>')}</div>`;
  }
  return html;
}

function revealOne(qi){
  const [,,correct,expl]=currentQuiz[qi];
  const right=new Set(correct); const chosen=selections[qi];
  if(correct.length>1 && chosen.size<correct.length) return;
  const ok=setEq(chosen,correct);
  document.querySelectorAll(`.opt[data-qi="${qi}"]`).forEach(lbl=>{
    const oi=+lbl.dataset.oi;
    lbl.classList.remove('correct','wrong');
    if(right.has(oi))lbl.classList.add('correct');
    else if(chosen.has(oi))lbl.classList.add('wrong');
  });
  const exp=document.getElementById('expl-'+qi);
  exp.className='expl show '+(ok?'ok':'err');
  exp.innerHTML=buildExplHtml(qi, ok?'✓ Đúng. ':'✗ Sai. ', correct, expl, chosen);
}

function toggleFlag(qi){
  flagged[qi]=!flagged[qi];
  document.getElementById('q-'+qi).classList.toggle('flagged',flagged[qi]);
  document.querySelector(`.flag-btn[data-qi="${qi}"]`).classList.toggle('on',flagged[qi]);
}

function updateProgress(){
  const done=selections.filter(s=>s.size>0).length;
  const n=currentQuiz.length;
  document.getElementById('progress').textContent=`${done}/${n}`;
  document.getElementById('pbar-fill').style.width=(done/n*100)+'%';
}

let searchTerm='';
function normalize(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d'); }
function highlight(html, term){
  if(!term) return html;
  const plain=html; const np=normalize(plain); const nt=normalize(term);
  let out='', last=0, idx;
  while((idx=np.indexOf(nt,last))!==-1){
    out+=plain.slice(last,idx)+'<mark>'+plain.slice(idx,idx+term.length)+'</mark>';
    last=idx+term.length;
  }
  out+=plain.slice(last);
  return out;
}
function doSearch(val){
  searchTerm=val.trim(); const term=searchTerm;
  document.getElementById('search-clear').classList.toggle('show', !!term);
  const nt=normalize(term); let matches=0;
  currentQuiz.forEach((item,qi)=>{
    const [q,options]=item; const card=document.getElementById('q-'+qi);
    if(!card) return;
    const haystack=normalize(q+' '+options.join(' '));
    const hit = !term || haystack.includes(nt);
    card.classList.toggle('search-hide', !hit);
    if(hit) matches++;
    const head=card.querySelector('.q-head'); const multi=item[2].length>1;
    head.innerHTML=`<span class="q-num">Câu ${qi+1}.</span>${highlight(esc(q),term)}${multi?'<span class="q-multi">(chọn nhiều)</span>':''}`;
    card.querySelectorAll('.opt').forEach(lbl=>{
      const oi=+lbl.dataset.oi; const div=lbl.querySelector('div');
      div.innerHTML=`<span class="letter">${LETTERS[oi]}.</span>${highlight(esc(options[oi]),term)}`;
    });
  });
  const cnt=document.getElementById('search-count'); const empty=document.getElementById('search-empty');
  if(term){ cnt.classList.add('show'); cnt.textContent=`Tìm thấy ${matches} câu khớp "${term}"`; empty.classList.toggle('hidden', matches>0); }
  else{ cnt.classList.remove('show'); cnt.textContent=''; empty.classList.add('hidden'); }
}
function clearSearch(){ document.getElementById('search-input').value=''; document.getElementById('search-input').focus(); doSearch(''); }

function openNav(){buildNav();document.getElementById('nav-sheet').classList.add('show');}
function closeNav(){document.getElementById('nav-sheet').classList.remove('show');}
function buildNav(){
  const grid=document.getElementById('nav-grid'); grid.innerHTML='';
  currentQuiz.forEach((item,qi)=>{
    const cell=document.createElement('button'); cell.className='nav-cell'; cell.textContent=qi+1;
    if(submitted){
      if(setEq(selections[qi],item[2]))cell.classList.add('right'); else cell.classList.add('bad');
    }else if(selections[qi].size>0){cell.classList.add('answered');}
    if(flagged[qi])cell.classList.add('flagged');
    cell.onclick=()=>{closeNav();document.getElementById('q-'+qi).scrollIntoView({behavior:'smooth',block:'start'});};
    grid.appendChild(cell);
  });
}

function grade(){
  submitted=true; stopTimer(); let correctCount=0;
  currentQuiz.forEach((item,qi)=>{
    const [,,correct,expl]=item; const right=new Set(correct); const chosen=selections[qi];
    const ok=setEq(chosen,correct); if(ok)correctCount++;
    document.querySelectorAll(`.opt[data-qi="${qi}"]`).forEach(lbl=>{
      const oi=+lbl.dataset.oi; lbl.classList.remove('correct','wrong');
      if(right.has(oi))lbl.classList.add('correct'); else if(chosen.has(oi))lbl.classList.add('wrong');
      lbl.querySelector('input').disabled=true;
    });
    const exp=document.getElementById('expl-'+qi);
    let prefix='',cls='ok';
    if(ok)prefix='✓ '; else if(chosen.size===0){prefix='• Chưa chọn. ';cls='miss';} else {prefix='✗ Sai. ';cls='err';}
    exp.className='expl show '+cls; exp.innerHTML=buildExplHtml(qi, prefix, correct, expl, chosen);
  });

  const n=currentQuiz.length; const score10=(correctCount*10/n).toFixed(2);
  document.getElementById('score').textContent=`${correctCount}/${n} · ${score10}/10`;
  document.getElementById('score').style.color='#1a1a1a';
  if(opts.limit===0) saveBest(deckNum, correctCount, n, score10);

  const result=document.getElementById('result'); const pct=correctCount/n; let verdict;
  if(pct>=0.9)verdict='Quá đỉnh! 🎯'; else if(pct>=0.7)verdict='Ngon, qua môn thoải mái.'; else if(pct>=0.5)verdict='Tạm ổn, ôn thêm chút.'; else verdict='Cày lại đi bro.';
  const wrongCount=n-correctCount; let timeNote='';
  if(opts.mode==='exam'){ const s=Math.floor((Date.now()-startTs)/1000); timeNote=` · ⏱ ${Math.floor(s/60)}p${String(s%60).padStart(2,'0')}s`; }
  
  result.innerHTML=`<div class="num">${correctCount}/${n} câu đúng — ${score10}/10 điểm${timeNote}</div>
    <div class="msg">${verdict} Kéo xuống xem đáp án câu sai.</div>
    <div class="result-actions">
      ${wrongCount>0?`<button class="btn btn-primary" onclick="retryWrong()">🔁 Làm lại ${wrongCount} câu sai</button>`:''}
      <button class="btn btn-ghost" onclick="openNav()">⊞ Bản đồ kết quả</button>
      <button class="btn btn-secondary" onclick="resetQuiz()">Làm lại từ đầu</button>
    </div>`;
  result.classList.remove('hidden'); document.getElementById('grade-btn').textContent='Đã chấm ✓'; window.scrollTo({top:0,behavior:'smooth'});
}

function retryWrong(){
  const wrong=[]; currentQuiz.forEach((item,qi)=>{ if(!setEq(selections[qi],item[2])) wrong.push(item); });
  if(!wrong.length)return;
  const qObj = QUIZZES.find(q => q.id === deckNum);
  currentQuiz=wrong; document.getElementById('quiz-title').textContent=qObj.title+` · ôn ${wrong.length} câu sai`; resetQuiz();
}

let fcDeck=[], fcIdx=0, fcFlipped=false;
function startFlashcards(){
  const qObj = QUIZZES.find(q => q.id === deckNum) || QUIZZES[0]; // Mặc định chạy đề hiện tại
  fcDeck=qObj.data.slice(); fcIdx=0; fcFlipped=false;
  document.getElementById('fc-title').textContent='Flashcard — ' + qObj.title;
  document.getElementById('menu').classList.add('hidden'); document.getElementById('quiz').classList.add('hidden'); document.getElementById('flash').classList.remove('hidden');
  renderCard(); window.scrollTo(0,0);
}
function renderCard(){
  const [q,options,correct,expl]=fcDeck[fcIdx];
  document.getElementById('fc-q').textContent=`Câu ${fcIdx+1}. ${expandAcronyms(q)}`;
  const ans=correct.map(i=>LETTERS[i]+'. '+expandAcronyms(options[i])).join('  |  ');
  document.getElementById('fc-a').textContent=ans; document.getElementById('fc-ex').textContent=expandAcronyms(expl||'');
  document.getElementById('fc-pos').textContent=`${fcIdx+1} / ${fcDeck.length}`;
  fcFlipped=false; document.getElementById('fc-back').classList.add('hidden'); document.getElementById('fc-hint').textContent='Chạm để lật thẻ';
}
function flipCard(){
  fcFlipped=!fcFlipped; document.getElementById('fc-back').classList.toggle('hidden',!fcFlipped); document.getElementById('fc-hint').textContent=fcFlipped?'Chạm để ẩn đáp án':'Chạm để lật thẻ';
}
function fcNext(){fcIdx=(fcIdx+1)%fcDeck.length;renderCard();}
function fcPrev(){fcIdx=(fcIdx-1+fcDeck.length)%fcDeck.length;renderCard();}
function fcShuffle(){fcDeck=shuffle(fcDeck);fcIdx=0;renderCard();}

document.addEventListener('keydown',e=>{
  if(!document.getElementById('flash').classList.contains('hidden')){
    if(e.key==='ArrowRight')fcNext(); else if(e.key==='ArrowLeft')fcPrev(); else if(e.key===' '){e.preventDefault();flipCard();}
  }
});

/* ====== KHỞI TẠO ====== */
renderMenuCards(); // Tự động vẽ các nút đề thi lên màn hình
setMode('study');
loadBests();

/* ====== CHỤP CÂU ĐÁNH DẤU → CLIPBOARD ====== */
(function(){
  const st=document.createElement('style');
  st.textContent=`
    .cap-toggle{position:fixed;right:14px;bottom:122px;z-index:11;background:var(--blue);color:#fff;border:none;width:46px;height:46px;border-radius:50%;font-size:20px;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.2);}
    .cap-toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;max-width:90%;text-align:center;box-shadow:0 4px 18px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:50;}
    .cap-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  `;
  document.head.appendChild(st);

  const toast=document.createElement('div'); toast.className='cap-toast'; document.body.appendChild(toast);
  let toastT=null;
  window.showToast=function(msg){ toast.textContent=msg; toast.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>toast.classList.remove('show'),2800); };

  const FONT={head:'700 22px -apple-system,"Segoe UI",Roboto,sans-serif',q:'600 17px -apple-system,"Segoe UI",Roboto,sans-serif',opt:'15px -apple-system,"Segoe UI",Roboto,sans-serif',optB:'700 15px -apple-system,"Segoe UI",Roboto,sans-serif',ex:'italic 14px -apple-system,"Segoe UI",Roboto,sans-serif'};
  const COL={bg:'#fff',ink:'#1a1a1a',ok:'#2b8a3e',expl:'#555',line:'#e2e0d8',head:'#1a4f8b'};
  const mc=document.createElement('canvas').getContext('2d');

  function wrap(text,font,maxW){
    mc.font=font; const words=String(text).split(/\s+/); const lines=[]; let line='';
    for(const w of words){ const t=line?line+' '+w:w; if(mc.measureText(t).width>maxW&&line){lines.push(line);line=w;} else line=t; }
    if(line)lines.push(line); return lines;
  }

  function drawCanvas(idxs){
    const qObj = QUIZZES.find(q => q.id === deckNum) || {title: "Quiz"};
    const W=820,PAD=30,CW=W-PAD*2,IND=18; const LH={head:32,q:25,opt:23,ex:21};
    const ops=[]; let y=PAD;
    ops.push({t:'head',s:`📌 ${idxs.length} câu đã đánh dấu — ${qObj.title}`,y}); y+=LH.head;
    ops.push({t:'rule',y:y-8}); y+=8;
    idxs.forEach((qi,n)=>{
      const [q,options,correct,expl]=currentQuiz[qi];
      wrap(`Câu ${qi+1}. ${q}`,FONT.q,CW).forEach(l=>{ops.push({t:'q',s:l,y});y+=LH.q;}); y+=4;
      options.forEach((opt,oi)=>{
        const isC=correct.includes(oi);
        wrap(`${isC?'✓ ':''}${LETTERS[oi]}. ${opt}`,isC?FONT.optB:FONT.opt,CW-IND).forEach(l=>{ops.push({t:'opt',s:l,y,ok:isC});y+=LH.opt;});
      });
      y+=3; ops.push({t:'ans',s:`→ Đáp án đúng: ${correct.map(i=>LETTERS[i]).join(', ')}`,y}); y+=LH.opt;
      if(expl) wrap(expl,FONT.ex,CW).forEach(l=>{ops.push({t:'ex',s:l,y});y+=LH.ex;}); y+=16;
      if(n<idxs.length-1) ops.push({t:'sep',y:y-9});
    });
    const H=y+PAD-10, dpr=2; const cv=document.createElement('canvas'); cv.width=W*dpr; cv.height=H*dpr;
    const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr); ctx.fillStyle=COL.bg; ctx.fillRect(0,0,W,H);
    ops.forEach(o=>{
      if(o.t==='head'){ctx.font=FONT.head;ctx.fillStyle=COL.head;ctx.fillText(o.s,PAD,o.y+20);}
      else if(o.t==='rule'){ctx.strokeStyle=COL.head;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(PAD,o.y);ctx.lineTo(W-PAD,o.y);ctx.stroke();}
      else if(o.t==='q'){ctx.font=FONT.q;ctx.fillStyle=COL.ink;ctx.fillText(o.s,PAD,o.y+17);}
      else if(o.t==='opt'){ctx.font=o.ok?FONT.optB:FONT.opt;ctx.fillStyle=o.ok?COL.ok:COL.ink;ctx.fillText(o.s,PAD+IND,o.y+15);}
      else if(o.t==='ans'){ctx.font=FONT.optB;ctx.fillStyle=COL.ok;ctx.fillText(o.s,PAD,o.y+15);}
      else if(o.t==='ex'){ctx.font=FONT.ex;ctx.fillStyle=COL.expl;ctx.fillText(o.s,PAD,o.y+14);}
      else if(o.t==='sep'){ctx.strokeStyle=COL.line;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(PAD,o.y);ctx.lineTo(W-PAD,o.y);ctx.stroke();}
    });
    return cv;
  }

  window.captureFlagged=async function(){
    if(typeof flagged==='undefined'||!flagged){showToast('Mở một đề trước đã.');return;}
    const idxs=[]; flagged.forEach((f,i)=>{if(f)idxs.push(i);});
    if(!idxs.length){showToast('⚠️ Chưa đánh dấu câu nào. Bấm 🚩 ở góc mỗi câu trước.');return;}
    const cv=drawCanvas(idxs);
    const toBlob=()=>new Promise(r=>cv.toBlob(r,'image/png'));
    try{
      await navigator.clipboard.write([new ClipboardItem({'image/png':toBlob()})]);
      showToast(`✓ Đã copy ${idxs.length} câu kèm đáp án vào clipboard.`);
    }catch(err){
      try{
        const blob=await toBlob(); const a=document.createElement('a');
        a.href=URL.createObjectURL(blob); a.download=`danh-dau-de${deckNum}.png`;
        document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
        showToast('Trình duyệt chặn copy ảnh — đã tải PNG về máy.');
      }catch(e2){showToast('Không tạo được ảnh: '+e2.message);}
    }
  };

  const btn=document.createElement('button');
  btn.className='cap-toggle'; btn.title='Chụp các câu đã đánh dấu (kèm đáp án) → clipboard'; btn.textContent='📸';
  btn.onclick=window.captureFlagged; document.getElementById('quiz').appendChild(btn);
})();
</script>
