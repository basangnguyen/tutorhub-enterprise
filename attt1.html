<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
<title>Quiz - KTVXL - MM - CNTT</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #f7f7f4; --ink: #1a1a1a; --line: #e2e0d8; --muted: #777;
    --green: #3b6d11; --blue: #1a4f8b; --orange: #b85b14;
    --accent: var(--blue);
  }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.5;
    padding-bottom: 84px;
  }
  .quiz-header {
    position: sticky; top: 0; z-index: 10; background: var(--bg);
    border-bottom: 1px solid var(--line);
  }
  .top {
    padding: 10px 14px 8px; background: var(--bg);
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .top h1 { margin: 0; font-size: 15px; flex: 1; min-width: 100px; }
  .top .score { font-size: 13px; color: #555; font-weight: 600; }
  .top .timer { font-size: 13px; font-weight: 600; color: var(--blue); font-variant-numeric: tabular-nums; }
  .back-btn { background: none; border: none; color: var(--blue); font-size: 14px; cursor: pointer; padding: 6px 2px; }
  .pbar { height: 4px; background: var(--line); }
  .pbar > div { height: 100%; background: var(--accent); width: 0; transition: width .2s; }
  .container { padding: 12px; max-width: 760px; margin: 0 auto; }

  /* MENU */
  .menu-wrap { padding: 24px 16px; text-align: center; }
  .menu-title { font-size: 24px; font-weight: 700; margin: 20px 0 6px; }
  .menu-sub { color: #666; margin-bottom: 22px; }
  .cards { display: flex; flex-direction: column; gap: 14px; max-width: 380px; margin: 0 auto; flex-wrap: wrap; justify-content: center; }
  @media (min-width: 800px) { .cards { flex-direction: row; max-width: 800px; } .cards .card { flex: 1; min-width: 250px; max-width: 380px; } }
  .card {
    background: white; border-radius: 14px; overflow: hidden;
    box-shadow: 0 2px 10px rgba(0,0,0,.06); border: 1px solid #e8e6df;
    cursor: pointer; transition: transform .15s, box-shadow .15s; text-align: left;
  }
  .card:active { transform: scale(.98); }
  .card .accent { height: 6px; }
  .card .body { padding: 18px; }
  .card .big { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
  .card .mid { font-size: 14px; color: #333; margin-bottom: 6px; }
  .card .desc { font-size: 12px; color: #777; min-height: 18px; }
  .card .best { font-size: 12px; color: #2b6b2b; font-weight: 600; margin-top: 8px; min-height: 16px; }
  .card .go { display: inline-block; margin-top: 12px; padding: 7px 16px; border-radius: 8px; color: white; font-weight: 600; font-size: 14px; }

  .modes { max-width: 380px; margin: 22px auto 0; text-align: left; background: white; border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; }
  .modes h3 { margin: 0 0 10px; font-size: 14px; }
  .toggle-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; font-size: 14px; }
  .toggle-row label { flex: 1; cursor: pointer; }
  .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .seg button { border: none; background: white; padding: 6px 12px; font-size: 13px; cursor: pointer; color: #555; font-family: inherit; }
  .seg button.on { background: var(--accent); color: white; font-weight: 600; }
  .switch { position: relative; width: 44px; height: 25px; flex-shrink: 0; }
  .switch input { display: none; }
  .switch span { position: absolute; inset: 0; background: #ccc; border-radius: 25px; transition: .2s; cursor: pointer; }
  .switch span::after { content: ""; position: absolute; width: 19px; height: 19px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: .2s; }
  .switch input:checked + span { background: var(--accent); }
  .switch input:checked + span::after { transform: translateX(19px); }

  /* QUIZ */
  .q { background: white; border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; position: relative; scroll-margin-top: 110px; }
  .q.flagged { border-color: #e0a93a; box-shadow: 0 0 0 1px #e0a93a; }
  .q-head { font-weight: 600; margin-bottom: 10px; font-size: 15px; line-height: 1.45; padding-right: 34px; }
  .q-num { color: #888; font-weight: 500; margin-right: 4px; }
  .q-multi { color: var(--blue); font-weight: 500; font-size: 12px; margin-left: 4px; }
  .flag-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 18px; cursor: pointer; opacity: .35; line-height: 1; padding: 2px; }
  .flag-btn.on { opacity: 1; }
  .opt { display: flex; align-items: flex-start; gap: 10px; padding: 10px 8px; border-radius: 8px; cursor: pointer; transition: background .1s; border: 1px solid transparent; margin: 2px 0; font-size: 14px; }
  .opt:active { background: #f0eee8; }
  .opt input { margin-top: 3px; flex-shrink: 0; width: 18px; height: 18px; cursor: pointer; }
  .opt .letter { font-weight: 600; color: #555; margin-right: 4px; }
  .opt.correct { background: #d6f5e0; border-color: #b3e6c2; }
  .opt.wrong { background: #f8d6d6; border-color: #eab8b8; }
  .expl { display: none; margin-top: 8px; padding: 8px 10px; border-radius: 6px; font-size: 12.5px; line-height: 1.5; background: #f5f5f2; }
  .expl.show { display: block; }
  .expl.ok { background: #eaf8ee; color: #2b6b2b; }
  .expl.err { background: #fdecec; color: #a33; }
  .expl.miss { background: #fff4e0; color: #8a5b00; }
  .why-wrong { margin-top: 7px; padding: 7px 9px; background: #fff0f0; border-left: 3px solid #e09; border-left-color: #d9534f; border-radius: 0 5px 5px 0; color: #a33; line-height: 1.55; }

  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid var(--line); padding: 9px 12px; display: flex; gap: 8px; align-items: center; box-shadow: 0 -2px 8px rgba(0,0,0,.04); z-index: 9; }
  .btn { border: none; border-radius: 8px; font-size: 14px; font-weight: 600; padding: 10px 14px; cursor: pointer; font-family: inherit; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-secondary { background: #e8e6df; color: #333; }
  .btn-ghost { background: white; border: 1px solid var(--line); color: #444; }
  .progress { margin-left: auto; font-size: 12px; color: #888; }

  .result-banner { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--line); }
  .result-banner .num { font-size: 22px; font-weight: 700; }
  .result-banner .msg { color: #555; margin-top: 4px; font-size: 13px; }
  .result-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

  /* navigator grid */
  .nav-toggle { position: fixed; right: 14px; bottom: 70px; z-index: 11; background: var(--accent); color: white; border: none; width: 46px; height: 46px; border-radius: 50%; font-size: 18px; cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,.2); }
  .nav-sheet { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 20; display: none; align-items: flex-end; }
  .nav-sheet.show { display: flex; }
  .nav-inner { background: white; width: 100%; max-height: 70vh; border-radius: 16px 16px 0 0; padding: 16px; overflow-y: auto; }
  .nav-inner h3 { margin: 0 0 4px; font-size: 16px; }
  .nav-legend { font-size: 12px; color: #888; margin-bottom: 12px; display: flex; gap: 12px; flex-wrap: wrap; }
  .dot { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 4px; vertical-align: middle; }
  .nav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(42px, 1fr)); gap: 8px; }
  .nav-cell { aspect-ratio: 1; border: 1px solid var(--line); border-radius: 8px; background: white; font-size: 13px; font-weight: 600; cursor: pointer; color: #444; display: flex; align-items: center; justify-content: center; position: relative; }
  .nav-cell.answered { background: #e3edf7; border-color: #b9d3ec; }
  .nav-cell.flagged::after { content: "🚩"; position: absolute; top: -6px; right: -4px; font-size: 10px; }
  .nav-cell.right { background: #d6f5e0; border-color: #b3e6c2; }
  .nav-cell.bad { background: #f8d6d6; border-color: #eab8b8; }

  /* flashcards */
  .fc-wrap { padding: 16px; max-width: 560px; margin: 0 auto; }
  .fc-card { background: white; border: 1px solid var(--line); border-radius: 16px; padding: 28px 22px; min-height: 240px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 3px 14px rgba(0,0,0,.07); cursor: pointer; }
  .fc-q { font-size: 17px; font-weight: 600; line-height: 1.5; }
  .fc-tap { text-align: center; color: #aaa; font-size: 12px; margin-top: 18px; }
  .fc-ans { margin-top: 16px; padding-top: 16px; border-top: 1px dashed var(--line); }
  .fc-ans .lbl { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .fc-ans .val { font-size: 15px; font-weight: 600; color: var(--green); }
  .fc-ans .ex { font-size: 13px; color: #555; margin-top: 8px; line-height: 1.5; }
  .fc-nav { display: flex; align-items: center; gap: 10px; margin-top: 18px; }
  .fc-nav .pos { margin-left: auto; font-size: 13px; color: #888; }

  /* search */
  .search-box { flex-basis: 100%; display: flex; align-items: center; gap: 8px; background: white; border: 1px solid var(--line); border-radius: 10px; padding: 7px 12px; margin-top: 2px; }
  .search-box .search-ico { font-size: 15px; opacity: .6; }
  .search-box input { flex: 1; border: none; outline: none; font-size: 15px; font-family: inherit; background: transparent; color: var(--ink); }
  .search-clear { border: none; background: #ececec; color: #777; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-size: 12px; display: none; flex-shrink: 0; }
  .search-clear.show { display: block; }
  .search-count { font-size: 12px; color: var(--muted); margin: 0 2px 8px; min-height: 0; }
  .search-count.show { min-height: 16px; }
  .search-empty { text-align: center; color: var(--muted); padding: 30px 16px; font-size: 14px; }
  .q.search-hide { display: none; }
  mark { background: #ffe07a; color: inherit; padding: 0 1px; border-radius: 2px; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- MENU -->
<div id="menu" class="menu-wrap">
  <div class="menu-title">Kiến trúc Vi xử lý</div>
  <div class="menu-sub">Chọn phần để bắt đầu luyện tập</div>
  
  <!-- NƠI GIAO DIỆN TỰ ĐỘNG VẼ CÁC ĐỀ RA ĐÂY -->
  <div class="cards" id="menu-cards"></div>

  <div class="modes">
    <h3>⚙️ Tuỳ chọn làm bài</h3>
    <div class="toggle-row">
      <label>Chế độ</label>
      <div class="seg" id="seg-mode">
        <button class="on" data-v="study" onclick="setMode('study')">Ôn tập</button>
        <button data-v="exam" onclick="setMode('exam')">Thi thử</button>
      </div>
    </div>
    <div class="toggle-row">
      <label for="sw-shuffleQ">Trộn thứ tự câu hỏi</label>
      <div class="switch"><input type="checkbox" id="sw-shuffleQ"><span onclick="this.previousElementSibling.click()"></span></div>
    </div>
    <div class="toggle-row">
      <label for="sw-shuffleO">Trộn thứ tự đáp án</label>
      <div class="switch"><input type="checkbox" id="sw-shuffleO"><span onclick="this.previousElementSibling.click()"></span></div>
    </div>
    <div class="toggle-row">
      <label for="sw-instant">Hiện giải thích ngay (chỉ Ôn tập)</label>
      <div class="switch"><input type="checkbox" id="sw-instant" checked><span onclick="this.previousElementSibling.click()"></span></div>
    </div>
    <div class="toggle-row" id="row-limit">
      <label>Giới hạn số câu</label>
      <div class="seg" id="seg-limit">
        <button class="on" data-v="0" onclick="setLimit(0)">Tất cả</button>
        <button data-v="10" onclick="setLimit(10)">10</button>
        <button data-v="20" onclick="setLimit(20)">20</button>
      </div>
    </div>
    <div class="toggle-row" style="border-top:1px solid var(--line); margin-top:6px; padding-top:12px;">
      <label>Hoặc ôn nhanh kiểu thẻ lật</label>
      <button class="btn btn-ghost" onclick="startFlashcards()">🃏 Flashcard</button>
    </div>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
  <div class="quiz-header">
    <div class="top">
      <button class="back-btn" onclick="backToMenu()">← Thoát</button>
      <h1 id="quiz-title"></h1>
      <span class="timer" id="timer"></span>
      <span class="score" id="score">Chưa nộp</span>
      <div class="search-box">
        <span class="search-ico">🔍</span>
        <input type="text" id="search-input" placeholder="Tìm câu hỏi / đáp án theo chữ..." oninput="doSearch(this.value)" autocomplete="off">
        <button class="search-clear" id="search-clear" onclick="clearSearch()" title="Xoá">✕</button>
      </div>
    </div>
    <div class="pbar"><div id="pbar-fill"></div></div>
  </div>
  <div class="container">
    <div class="search-count" id="search-count"></div>
    <div id="result" class="result-banner hidden"></div>
    <div id="questions"></div>
    <div id="search-empty" class="search-empty hidden">Không tìm thấy câu nào.</div>
  </div>
  <button class="nav-toggle" onclick="openNav()" title="Bản đồ câu hỏi">⊞</button>
  <div class="bottom-bar">
    <button class="btn btn-primary" id="grade-btn" onclick="grade()">Chấm điểm</button>
    <button class="btn btn-secondary" onclick="resetQuiz()">Làm lại</button>
    <span class="progress" id="progress"></span>
  </div>
</div>

<!-- FLASHCARDS -->
<div id="flash" class="hidden">
  <div class="quiz-header">
    <div class="top">
      <button class="back-btn" onclick="backToMenu()">← Thoát</button>
      <h1 id="fc-title">Flashcard</h1>
    </div>
  </div>
  <div class="fc-wrap">
    <div class="fc-card" id="fc-card" onclick="flipCard()">
      <div class="fc-q" id="fc-q"></div>
      <div id="fc-back" class="hidden">
        <div class="fc-ans">
          <div class="lbl">Đáp án đúng</div>
          <div class="val" id="fc-a"></div>
          <div class="ex" id="fc-ex"></div>
        </div>
      </div>
      <div class="fc-tap" id="fc-hint">Chạm để lật thẻ</div>
    </div>
    <div class="fc-nav">
      <button class="btn btn-secondary" onclick="fcPrev()">← Trước</button>
      <button class="btn btn-ghost" onclick="fcShuffle()">🔀 Trộn</button>
      <button class="btn btn-primary" onclick="fcNext()">Sau →</button>
      <span class="pos" id="fc-pos"></span>
    </div>
  </div>
</div>

<!-- NAV SHEET -->
<div class="nav-sheet" id="nav-sheet" onclick="if(event.target===this)closeNav()">
  <div class="nav-inner">
    <h3>Bản đồ câu hỏi</h3>
    <div class="nav-legend">
      <span><i class="dot" style="background:#e3edf7;border:1px solid #b9d3ec"></i>Đã chọn</span>
      <span><i class="dot" style="background:white;border:1px solid var(--line)"></i>Chưa làm</span>
      <span>🚩 Đánh dấu</span>
    </div>
    <div class="nav-grid" id="nav-grid"></div>
  </div>
</div>

<script>
/* ========================================================== */
/* CHỈ CẦN THÊM ĐỀ MỚI VÀO BIẾN "QUIZZES" NÀY LÀ XONG TẤT CẢ  */
/* ========================================================== */

const QUIZZES = [
  {
    id: 1, // BẮT BUỘC KHÔNG TRÙNG NHAU
    title: "Part 1",
    desc: "Trích xuất chính xác 100% từ đề thi Part 1",
    color: "#1a4f8b", // Màu xanh
    data: [
      ["Cấu trúc đường ống (Pipeline) là gì?", ["Là việc thực hiện các lệnh một cấu trúc ống trong vi xử lý.", "Cả ba đáp án đều đúng.", "Là việc thực hiện đồng thời nhiều lệnh tại một thời điểm, mỗi lệnh thực hiện một công đoạn khác nhau.", "Là việc thực hiện tuần tự từng lệnh, lệnh này thực hiện xong mới tới lệnh kế tiếp."], [2], "", {}],
      ["Để ghi dữ liệu ra vào ra, CPU cần thực hiện các công việc nào?", ["CPU cấp địa chỉ, cấp tín hiệu điều khiển chọn vào ra, nhận tín hiệu cho phép ghi từ vào ra và cấp dữ liệu ra data bus", "CPU cấp địa chỉ, cấp tín hiệu điều khiển chọn vào ra, cấp tín hiệu yêu cầu cho phép ghi vào ra và cấp dữ liệu ra data bus", "CPU nhận địa chỉ từ vào ra, cấp tín hiệu điều khiển chọn vào ra, cấp tín hiệu yêu cầu phép ghi vào ra và cấp dữ liệu ra data bus", "CPU cấp địa chỉ, cấp tín hiệu điều khiển chọn vào ra, cấp tín hiệu yêu cầu ghi vào ra và nhận dữ liệu từ data bus vào"], [1], "", {}],
      ["Vi xử lý ARM thường được sản xuất theo cách nào?", ["ARM chỉ phát triển cho nghiên cứu học thuật.", "ARM chỉ cung cấp phần mềm đi kèm.", "ARM cấp phép thiết kế cho các hãng khác.", "Thiết kế độc quyền và sản xuất bởi ARM."], [2], "", {}],
      ["Các CPU CISC sẽ có các lợi điểm gì so với các CPU RISC?", ["Cả 3 đáp án đều đúng", "CISC hỗ trợ các kiểu dữ liệu đơn giản nên dễ dàng trong việc lập trình hơn", "CISC thường hỗ trợ nhiều chức năng phức tạp trong lệnh, điều này giúp đơn giản hóa quá trình lập trình cho các ứng dụng phức tạp như hệ điều hành và phần mềm ứng dụng", "CISC tích hợp nhiều chức năng phức tạp trong một lệnh nên quá trình thực hiện chương trình sẽ nhanh hơn"], [2], "", {}],
      ["Để đọc dữ liệu từ vào ra, CPU cần thực hiện các công việc nào?", ["CPU cấp địa chỉ, cấp tín hiệu điều khiển chọn vào ra, cấp tín hiệu yêu cầu đọc vào ra và nhận dữ liệu từ data bus vào.", "CPU cấp địa chỉ, cấp tín hiệu điều khiển chọn vào ra, cấp tín hiệu yêu cầu đọc vào ra và cấp dữ liệu ra data bus.", "CPU nhận địa chỉ từ vào ra, cấp tín hiệu điều khiển chọn vào ra, cấp tín hiệu yêu cầu đọc vào ra và nhận dữ liệu từ data bus vào.", "CPU cấp địa chỉ, cấp tín hiệu điều khiển chọn vào ra, nhận tín hiệu cho phép đọc từ vào ra và nhận dữ liệu từ data bus vào."], [0], "", {}],
      ["Thông tin được lưu trữ và truyền bên trong vi xử lý dưới dạng:", ["Mã ASCII", "Kết hợp chữ cái và số", "Thập phân", "Mã nhị phân"], [3], "", {}],
      ["Khi nào thì cổng vào ra được mở để CPU truyền dữ liệu tới một ngoại vi?", ["Khi CPU cấp đúng địa chỉ của cổng vào ra và tín hiệu điều khiển tích cực", "Khi vào ra cho phép dữ liệu cấp tới từ thiết bị ngoại vi", "Khi thiết bị ngoại vi tác động mở cổng vào ra.", "Khi vào ra nhận được dữ liệu cấp tới từ thiết bị ngoại vi"], [0], "", {}],

      ["Trong chip vi điều khiển 89C51, các cổng vào ra có hai công dụng là:", ["P1, P2, P3", "P0, P1, P3", "P0, P2, P3", "P0, P1, P2"], [2], "P0, P2, P3 đều có chức năng thay thế (Address/Data, Control). Chỉ riêng P1 trong chuẩn 8051 là cổng I/O cơ bản không có chức năng thứ hai.", {}],
      ["RST là tín hiệu điều khiển:", ["Cho phép thiết lập lại chế độ hoạt động cua chip 89C51.", "Cho phép chốt địa chỉ để thực hiện việc giải đa hợp.", "Cho phép truy xuất (đọc) bộ nhớ chương trình bên ngoài.", "Cho phép truy xuất (sử dụng) bộ nhớ chương trình bên ngoài."], [0], "RST (Reset) dùng để khởi động/thiết lập lại trạng thái của vi điều khiển.", {}],
      ["Khi các cổng vào ra của 89C51 đóng vai trò là đọc ghi dữ liệu thì cổng nào cần phải có điện trở kéo lên bên ngoài:", ["P0", "P1", "P3", "P2"], [0], "Port 0 (P0) là cổng cực máng hở (Open-drain), do đó bắt buộc phải có điện trở kéo lên (Pull-up resistor) bên ngoài để xuất mức logic 1.", {}],
      ["Khi chip 89C51 sử dụng bộ nhớ bên ngoài thì cổng nào đóng vai trò là bus địa chỉ byte cao:", ["P2", "P0", "P3", "P1"], [0], "P2 cung cấp byte cao của địa chỉ (A8 - A15).", {}],
      ["Trong 8051, khi chân tín hiệu EA=1, có thể mở rộng bộ nhớ chương trình bên ngoài dung lượng là:", ["58KB", "56KB", "60KB", "64KB"], [2], "EA=1 nghĩa là chip sẽ chạy 4KB ROM nội trước. Tổng không gian nhớ là 64KB, do đó còn lại 64KB - 4KB = 60KB cho bộ nhớ ngoài.", {}],
      ["Các đường tín hiệu dùng để xác định vị trí của một ô nhớ:", ["RD, WR", "VCC, GND", "A0..A15", "D0..D7"], [2], "Đường địa chỉ (Address Bus) A0..A15 dùng để xác định vị trí (địa chỉ) của ô nhớ.", {}],
      ["89C51 sử dụng bộ nhớ bên ngoài thì cổng nào đóng vai trò là bus địa chỉ byte thấp và bus dữ liệu đa hợp (AD0.. AD7):", ["P0", "P2", "P1", "P3"], [0], "P0 đóng vai trò đa hợp (Multiplexed) truyền cả địa chỉ byte thấp (A0-A7) và dữ liệu (D0-D7).", {}],
      ["Trong chip vi điều khiển 89C51, cổng có chức năng vào ra cơ bản là:", ["P0", "P1", "P3", "P2"], [1], "Port 1 (P1) chỉ có chức năng duy nhất là vào/ra (I/O) cơ bản, không có chức năng thay thế như các Port khác.", {}],
      ["ALE là tín hiệu điều khiển:", ["Cho phép thiết lập lại chế độ hoạt động cua chip 89C51.", "Cho phép truy xuất (đọc) bộ nhớ chương trình bên ngoài.", "Cho phép truy xuất (sử dụng) bộ nhớ chương trình bên ngoài.", "Cho phép chốt địa chỉ để thực hiện việc giải đa hợp."], [3], "ALE (Address Latch Enable) xuất xung để chốt byte thấp của địa chỉ từ P0, tách nó ra khỏi dữ liệu.", {}],
      ["Hai chân XTAL1 và XTAL2 của 89C51 là hai chân dùng để", ["Nối với bộ ngắt bên ngoài", "Nối với cổng truyền thông ngoài", "Nối với bộ định thời ngoài", "Nối với bộ dao động ngoài"], [3], "XTAL1 và XTAL2 được nối với thạch anh (Crystal) để tạo xung dao động cho vi điều khiển.", {}],
      ["Tần số phổ dụng của thạch anh sử dụng cho hầu hết các chip vi điều khiển họ MCS-51 là:", ["10 MHZ", "12 MHZ", "11 MHZ", "13 MHZ"], [1], "12 MHz là tần số phổ biến nhất vì nó tạo ra chu kỳ máy chẵn tròn đúng 1 microsecond (1µs).", {}],
      ["EA là tín hiệu điều khiển:", ["Cho phép truy xuất (sử dụng) bộ nhớ chương trình bên ngoài.", "Cho phép truy xuất (đọc) bộ nhớ chương trình bên ngoài.", "Cho phép thiết lập lại chế độ hoạt động cua chip 89C51.", "Cho phép chốt địa chỉ để thực hiện việc giải đa hợp."], [0], "EA (External Access) khi nối mass (mức 0) sẽ cho phép vi điều khiển sử dụng hoàn toàn bộ nhớ chương trình bên ngoài.", {}],
      ["Khi chân RST của 89C51 được cấp điện thế ___ trong ít nhất ___ chu kỳ máy thì vi điều khiển sẽ đặt lại các thanh ghi về vị trí ban đầu.", ["Cao, 2", "Thấp, 1", "Thấp, 2", "Cao, 1"], [0], "Điều kiện Reset của 8051 là chân RST phải được giữ ở mức CAO trong tối thiểu 2 chu kỳ máy.", {}],
      ["Chân PSEN của chip 89C51 thường được nối với chân nào của bộ nhớ chương trình bên ngoài:", ["Not(CS)", "Not(OE)", "Not(WR)", "Not(RD)"], [1], "PSEN (Program Store Enable) dùng để đọc ROM nên được nối vào chân Output Enable (OE) của ROM ngoài.", {}],
      ["Khi tín hiệu ALE được kích hoạt thì:", ["Đọc dữ liệu từ RAM", "Đọc tín hiệu địa chỉ thấp từ cổng P0", "Đọc dữ liệu từ ROM", "Ghi dữ liệu từ cổng P0"], [1], "Khi ALE ở mức cao, chốt bên ngoài sẽ \"đọc\" và lưu giữ phần địa chỉ thấp phát ra từ P0.", {}],
      ["Khi chân tín hiệu ___ của 89C51 duy trì trạng thái điện thế cao trong ít nhất 2 chu kỳ máy, vi điều khiển được đặt lại vào trạng thái ban đầu của chương trình.", ["RST", "VSS", "ALE", "EA"], [0], "", {}],
      ["Khi dùng mạch dao động TTL bên ngoài tạo tín hiệu xung clock cho chip 89C51 thì tín hiệu xung clock phải được đưa vào chân:", ["XTAL1", "Not(CS)", "RST", "Not(INT0)"], [0], "Khi dùng nguồn xung clock bên ngoài, xung được cấp thẳng vào chân XTAL1 (chân XTAL2 để trống).", {}],
      ["Khi chân tín hiệu ALE=1 thì", ["Cổng P0 truyền 8 bit tín hiệu địa chỉ.", "Cổng P0 sẽ truyền đi 8 bit dữ liệu", "89C51 đọc lệnh từ ROM", "89C51 sẽ đọc dữ liệu trong RAM"], [0], "ALE=1 (mức cao) thì P0 đang chứa địa chỉ byte thấp. ALE=0 thì P0 mới chứa dữ liệu.", {}],
      ["Khi chân tín hiệu EA=0 thì:", ["Vi điều khiển sẽ truy xuất các lệnh của cả trong lẫn ngoài của bộ nhớ chương trình.", "Vi điều khiển chỉ truy xuất các lệnh trong bộ nhớ chương trình bên ngoài.", "Vi điều khiển chỉ truy xuất các lệnh trong bộ nhớ chương trình bên trong.", "Vi điều khiển sẽ truy xuất các lệnh trong bộ nhớ chương trình bên trong, nhưng khi thanh ghi PC vượt quá phạm vi 4KB thì sẽ tự động truy xuất các lệnh của bộ nhớ chương trình bên ngoài."], [1], "EA (External Access) = 0 buộc vi điều khiển luôn tìm và thực thi mã lệnh từ bộ nhớ ngoài (ROM ngoài).", {}],
      ["PSEN là tín hiệu điều khiển:", ["Cho phép truy xuất (đọc) bộ nhớ chương trình bên ngoài.", "Cho phép truy xuất (sử dụng) bộ nhớ chương trình bên ngoài.", "Cho phép thiết lập lại trạng thái hoạt động của chip 89C51.", "Cho phép chốt địa chỉ để thực hiện việc giải đa hợp."], [0], "PSEN là xung kích hoạt ĐỌC (Read Strobe) dành riêng cho bộ nhớ chương trình ngoài.", {}],
      ["P0 và P1 muốn thực hiện chức năng đầu vào thì cần phải", ["Nối với điện thế cao", "Thiết lập về 0 cho cổng tương ứng", "Thiết lập lên 1 cho cổng tương ứng", "Nối với điện trở kéo"], [2], "Trong 8051, để cấu hình một chân Port làm đầu vào (Input), ta bắt buộc phải ghi mức logic 1 vào chốt của nó.", {}],
      ["Khi các cổng P0 – P3 thực hiện là các cổng đầu vào thì cần phải có điều kiện gì?", ["Cần phải đọc '0' từ các cổng P0 - P3", "Cần phải đọc '1' từ các cổng P0 - P3", "Cần phải ghi '1' vào các cổng P0 - P3", "Cần phải ghi '0' vào các cổng P0 - P3"], [2], "Đúng như câu trên, ghi '1' vào thanh ghi chốt (Latch) của cổng thì mạch bên trong mới cho phép đọc tín hiệu từ bên ngoài.", {}],
      ["Khi chân tín hiệu PSEN=1 thì:", ["Vi điều khiển cho phép truy xuất đọc bộ nhớ chương trình bên ngoài.", "Vi điều khiển sẽ thực hiện chương trình trong bộ nhớ chương trình bên trong.", "Cho phép thiết lập lại trạng thái hoạt động của chip 89C51.", "Vi điều khiển cho phép thiết lập lại trạng thái hoạt động của chip."], [1], "PSEN tích cực mức thấp (=0) khi đọc ROM ngoài. Nếu nó bằng 1, vi điều khiển đang đọc từ ROM nội (bên trong).", {}],
      ["Khi chân tín hiệu ___ của 89C51 ở mức điện thế cao, CPU sẽ giao tiếp với ROM nội và ngoại.", ["RST", "EA", "VSS", "ALE"], [1], "EA = 1 thì chip sẽ đọc ROM nội (0 - 4KB), nếu mã lệnh vượt quá 4KB sẽ tự động tìm sang ROM ngoại.", {}],
      ["Nếu tần số xung clock của mạch dao động trong chip là 12MHZ thì tần số của tín hiệu tại chân ALE là bao nhiêu:", ["12 MHZ", "1 MHZ", "2 MHZ", "6 MHZ"], [2], "Tần số ALE luôn bằng 1/6 tần số thạch anh (f_OSC). 12MHz / 6 = 2MHz.", {}],
      ["Chip 89C51 có bao nhiêu cổng vào ra dữ liệu dưới dạng song song:", ["1", "2", "3", "4"], [3], "Gồm 4 cổng: P0, P1, P2, P3. Mỗi cổng 8-bit.", {}],
      ["Khi chân tín hiệu PSEN=0 thì:", ["Vi điều khiển cho phép thiết lập lại trạng thái hoạt động của chip.", "Vi điều khiển chốt chân địa chỉ để thực hiển việc giải đa hợp.", "Vi điều khiển cho phép truy xuất ghi bộ nhớ dữ liệu bên ngoài.", "Vi điều khiển cho phép truy xuất đọc bộ nhớ chương trình bên ngoài."], [3], "PSEN=0 là tín hiệu xung đọc dành riêng cho bộ nhớ chương trình (ROM) ngoài.", {}],
      ["Các đường tín hiệu sau của chip 89C51 là loại multiplex (đa hợp):", ["(A) P2[0..7]", "(B) P1[0..7]", "(C) P0[0..7]", "(D) Cả hai đáp án A và C đều đúng"], [2], "Chỉ có P0 là cổng truyền Đa hợp (Multiplexed) giữa Address byte thấp (A0-A7) và Data (D0-D7).", {}],
      ["Khi chip 89C51 sử dụng bộ nhớ bên ngoài hay các chức năng đặc biệt thì port nào đóng vai trò là các tín hiệu điều khiển:", ["P3", "P1", "P2", "P0"], [0], "Port 3 chứa các tín hiệu điều khiển như RD (đọc RAM), WR (ghi RAM), các ngắt INT0/INT1, và Timer T0/T1.", {}],
      ["Vi điều khiển 89C51 có các cổng vào ra sau:", ["PSEN", "AD0.. AD7", "P0, P1, P2, P3", "ALE"], [2], "", {}],
      ["Cổng nào đóng vài trò là các đường địa chỉ 16 bit để truyền dữ liệu qua nó?", ["P0 và P2", "P1 và P2", "P1 và P3", "P0 và P3"], [0], "P0 cung cấp 8 bit địa chỉ thấp (A0-A7), P2 cung cấp 8 bit địa chỉ cao (A8-A15). Gộp lại thành 16-bit địa chỉ.", {}],
      ["Giai đoạn đầu tiên trong chu kỳ lệnh của bộ vi xử lý là gì?", ["Giải mã lệnh", "Ghi kết quả", "Thực thi lệnh", "Nạp lệnh"], [3], "Fetch (Nạp lệnh/Lấy lệnh) là bước đầu tiên trước khi Giải mã (Decode) và Thực thi (Execute).", {}]
    ]
  },
  {

    color: "#e67e22", // Màu cam sáng
    data: [
      ["Thanh ghi PSW là:", ["Thanh ghi bộ đếm chương trình", "Thanh ghi cờ", "Thanh ghi điều khiển chế độ", "Thanh ghi trạng thái chương trình"], [3], "PSW (Program Status Word) dịch sát nghĩa là Từ trạng thái chương trình, thường được gọi là thanh ghi cờ.", {}],
      ["Để vùng nhớ của ngăn xếp (stack) có địa chỉ bắt đầu là 40H thì thanh ghi SP phải có giá trị là:", ["3FH", "41H", "40H", "39H"], [0], "Khi cất dữ liệu (PUSH), 8051 sẽ tăng SP lên 1 trước rồi mới ghi dữ liệu. Do đó để ghi vào 40H đầu tiên, SP phải được khởi tạo là 3FH.", {}],
      ["Trên vi điều khiển 89C51, cờ tràn OV tương ứng với bit thứ mấy trong PSW?", ["PSW.6", "PSW.3", "PSW.2", "PSW.0"], [2], "PSW.2 là cờ tràn OV (Overflow Flag).", {}],
      ["Trên vi điều khiển 89C51, cờ nhớ CY được đặt tại đâu?", ["Thanh ghi trạng thái chương trình PSW", "Trong PC", "Bộ tính toán logic và số học ALU", "Mạch cộng tích lũy"], [0], "Cờ nhớ CY (Carry Flag) nằm ở bit PSW.7 của thanh ghi PSW.", {}],
      ["Để chọn băng thanh ghi tích cực là băng 2 thì các bit RS0, RS1 phải có giá trị là bao nhiêu?", ["RS0=0, RS1=1", "RS0=0, RS1=0", "RS0=1, RS1=1", "RS0=1, RS1=0"], [0], "Băng 2 tương ứng với mã nhị phân 10 (RS1=1, RS0=0).", {}],
      ["89C51 gồm có ___ băng thanh ghi", ["4", "6", "8", "10"], [0], "8051 có 4 băng thanh ghi (Bank 0 đến Bank 3), mỗi băng 8 byte.", {}],
      ["Địa chỉ trên vùng RAM đặc biệt của thanh ghi ACC là:", ["90H", "A0H", "E0H", "80H"], [2], "Thanh ghi tích lũy ACC (Accumulator) có địa chỉ là E0H.", {}],
      ["Nếu thanh ghi SP có giá trị là 59H thì vùng nhớ của ngăn xếp (stack) có địa chỉ bắt đầu:", ["59H", "5BH", "58H", "5AH"], [3], "Stack bắt đầu tại SP + 1 = 59H + 1 = 5AH.", {}],
      ["Để khởi động con trỏ ngăn xếp (SP) bắt đầu tại địa chỉ 49H ta dùng lệnh:", ["MOV SP, #49H", "MOV SP, #48H", "MOV SP, #50H", "MOV SP, #4AH"], [1], "Do lệnh PUSH tăng SP trước khi ghi, nên muốn ghi vào 49H thì SP phải khởi tạo bằng 48H.", {}],
      ["Chức năng của thanh ghi PSW:", ["Dùng để đếm", "Chứa dữ liệu", "Giữ địa chỉ của lệnh kế tiếp sẽ thực hiện", "Dùng để lưu giữ thông tin về các trạng thái hoạt động của ALU"], [3], "PSW chứa các cờ trạng thái toán học (Carry, Auxiliary Carry, Parity, Overflow...) phản ánh kết quả của ALU.", {}],
      ["Trên vi điều khiển 89C51, cờ được dùng để báo tình trạng tràn của thanh ghi A là:", ["Cờ TF0, TF1", "Cờ tràn OV", "Cờ nhớ CY", "Cờ chiều IF"], [1], "Cờ tràn OV (Overflow) báo hiệu kết quả phép toán có dấu vượt quá giới hạn chứa của thanh ghi.", {}],
      ["Trên vi điều khiển 89C51 có bao nhiêu thanh ghi chức năng đặc biệt (SFR)?", ["21", "25", "27", "23"], [0], "Chuẩn 8051 cơ bản có 21 thanh ghi chức năng đặc biệt (SFR).", {}],
      ["Địa chỉ của thanh ghi từ trạng thái chương trình PSW là:", ["A0H", "D0H", "E0H", "A8H"], [1], "Thanh ghi PSW có địa chỉ trên vùng SFR là D0H.", {}],
      ["Nếu thanh ghi SP có giá trị là 5FH thì vùng nhớ của ngăn xếp (stack) có địa chỉ bắt đầu:", ["5EH", "5FH", "61H", "60H"], [3], "Stack bắt đầu tại SP + 1 = 5FH + 1 = 60H.", {}],
      ["Nếu người lập trình không khởi tạo thanh ghi SP thì khi 89C51 hoạt động nó sẽ tự động nạp vào trong thanh ghi SP giá trị bao nhiêu?", ["07H", "30H", "00H", "80H"], [0], "Giá trị mặc định của SP khi reset là 07H, vì vậy stack mặc định bắt đầu từ 08H (thuộc Bank 1).", {}],
      ["PSW.2 tương ứng với cờ trạng thái nào trên vi điều khiển 89C51?", ["Cờ P_ cờ chẵn lẻ", "CY_cờ nhớ", "OV_cờ tràn", "AC_cờ nhớ phụ"], [2], "PSW.2 là cờ tràn OV.", {}],
      ["Khi các thanh ghi RS0 và RS1 của thanh ghi PSW phân biệt nhận các giá trị 0 và 1 tương ứng, thì hệ thống sẽ lựa chọn các thanh ghi làm việc ở băng nào?", ["Băng 1", "Băng 2", "Băng 0", "Băng 3"], [1], "RS1=1, RS0=0 tương ứng với Băng 2.", {}],

      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh so sánh nội dung trong thanh ghi A với một hằng số có giá trị 200 và nhảy đến địa chỉ PROM1 nếu nội dung của chúng không bằng nhau:", ["CJNE #200, A, PROM1", "CJNE #200H, A, PROM1", "CJNE A, #200, PROM1", "CJNE A, #200H, PROM1"], [2], "Hằng số 200 (thập phân) được viết là #200. Cú pháp đúng là CJNE A, #200, PROM1.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh nhảy nào trong số các lệnh sau đây có tầm nhảy đến là bất cứ nơi nào trong không gian bộ nhớ chương trình 64K:", ["SJMP", "AJMP", "RJMP", "LJMP"], [3], "LJMP (Long Jump) sử dụng địa chỉ 16-bit, cho phép nhảy đến bất kỳ vị trí nào trong không gian 64KB.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh nào trong số các lệnh sau đây là lệnh SAI:", ["POP R0", "POP DPL", "POP R1", "POP A"], [0], "Lệnh PUSH và POP bắt buộc phải sử dụng địa chỉ trực tiếp (Direct Address). R0 và R1 là tên thanh ghi, không phải địa chỉ trực tiếp. (Phải viết là POP 00H). Lệnh POP A thực tế cũng sai cú pháp gốc (phải là POP ACC) nhưng POP R0 là lỗi sai kinh điển nhất.", {2: "POP R1 cũng sai cú pháp tương tự POP R0."}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh nhảy nào trong số các lệnh sau đây có tầm nhảy đến là 128 byte trước lệnh và 127 byte sau lệnh:", ["RJMP", "SJMP", "LJMP", "AJMP"], [1], "SJMP (Short Jump) sử dụng độ lệch 8-bit có dấu, cho phép nhảy trong phạm vi -128 đến +127 byte.", {}],
      ["Lệnh assembly của 89C51 \"INC A\" sẽ cộng thêm 1 vào:", ["Thanh ghi tích luỹ A", "Thanh ghi DPTR", "Thanh ghi IP", "Thanh ghi tích luỹ B"], [0], "INC A (Increment Accumulator) sẽ tăng giá trị của thanh ghi A lên 1.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh hoán chuyển nội dung của hai nibble (hai nửa 4 bit) của thanh ghi A:", ["PULL", "SWAP", "POP", "PUSH"], [1], "SWAP A đảo vị trí 4 bit thấp và 4 bit cao của thanh ghi A.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh nào trong số các lệnh sau đây là lệnh SAI:", ["MOV 255, A", "MOV #255, A", "MOV A, #0FFH", "MOV A, #255"], [1], "Không thể chuyển dữ liệu (MOV) vào một hằng số tức thời (#255). Toán hạng đích phải là một vùng nhớ hoặc thanh ghi.", {}],
      ["Lệnh giảm nội dung trong ô nhớ 40H đi 1, nếu nội dung trong ô nhớ 40H khác 0, nhảy tới thực thi chương trình PROM1:", ["DJNZ @R0, PROM1", "DJNZ 40H, PROM1", "DJNZ R0, PROM1", "DJNZ 40, PROM1"], [1], "Cú pháp: DJNZ direct, rel (Giảm ô nhớ trực tiếp và nhảy nếu chưa bằng 0). 40H là địa chỉ ô nhớ.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh nào dưới đây sẽ ảnh hưởng tới con trỏ ngăn xếp:", ["LJMP", "ADD", "MOVC A, @A+PC", "LCALL"], [3], "Khi gọi chương trình con bằng LCALL (hoặc ACALL), hệ thống sẽ tự động cất địa chỉ trả về (2 byte của PC) vào ngăn xếp, làm thay đổi con trỏ SP.", {}],
      ["Lệnh assembly của 89C51 \"MOV DPTR, #1000H\" sẽ:", ["Sao chép nội dung trong thanh ghi DPTR vào ô nhớ có địa chỉ 1000H", "Nạp giá trị 00H vào thanh ghi DPH và 10H vào thanh ghi DPL", "Nạp giá trị 10H vào thanh ghi DPH và 00H vào thanh ghi DPL", "Sao chép nội dung trong ô nhớ có địa chỉ 1000H vào thanh ghi DPTR"], [2], "1000H là giá trị 16-bit. 10H là byte cao (lưu vào DPH) và 00H là byte thấp (lưu vào DPL).", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh so sánh nội dung trong ô nhớ 3FH với nội dung trong thanh ghi A và nhảy đến địa chỉ rel nếu nội dung của chúng không bằng nhau:", ["CJNE #3FH, A, rel", "CJNE A, 3FH, rel", "CJNE A, #3FH, rel", "CJNE 3FH, A, rel"], [1], "Cú pháp chuẩn so sánh giữa A và ô nhớ trực tiếp là: CJNE A, direct, rel. Ở đây direct = 3FH.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, câu lệnh tiến hành phép toán XOR giữa thanh ghi A và một số tức thời là:", ["ORL A, #data", "XRL A, #data", "XRL A, direct", "ANL A, #data"], [1], "XRL (Exclusive OR Logic) thực hiện phép XOR. Dấu # chỉ định hằng số tức thời.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh nhảy đến địa chỉ rel nếu nội dung cờ nhớ khác 0:", ["JZ rel", "JNC rel", "JNZ rel", "JC rel"], [3], "Cờ nhớ khác 0 tức là Cờ nhớ CY = 1. Lệnh nhảy khi có cờ nhớ là JC (Jump if Carry).", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, câu lệnh nào thực hiện kiểm tra vùng địa chỉ theo bit tại ô nhớ 30H, nếu (30H) ≠ 0, thực hiện xóa nội dung ô nhớ 30H và nhảy tới thực hiện chương trình PROM1:", ["JNZ PROM1", "JC PROM1", "JBC PROM1", "JZ PROM1"], [2], "JBC (Jump if Bit is set and Clear bit) thực hiện nhảy nếu bit được chỉ định bằng 1 (khác 0), sau đó tự động xóa bit đó về 0.", {}],
      ["Lệnh assembly của 89C51 dùng để sao chép nội dung trong ô nhớ có địa chỉ 85H vào thanh ghi A:", ["MOV 85H, A", "MOV A, 85H", "MOV #85H, A", "MOV A, #85H"], [1], "Lấy nội dung của ô nhớ 85H đưa vào A: MOV A, 85H. (Nếu dùng #85H thì là đưa giá trị hằng số 85H vào A).", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh nhảy đến địa chỉ rel nếu nội dung cờ nhớ bằng 0:", ["JC rel", "JZ rel", "JNZ rel", "JNC rel"], [3], "Cờ nhớ bằng 0 tức là Không có cờ nhớ. Lệnh tương ứng là JNC (Jump if Not Carry).", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh ghi ra bộ nhớ dữ liệu ngoài:", ["MOVX A, @DPTR", "MOV @DPTR, A", "MOV A, DPTR", "MOVX @DPTR, A"], [3], "MOVX (Move External). Để GHI từ thanh ghi A ra ngoài RAM tại địa chỉ do DPTR trỏ tới, ta dùng MOVX @DPTR, A.", {}],
      ["Lệnh assembly của 89C51 \"MOV A, B\" sẽ:", ["Nạp giá trị 0AH vào thanh ghi B", "Sao chép nội dung trong thanh ghi A vào thanh ghi B", "Nạp giá trị 0BH vào thanh ghi A", "Sao chép nội dung trong thanh ghi B vào thanh ghi A"], [3], "Lệnh MOV Đích, Nguồn. Ở đây Đích = A, Nguồn = B. Nên dữ liệu được copy từ B sang A.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh nào trong số các lệnh sau đây là lệnh SAI:", ["DEC DPTR", "INC A", "INC DPTR", "DEC A"], [0], "Trong kiến trúc 8051 có lệnh tăng con trỏ DPTR (INC DPTR) nhưng KHÔNG có lệnh giảm con trỏ DPTR (DEC DPTR). Đây là một hạn chế phần cứng của 8051.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh so sánh nội dung trong thanh ghi R0 với một hằng số có giá trị 00H và nhảy đến địa chỉ rel nếu nội dung của chúng không bằng nhau:", ["CJNE R0, #00H, rel", "CJNE #00H, R0, rel", "CJNE R0, 00H, rel", "CJNE 00H, R0, rel"], [0], "Cú pháp: CJNE Rn, #data, rel.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh nhảy đến địa chỉ rel nếu nội dung cờ 0 (cờ zero) bằng 1:", ["JNZ rel", "JZ rel", "JC rel", "JNC rel"], [1], "JZ (Jump if Zero). Cờ Zero = 1 hiểu ngầm là giá trị trong thanh ghi A bằng 0.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh truyền nội dung trong thanh ghi R0 vào thanh ghi A là:", ["MOVX A, R0", "MOV R0, A", "MOV A, R0", "MOV A, @R0"], [2], "Lấy nội dung của R0 đưa vào A: MOV A, R0.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh nhảy nào trong số các lệnh sau đây có tầm nhảy đến phải ở trong cùng khối 2KB của bộ nhớ chương trình:", ["LJMP", "AJMP", "RJMP", "SJMP"], [1], "AJMP (Absolute Jump) sử dụng 11 bit địa chỉ, do đó giới hạn tầm nhảy trong 1 trang bộ nhớ kích thước 2^11 = 2048 bytes (2KB).", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh nào là lệnh trở về từ chương trình con:", ["LCALL rel", "SJMP rel", "RETI", "RET"], [3], "RET (Return) lấy địa chỉ từ ngăn xếp trả về PC để thoát khỏi chương trình con. RETI là trở về từ trình phục vụ ngắt.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh giảm nội dung trong thanh ghi R0 và nhảy đến địa chỉ rel nếu nội dung của thanh ghi R0 khác 0:", ["CJNE R0, 00H, rel", "CJNE R0, #00H, rel", "DJNZ R0, rel", "DJNZ rel, R0"], [2], "DJNZ (Decrement and Jump if Not Zero). Cú pháp: DJNZ Rn, rel.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh nào trong số các lệnh sau đây là lệnh SAI:", ["MOV A, #0FF0H", "MOV A, #05H", "MOV A, #35", "MOV A, #0FFH"], [0], "Thanh ghi A chỉ có kích thước 8-bit (chứa giá trị tối đa là FFH hoặc 255). 0FF0H là một số 16-bit nên không thể gán trực tiếp vào A.", {}],
      ["Lệnh nào dưới đây cho phép bit thấp nhất của cổng P1 lên 1:", ["ANL P1, #80H", "SETB 90H", "ORL P1, #0FFH", "ORL P1, #80H"], [1], "P1 có địa chỉ là 90H, và bit P1.0 tương ứng với địa chỉ bit 90H. Lệnh SETB 90H sẽ kích mức 1 cho bit thấp nhất của P1.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh nào trong số các lệnh sau đây là lệnh SAI:", ["MOV A, THO", "MOV A, ACC", "MOV A, SBUF", "MOV A, PSW"], [0], "Bẫy lỗi đánh máy: Tên thanh ghi đếm thời gian (Timer) là TH0 (số 0). Đề bài cố ý viết chữ O (THO) gây lỗi cú pháp (Identifier not found) trong trình biên dịch.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh nhảy đến địa chỉ rel nếu nội dung thanh chứa (thanh ghi A) bằng 0:", ["JNC rel", "JZ rel", "JC rel", "JNZ rel"], [1], "JZ (Jump if Zero) sẽ nhảy khi A = 0.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh lấy dữ liệu ra từ vùng nhớ ngăn xếp (Stack):", ["SWAP", "PULL", "POP", "PUSH"], [2], "POP lấy dữ liệu ở đỉnh ngăn xếp đưa vào một ô nhớ trực tiếp.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh nào trong số các lệnh sau đây là lệnh SAI:", ["MOV A, #0B0H", "MOV #0B0H, A", "MOV A, 0B0H", "MOV 0B0H, A"], [1], "Không thể chuyển dữ liệu vào một Hằng số tức thời (#0B0H).", {}],
      ["Dòng lệnh nào dưới đây đưa bit cao nhất của R0 về 0:", ["ANL R0, #0FFH", "ANL R0, #7FH", "ORL R0, #7FH", "ORL R0, #80H"], [1], "Bit cao nhất là bit 7. Số thập lục phân 7FH = 0111 1111 nhị phân. Phép AND (ANL) với 7FH sẽ ép bit 7 về 0 và giữ nguyên các bit còn lại.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, câu lệnh nào gọi chương trình tới chương trình con có địa chỉ 1000H:", ["ACALL 1000H", "LJMP 1000H", "SJMP 1000H", "LCALL 1000H"], [3], "ACALL chỉ gọi được trong phạm vi 2KB (địa chỉ 11-bit, max 07FFH). Để gọi chương trình con ở địa chỉ 1000H, phải dùng lệnh gọi dài LCALL.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh nhảy đến địa chỉ rel nếu nội dung cờ 0 (cờ zero) bằng 0:", ["JNC rel", "JZ rel", "JNZ rel", "JC rel"], [2], "Cờ Zero = 0 nghĩa là giá trị A khác 0. Lệnh tương ứng là JNZ (Jump if Not Zero).", {}],
      ["Lệnh assembly của 89C51 \"DEC R0\" thực hiện:", ["Giảm nội dung trong R0 đi 1", "Tăng nội dung trong R1 lên 1", "Tăng nội dung trong R0 lên 1", "Giảm nội dung trong R1 lên 1"], [0], "DEC (Decrement) là lệnh giảm giá trị đi 1.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh đọc bộ nhớ dữ liệu ngoài:", ["MOV A, DPTR", "MOV @DPTR, A", "MOVX @DPTR, A", "MOVX A, @DPTR"], [3], "ĐỌC từ RAM ngoài vào CPU: Dùng lệnh MOVX (Move External), chiều dữ liệu từ @DPTR vào A. Cú pháp: MOVX A, @DPTR.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh cất dữ liệu vào vùng nhớ ngăn xếp (Stack):", ["ULL", "PUSH", "POP", "SWAP"], [1], "PUSH đẩy dữ liệu từ một thanh ghi/ô nhớ vào đỉnh của ngăn xếp.", {}],
      ["Trong ngôn ngữ assembly trên vi điều khiển 89C51, lệnh di chuyển giá trị 7FH vào ô nhớ có địa chỉ 7FH:", ["MOV #7FH, 7FH", "MOV 7FH, #7FH", "MOV 7FH, 7FH", "MOV #7FH, #7FH"], [1], "Cú pháp MOV Đích, Nguồn. Đích là ô nhớ 7FH. Nguồn là hằng số #7FH.", {}]
    ]
  },
  {
    id: 11,
    title: "Part 11",
    desc: "Trích xuất 100% từ đề thi Part 11 (Tính toán Cờ & Thanh ghi)",
    color: "#f39c12", // Màu vàng cam cho Đề 11
    data: [
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV R0, #0AAH\nMOV A, #0C3H\nADD A, R0", ["CY=0, AC=1", "CY=1, AC=1", "CY=1, AC=0", "CY=0, AC=0"], [2], "A = C3H (1100 0011B), R0 = AAH (1010 1010B). ADD A, R0 -> C3H + AAH = 16DH (CY=1 vì 1 0110 1101B). Bit 3 cộng Bit 3 không có nhớ sang bit 4 (0+1=1) nên AC=0.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #0C3H\nMOV R0, #0AAH\nADD A, R0", ["AC=0, OV=1", "AC=1, OV=1", "AC=1, OV=0", "AC=0, OV=0"], [0], "A = C3H, R0 = AAH. C3H + AAH = 16DH (1 0110 1101B). Cờ AC = 0 (như câu trên). Cờ OV = CY XOR C6. C7 (CY) = 1, C6 (nhớ từ bit 6 sang bit 7) = 0. 1 XOR 0 = 1. Vậy OV=1.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #0A7H\nMOV R0, #2FH\nADD A, R0", ["AC=1, OV=1", "AC=0, OV=1", "AC=1, OV=0", "AC=0, OV=0"], [2], "A7H (1010 0111B) + 2FH (0010 1111B) = D6H (1101 0110B). Không có nhớ ra ngoài byte nên CY=0. Có nhớ từ D3 sang D4 (1+1+nhớ = 1) nên AC=1. C6=0, CY=0 nên OV=0.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #8BH\nMOV R0, #0B4H\nCLR C\nADDC A, R0", ["AC=1, OV=1", "AC=0, OV=0", "AC=0, OV=1", "AC=1, OV=0"], [2], "8BH (1000 1011B) + B4H (1011 0100B) + C(0) = 1 0011 1111B (13FH). Có CY=1. D3(1)+D3(0)=1 (AC=0). Bit 6 sang Bit 7: D6(0)+D6(0)=0 (C6=0). OV = C7 XOR C6 = 1 XOR 0 = 1.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #8BH\nMOV R0, #0B4H\nCLR C\nADD A, R0", ["P=0, AC=0", "P=0, AC=1", "P=1, AC=1", "P=1, AC=0"], [0], "Kết quả của 8BH + B4H là 3FH (0011 1111B). Có 6 bit 1 trong thanh ghi A. Cờ P (Parity) sẽ bằng 0 nếu số bit 1 chẵn. Ở đây 6 là chẵn nên P=0. Cờ AC=0 (như câu trên).", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #0FFH\nMOV R0, #01H\nSETB C\nSUBB A, R0\nCLR C", ["CY=1, AC=0", "CY=0, AC=0", "CY=0, AC=1", "CY=1, AC=0 (Trùng tùy chọn)"], [1], "A=FFH. Lệnh SUBB A, R0 thực hiện A - R0 - C = FFH - 01H - 1 = FDH. Không có mượn qua bit 7 (CY=0) hay bit 3 (AC=0). Sau đó CLR C lại cưỡng chế CY=0.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #57H\nMOV R0, #89H\nSETB CY\nADDC A, R0", ["OV=1, P=1", "OV=0, P=1", "OV=1, P=0", "OV=0, P=0"], [3], "57H (0101 0111) + 89H (1000 1001) + C(1) = E1H (1110 0001). C7=0, C6=0 -> OV=0. E1H có 4 bit 1 (chẵn) -> P=0.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #027H\nMOV R1, #0C5H\nCLR C\nADDC A, R1", ["OV=0, CY=0", "OV=1, CY=1", "OV=1, CY=0", "OV=0, CY=1"], [0], "27H (0010 0111) + C5H (1100 0101) + C(0) = ECH (1110 1100). CY=0. C7=0, C6=0 -> OV=0.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #83H\nMOV R0, #49H\nADD A, R0", ["AC=1, OV=0", "AC=0, OV=0", "AC=1, OV=1", "AC=0, OV=1"], [3], "83H (1000 0011) + 49H (0100 1001) = CCH (1100 1100). D3(0)+D3(1)+nhớ(1)=10B, nhớ sang D4=0 -> AC=0. D6(0)+D6(1)=1, D7(1)+D7(0)=1 (C6=0, C7=0). Lưu ý: 83H và 49H là âm+dương = âm (CCH là số âm). Phép cộng 2 số trái dấu không bao giờ tràn. OV=0. Đáp án trong đề PDF có thể có sự nhầm lẫn với D7, D6 (C7=0, C6=0 thì OV=0). Hãy chọn kết quả theo đề.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #0B2H\nMOV R0, #4DH\nSETB C\nSUBB A, R0", ["CY=1, AC=0", "CY=0, AC=0", "CY=0, AC=1", "CY=1, AC=1"], [1], "B2H (1011 0010) - 4DH (0100 1101) - 1. Số B2H > 4DH, trừ không mượn -> CY=0. D3(0) - D3(1) - 1(nếu mượn) sẽ mượn -> AC=1. Kết quả là 64H. Ở đây cần mượn ở Nible thấp, AC = 1. (Có thể đề sai sót, dựa vào đề nên chọn B/C tùy ý logic giáo viên).", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #1FH\nMOV R0, #0CDH\nSETB C\nSUBB A, R0\nSETB C", ["P=1, OV=0", "P=1, OV=1", "P=0, OV=1", "P=0, OV=0"], [0], "A=1FH (0001 1111) - CDH (1100 1101) - 1 = 51H (0101 0001). Số lượng bit 1 của 51H là 3 (lẻ) -> P=1. Phép trừ số dương - số âm = dương. Số ban đầu 1FH(+), CDH(-). Kết quả 51H(+), dấu không bị sai -> OV=0.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #22H\nMOV R0, #0B5H\nADD A, R0", ["OV=1, CY=1", "OV=0, CY=1", "OV=1, CY=0", "OV=0, CY=0"], [3], "22H (0010 0010) + B5H (1011 0101) = D7H (1101 0111). CY=0. Dương + Âm = Âm, không bị tràn -> OV=0.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #52H\nMOV R0, #12H\nADD A, R0", ["CY=1, AC=0", "CY=0, AC=0", "CY=0, AC=1", "CY=1, AC=1"], [1], "52H (0101 0010) + 12H (0001 0010) = 64H (0110 0100). Không có nhớ 4 bit (AC=0) và 8 bit (CY=0).", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #25H\nMOV R0, #7DH\nADDC A, R0", ["AC=0, OV=0", "AC=1, OV=0", "AC=1, OV=1", "AC=0, OV=1"], [2], "25H (0010 0101) + 7DH (0111 1101) + C(mặc định 0) = A2H (1010 0010). Có nhớ từ D3 sang D4 -> AC=1. Dương (25H) + Dương (7DH) ra Âm (A2H là âm) -> Tràn số có dấu -> OV=1.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #0A7H\nMOV R0, #2FH\nCLR C\nADDC A, R0\nSETB C", ["P=0, CY=0", "P=1, CY=0", "P=1, CY=1", "P=0, CY=1"], [3], "A7H (1010 0111) + 2FH (0010 1111) + 0 = D6H (1101 0110). A=D6H có 5 bit 1 (lẻ) -> P=1. Sau đó lệnh SETB C gán CY=1. Do đó P=1, CY=1.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #0C4H\nMOV R0, #75H\nCLR C\nADDC A, R0", ["P=1, CY=0", "P=1, CY=1", "P=0, CY=1", "P=0, CY=0"], [2], "C4H (1100 0100) + 75H (0111 0101) = 139H. Có nhớ ra ngoài -> CY=1. A=39H (0011 1001) có 4 bit 1 (chẵn) -> P=0.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #0C3H\nMOV R0, #5FH\nADD A, R0", ["OV=0, CY=1", "OV=1, CY=1", "OV=0, CY=0", "OV=1, CY=0"], [0], "C3H (1100 0011) + 5FH (0101 1111) = 122H (CY=1). C7(1) XOR C6(1) = 0 -> OV=0.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #92H\nMOV R0, #89H\nADD A, R0", ["CY=1, AC=1", "CY=0, AC=0", "CY=1, AC=0", "CY=0, AC=1"], [2], "92H (1001 0010) + 89H (1000 1001) = 11BH. Nhớ byte -> CY=1. Không nhớ 4 bit -> AC=0.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #5FH\nMOV R0, #5BH\nADD A, R0", ["OV=0, CY=0", "OV=1, CY=0", "OV=0, CY=1", "OV=1, CY=1"], [2], "5FH (0101 1111) + 5BH (0101 1011) = BAH (1011 1010). CY=0. Dương + Dương ra Âm (D7=1) -> Tràn có dấu -> OV=1.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #12H\nMOV R0, #0ACH\nSETB C\nSUBB A, R0", ["CY=1, OV=0", "CY=0, OV=1", "CY=1, OV=1", "CY=0, OV=0"], [0], "12H - ACH - 1 = 12H + (bù 2 của ACH) - 1. Số dương trừ số âm = dương. Số nhỏ trừ số lớn -> mượn -> CY=1. Kết quả dương -> Không tràn -> OV=0.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #5CH\nMOV R0, #9FH\nSETB C\nSUBB A, R0", ["CY=0, AC=0", "CY=1, AC=1", "CY=0, AC=1", "CY=1, AC=0"], [1], "5CH (0101 1100) - 9FH (1001 1111) - 1. Nhỏ trừ lớn -> CY=1. Có mượn Nible -> AC=1.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #0FFH\nMOV R0, #01H\nADD A, R0", ["AC=1, P=1", "AC=0, P=0", "AC=0, P=1", "AC=1, P=0"], [3], "FFH (1111 1111) + 01H = 00H (1 0000 0000). A=00H có 0 bit 1 (chẵn) -> P=0. Có nhớ từ D3 sang D4 -> AC=1.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #0C5H\nMOV R0, #0B6H\nADD A, R0", ["CY=1, AC=0", "CY=0, AC=0", "CY=1, AC=1", "CY=0, AC=1"], [0], "C5H (1100 0101) + B6H (1011 0110) = 17BH. CY=1. 5+6=B (không nhớ) -> AC=0.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #45H\nMOV R0, #0ADH\nSETB C\nSUBB A, R0", ["CY=1, P=0", "CY=1, P=1", "CY=0, P=0", "CY=0, P=1"], [1], "45H - ADH - 1. CY=1 (nhỏ trừ lớn). 45H(69) - ADH(-83) - 1 = 97H (1001 0111). A=97H có 5 bit 1 (lẻ) -> P=1.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #0AAH\nMOV R0, #0BDH\nADD A, R0", ["AC=1, P=0", "AC=1, P=1", "AC=0, P=0", "AC=0, P=1"], [1], "AAH (1010 1010) + BDH (1011 1101) = 167H. A=67H (0110 0111) có 5 bit 1 (lẻ) -> P=1. AH + DH = 1010+1101 = 10111 (nhớ) -> AC=1.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #0AAH\nMOV R0, #01H\nADD A, R0", ["AC=1, P=1", "AC=1, P=0", "AC=0, P=0", "AC=0, P=1"], [3], "AAH + 01H = ABH (1010 1011). Không có nhớ 4 bit (AC=0). A=ABH có 5 bit 1 -> P=1.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #87H\nMOV R0, #78H\nADD A, R0", ["AC=0, P=0", "AC=0, P=1", "AC=1, P=0", "AC=1, P=1"], [2], "87H (1000 0111) + 78H (0111 1000) = FFH (1111 1111). A=FFH có 8 bit 1 (chẵn) -> P=0. 7+8=F (không nhớ) -> AC=0.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #12H\nMOV R0, #65H\nSETB C\nSUBB A, R0", ["AC=0, OV=0", "AC=1, OV=1", "AC=0, OV=1", "AC=1, OV=0"], [3], "12H - 65H - 1 = ACH (1010 1100). D3(2)-D3(5) có mượn -> AC=1. Số Dương trừ Số Dương ra Số Âm (ACH là số âm) -> không bị tràn dấu sai (vì 18 - 101 = -83 (ACH)) -> OV=0.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #0FEH\nMOV R0, #012H\nSETB C\nSUBB A, R0", ["CY=1, P=1", "CY=1, P=0", "CY=0, P=0", "CY=0, P=1"], [2], "FEH (254) - 12H (18) - 1 = EBH (1110 1011). FEH > 12H nên không mượn -> CY=0. A=EBH có 6 bit 1 (chẵn) -> P=0.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #00H\nMOV R0, #01H\nCLR C\nSUBB A, R0", ["CY=0, AC=0", "CY=1, AC=0", "CY=1, AC=1", "CY=0, AC=1"], [2], "00H - 01H - 0 = FFH. 00H < 01H nên mượn -> CY=1. Bit 0 trừ Bit 1 cũng phải mượn từ nửa cao -> AC=1.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #83H\nMOV R0, #49H\nSETB C\nADD A, R0", ["AC=1, OV=0", "AC=0, OV=0", "AC=1, OV=1", "AC=0, OV=1"], [1], "83H (1000 0011) + 49H (0100 1001) + C(1) = CDH (1100 1101). Không nhớ 4 bit -> AC=0. Âm + Dương -> OV=0.", {}],
      ["Cho biết trạng thái các cờ sau khi vi điều khiển 89C51 thực hiện đoạn mã Assembler dưới đây:\nMOV A, #53H\nMOV R0, #12H\nADDC A, R0\nCLR C", ["CY=0, AC=1", "CY=1, AC=1", "CY=0, AC=0", "CY=1, AC=0"], [0], "53H + 12H + 0 (mặc định ban đầu) = 65H. Cú pháp CLR C sẽ ép CY=0. Không có nhớ -> AC=0. Đề bài có thể hỏi giá trị AC từ lệnh ADDC, 3+2=5 không nhớ -> AC=0. (Nếu chọn AC=1 thì câu hỏi lỗi đáp án. Theo Logic chuẩn: CY=0, AC=0).", {}]
